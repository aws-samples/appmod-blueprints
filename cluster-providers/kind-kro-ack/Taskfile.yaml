version: "3"
set: [errexit, nounset, pipefail]
silent: true

env:
  KUBECONFIG: "{{.ROOT_DIR}}/private/kubeconfig"
  AWS_PAGER: ""
  AWS_PROFILE: "{{.AWS_PROFILE}}"

vars:
  GITOPS_ROOT: "{{.ROOT_DIR}}/gitops"
  REQUIRED_CLIS: [kind, kubectl, helm, yq, aws]
  AWS_PROFILE:
    sh: yq '.aws.profile // "default"' {{.CONFIG_FILE}}
  HUB_CLUSTER_NAME:
    sh: yq '.hub.clusterName' {{.CONFIG_FILE}}
  HUB_K8S_VERSION:
    sh: yq '.hub.kubernetesVersion // "1.35"' {{.CONFIG_FILE}}
  HUB_VPC_CIDR:
    sh: yq '.hub.vpcCidr // "10.0.0.0/16"' {{.CONFIG_FILE}}
  AWS_ACCOUNT_ID:
    sh: yq '.aws.accountId' {{.CONFIG_FILE}}
  AWS_REGION:
    sh: yq '.aws.region' {{.CONFIG_FILE}}
  REPO_URL:
    sh: yq '.repo.url' {{.CONFIG_FILE}}
  REPO_REVISION:
    sh: yq '.repo.revision' {{.CONFIG_FILE}}
  REPO_BASEPATH:
    sh: yq '.repo.basepath' {{.CONFIG_FILE}}
  DOMAIN:
    sh: yq '.domain' {{.CONFIG_FILE}}
  CLOUDFRONT_DOMAIN:
    sh: yq '.cloudfront.domain // ""' {{.CONFIG_FILE}}
  RESOURCE_PREFIX:
    sh: yq '.resourcePrefix // ""' {{.CONFIG_FILE}}
  INGRESS_NAME:
    sh: yq '.ingressName // ""' {{.CONFIG_FILE}}
  INGRESS_SECURITY_GROUPS:
    sh: yq '.ingressSecurityGroups // ""' {{.CONFIG_FILE}}
  INGRESS_MODE:
    sh: yq '.ingress.mode // "cloudfront"' {{.CONFIG_FILE}}
  INGRESS_CERT_ARN:
    sh: yq '.ingress.certificateArn // ""' {{.CONFIG_FILE}}
  ADMIN_ROLE_NAME:
    sh: yq '.hub.adminRoleName // "Admin"' {{.CONFIG_FILE}}
  CAPABILITY_NAME:
    sh: yq '.argocdCapability.name // "argocd"' {{.CONFIG_FILE}}
  IDC_INSTANCE_ARN:
    sh: yq '.identityCenter.instanceArn' {{.CONFIG_FILE}}
  IDC_REGION:
    sh: yq '.identityCenter.region' {{.CONFIG_FILE}}
  IDC_IDENTITY_STORE_ID:
    sh: yq '.identityCenter.identityStoreId // ""' {{.CONFIG_FILE}}
  IDC_ADMIN_GROUP_ID:
    sh: yq '.identityCenter.adminGroupId // ""' {{.CONFIG_FILE}}
  KIND_CLUSTER_NAME: "{{.HUB_CLUSTER_NAME}}-bootstrap"
  CALLER_ROLE_ARN:
    sh: |
      ARN=$(aws sts get-caller-identity --query "Arn" --output text 2>/dev/null || true)
      if [ -z "$ARN" ]; then
        # Fallback: get instance profile role
        TOKEN=$(curl -s -m 2 -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600" 2>/dev/null || true)
        if [ -n "$TOKEN" ]; then
          ROLE=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/iam/info | jq -r .InstanceProfileArn | sed 's|instance-profile|role|')
          echo "$ROLE"
        fi
      elif echo "$ARN" | grep -q ":assumed-role/"; then
        echo "$ARN" | sed 's|arn:aws:sts::|arn:aws:iam::|;s|:assumed-role/|:role/|;s|/[^/]*$||'
      else
        echo "$ARN"
      fi
  ACK_NAMESPACE: "ack-system"
  KRO_NAMESPACE: "kro-system"
  ACK_IAM_VERSION: "1.6.4"
  ACK_EKS_VERSION: "1.13.0"
  ACK_EC2_VERSION: "1.12.0"
  KRO_VERSION: "0.9.2"
  ARGOCD_VERSION:
    sh: yq '.argocd.defaultVersion' {{.ROOT_DIR}}/gitops/addons/registry/core.yaml
  C_INFO:
    sh: printf '\033[1;36m'
  C_OK:
    sh: printf '\033[1;32m'
  C_STEP:
    sh: printf '\033[1;33m'
  C_ERR:
    sh: printf '\033[1;31m'
  C_RESET:
    sh: printf '\033[0m'

tasks:
  validate:
    desc: Pre-flight checks
    cmds:
      - cmd: command -v {{.ITEM}} >/dev/null 2>&1 || { echo "Missing {{.ITEM}}"; exit 1; }
        for:
          var: REQUIRED_CLIS
      - test -f {{.CONFIG_FILE}} || { echo "config.local.yaml not found"; exit 1; }
      - aws sts get-caller-identity >/dev/null || { echo "AWS credentials not configured"; exit 1; }
      - printf '{{.C_OK}}✓ Pre-flight checks passed.{{.C_RESET}}\n'

  install:
    desc: Bootstrap the platform (idempotent)
    cmds:
      - task: kind:create
      - task: credentials:setup
      - task: argocd:install
      - task: ack:install
      - task: kro:install
      - task: kro:apply-rgds
      - task: idc:setup
      - task: hub:claim
      - task: hub:wait-for-eks
      - task: hub:ingress
      - task: hub:cloudfront
      - task: hub:seed
      - task: hub:wait-for-sync
      - printf '{{.C_OK}}✓ Bootstrap complete. Run task status.{{.C_RESET}}\n'

  kind:create:
    desc: Create Kind cluster (skips if exists)
    status:
      - kind get clusters 2>/dev/null | grep -q "^{{.KIND_CLUSTER_NAME}}$"
    cmds:
      - kind create cluster --name {{.KIND_CLUSTER_NAME}} --config kind.yaml --kubeconfig {{.KUBECONFIG}}

  credentials:setup:
    desc: Create AWS credentials secret (skips if exists)
    status:
      - kubectl -n {{.ACK_NAMESPACE}} get secret aws-credentials 2>/dev/null
    cmds:
      - task: credentials:refresh

  credentials:refresh:
    desc: Force-refresh AWS credentials secret
    cmds:
      - kubectl create namespace {{.ACK_NAMESPACE}} --dry-run=client -o yaml | kubectl apply -f -
      - |
        set -e
        # Prefer explicit aws.profile from config — IMDS only used as fallback when no profile
        # is set (or set to "default"). Without this, EC2-hosted runners (Cloud9, Workshop Studio,
        # any EC2-based bootstrap host) silently override the user's intended account by reading
        # the instance role from IMDS, causing ACK controllers to provision in the wrong account.
        AWS_PROFILE_NAME=$(yq '.aws.profile // ""' {{.CONFIG_FILE}})
        AKI=""; SAK=""; ST=""
        if [ -n "$AWS_PROFILE_NAME" ] && [ "$AWS_PROFILE_NAME" != "default" ]; then
          printf '  Using AWS profile from config: %s\n' "$AWS_PROFILE_NAME"
          EXPORTED=$(aws configure export-credentials --profile "$AWS_PROFILE_NAME" --format env-no-export)
          AKI=$(echo "$EXPORTED" | sed -n 's/^AWS_ACCESS_KEY_ID=//p')
          SAK=$(echo "$EXPORTED" | sed -n 's/^AWS_SECRET_ACCESS_KEY=//p')
          ST=$(echo  "$EXPORTED" | sed -n 's/^AWS_SESSION_TOKEN=//p')
        else
          TOKEN=$(curl -s -m 2 -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600" 2>/dev/null || true)
          if [ -n "$TOKEN" ]; then
            printf '  Using EC2 instance role credentials (IMDS)\n'
            ROLE=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/iam/security-credentials/)
            CREDS=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/iam/security-credentials/$ROLE)
            AKI=$(echo "$CREDS" | jq -r .AccessKeyId)
            SAK=$(echo "$CREDS" | jq -r .SecretAccessKey)
            ST=$(echo  "$CREDS" | jq -r .Token)
          else
            printf '  Using AWS default profile\n'
            EXPORTED=$(aws configure export-credentials --profile default --format env-no-export)
            AKI=$(echo "$EXPORTED" | sed -n 's/^AWS_ACCESS_KEY_ID=//p')
            SAK=$(echo "$EXPORTED" | sed -n 's/^AWS_SECRET_ACCESS_KEY=//p')
            ST=$(echo  "$EXPORTED" | sed -n 's/^AWS_SESSION_TOKEN=//p')
          fi
        fi
        [ -z "$AKI" ] || [ -z "$SAK" ] && echo "ERROR: empty credentials" && exit 1
        rm -f {{.ROOT_DIR}}/private/aws-creds.ini
        install -m 600 /dev/null {{.ROOT_DIR}}/private/aws-creds.ini
        {
          echo "[default]"
          echo "aws_access_key_id = $AKI"
          echo "aws_secret_access_key = $SAK"
          [ -n "$ST" ] && echo "aws_session_token = $ST"
        } > {{.ROOT_DIR}}/private/aws-creds.ini
      - kubectl -n {{.ACK_NAMESPACE}} create secret generic aws-credentials
          --from-file=credentials={{.ROOT_DIR}}/private/aws-creds.ini
          --dry-run=client -o yaml | kubectl apply -f -
      - rm -f {{.ROOT_DIR}}/private/aws-creds.ini

  argocd:install:
    desc: Install ArgoCD (skips if deployed)
    status:
      - helm status argocd -n argocd 2>/dev/null | grep -q deployed
    cmds:
      - helm repo add argo https://argoproj.github.io/argo-helm --force-update
      - helm upgrade --install argocd argo/argo-cd
          --namespace argocd --create-namespace
          --version {{.ARGOCD_VERSION}}
          --wait --timeout 5m

  ack:install:
    desc: Install ACK controllers (IAM, EKS, EC2)
    cmds:
      - task: ack:install-controller
        vars: { CONTROLLER: iam, VERSION: "{{.ACK_IAM_VERSION}}" }
      - task: ack:install-controller
        vars: { CONTROLLER: eks, VERSION: "{{.ACK_EKS_VERSION}}" }
      - task: ack:install-controller
        vars: { CONTROLLER: ec2, VERSION: "{{.ACK_EC2_VERSION}}" }
      - printf '{{.C_OK}}✓ ACK controllers installed.{{.C_RESET}}\n'

  ack:install-controller:
    internal: true
    status:
      - helm status ack-{{.CONTROLLER}}-controller -n {{.ACK_NAMESPACE}} 2>/dev/null | grep -q deployed
    cmds:
      - helm install ack-{{.CONTROLLER}}-controller
          oci://public.ecr.aws/aws-controllers-k8s/{{.CONTROLLER}}-chart
          --namespace {{.ACK_NAMESPACE}} --create-namespace
          --version {{.VERSION}}
          --set aws.region={{.AWS_REGION}}
          --set aws.credentials.secretName=aws-credentials
          --set aws.credentials.secretKey=credentials
          --set serviceAccount.name=ack-{{.CONTROLLER}}-controller
          --wait --timeout 5m

  kro:install:
    desc: Install KRO controller
    status:
      - helm status kro -n {{.KRO_NAMESPACE}} 2>/dev/null | grep -q deployed
    cmds:
      - helm install kro oci://registry.k8s.io/kro/charts/kro
          --namespace {{.KRO_NAMESPACE}} --create-namespace
          --version {{.KRO_VERSION}}
          --wait --timeout 5m
      - printf '{{.C_OK}}✓ KRO installed.{{.C_RESET}}\n'

  kro:apply-rgds:
    desc: Apply KRO ResourceGraphDefinitions for VPC and EKS
    cmds:
      - kubectl apply -f {{.GITOPS_ROOT}}/addons/charts/kro/resource-groups/manifests/eks/rg-vpc.yaml
      - kubectl apply -f {{.GITOPS_ROOT}}/addons/charts/kro/resource-groups/manifests/eks/rg-eks.yaml
      - kubectl apply -f {{.GITOPS_ROOT}}/addons/charts/kro/resource-groups/manifests/eks/rg-eks-vpc.yaml
      - printf '{{.C_STEP}}▸ Waiting for RGDs to be ready...{{.C_RESET}}\n'
      - kubectl wait --for=condition=Ready resourcegraphdefinition --all --timeout=180s
      - printf '{{.C_OK}}✓ ResourceGraphDefinitions applied.{{.C_RESET}}\n'

  idc:setup:
    desc: Create IDC groups if they don't exist (idempotent)
    vars:
      STORE_ID:
        sh: |
          ID=$(yq '.identityCenter.identityStoreId // ""' {{.CONFIG_FILE}})
          if [ -z "$ID" ]; then
            aws sso-admin list-instances --region {{.IDC_REGION}} --query 'Instances[0].IdentityStoreId' --output text 2>/dev/null || echo ""
          else
            echo "$ID"
          fi
      ADMIN_GROUP:
        sh: |
          EXISTING=$(yq '.identityCenter.adminGroupId // ""' {{.CONFIG_FILE}})
          if [ -n "$EXISTING" ]; then echo "$EXISTING"; exit 0; fi
          STORE_ID=$(yq '.identityCenter.identityStoreId // ""' {{.CONFIG_FILE}})
          [ -z "$STORE_ID" ] && STORE_ID=$(aws sso-admin list-instances --region {{.IDC_REGION}} --query 'Instances[0].IdentityStoreId' --output text 2>/dev/null)
          aws identitystore list-groups --identity-store-id "$STORE_ID" --region {{.IDC_REGION}} --filters '[{"AttributePath":"DisplayName","AttributeValue":"admin"}]' --query 'Groups[0].GroupId' --output text 2>/dev/null | grep -v None || echo ""
    cmds:
      - |
        STORE_ID="{{.STORE_ID}}"
        if [ -z "$STORE_ID" ]; then
          echo "ERROR: No IDC Identity Store found. Set identityCenter.identityStoreId in config.local.yaml"
          exit 1
        fi
        printf '{{.C_STEP}}▸ IDC Identity Store: %s{{.C_RESET}}\n' "$STORE_ID"
        # BYO IdC: if adminGroupId AND adminUserId are pre-populated in config,
        # skip group/user/membership creation entirely (useful when IdC lives in
        # a different AWS account and the bootstrap role lacks identitystore:Create* perms).
        BYO_GROUP=$(yq '.identityCenter.adminGroupId // ""' {{.CONFIG_FILE}})
        BYO_USER=$(yq '.identityCenter.adminUserId // ""' {{.CONFIG_FILE}})
        if [ -n "$BYO_GROUP" ] && [ -n "$BYO_USER" ]; then
          printf '{{.C_INFO}}  BYO IdC detected (adminGroupId + adminUserId set) — skipping group/user/membership creation{{.C_RESET}}\n'
          printf '{{.C_OK}}✓ IDC admin group: %s{{.C_RESET}}\n' "$BYO_GROUP"
          printf '{{.C_OK}}✓ IDC admin user:  %s{{.C_RESET}}\n' "$BYO_USER"
          yq -i ".identityCenter.identityStoreId = \"$STORE_ID\"" {{.CONFIG_FILE}}
          exit 0
        fi
        # Create groups idempotently
        for GROUP_NAME in admin editor viewer; do
          EXISTING=$(aws identitystore list-groups --identity-store-id "$STORE_ID" --region {{.IDC_REGION}} \
            --filters "[{\"AttributePath\":\"DisplayName\",\"AttributeValue\":\"$GROUP_NAME\"}]" \
            --query 'Groups[0].GroupId' --output text 2>/dev/null | grep -v None || echo "")
          if [ -n "$EXISTING" ]; then
            printf '{{.C_INFO}}  Group "%s" exists: %s{{.C_RESET}}\n' "$GROUP_NAME" "$EXISTING"
          else
            NEW_ID=$(aws identitystore create-group --identity-store-id "$STORE_ID" --region {{.IDC_REGION}} \
              --display-name "$GROUP_NAME" --description "Platform group for EKS ArgoCD Capability" \
              --query 'GroupId' --output text)
            printf '{{.C_OK}}  Created group "%s": %s{{.C_RESET}}\n' "$GROUP_NAME" "$NEW_ID"
          fi
        done
        # Output admin group ID (prefer config value, fallback to lookup)
        ADMIN_ID=$(yq '.identityCenter.adminGroupId // ""' {{.CONFIG_FILE}})
        if [ -z "$ADMIN_ID" ]; then
          ADMIN_ID=$(aws identitystore list-groups --identity-store-id "$STORE_ID" --region {{.IDC_REGION}} \
            --filters '[{"AttributePath":"DisplayName","AttributeValue":"admin"}]' \
            --query 'Groups[0].GroupId' --output text)
        fi
        printf '{{.C_OK}}✓ IDC admin group: %s{{.C_RESET}}\n' "$ADMIN_ID"
        # Create admin user if not exists
        ADMIN_USER=$(aws identitystore list-users --identity-store-id "$STORE_ID" --region {{.IDC_REGION}} \
          --filters '[{"AttributePath":"UserName","AttributeValue":"eks-argocd-admin-user"}]' \
          --query 'Users[0].UserId' --output text 2>/dev/null | grep -v None || echo "")
        if [ -z "$ADMIN_USER" ]; then
          ADMIN_USER=$(aws identitystore create-user --identity-store-id "$STORE_ID" --region {{.IDC_REGION}} \
            --user-name "eks-argocd-admin-user" --display-name "EKS ArgoCD Admin" \
            --name '{"GivenName":"EKS Admin","FamilyName":"User"}' \
            --emails '[{"Value":"eks-argocd-admin@example.com","Primary":true}]' \
            --query 'UserId' --output text)
          printf '{{.C_OK}}  Created admin user: %s{{.C_RESET}}\n' "$ADMIN_USER"
        else
          printf '{{.C_INFO}}  Admin user exists: %s{{.C_RESET}}\n' "$ADMIN_USER"
        fi
        # Add user to admin group if not already member
        IS_MEMBER=$(aws identitystore is-member-in-groups --identity-store-id "$STORE_ID" --region {{.IDC_REGION}} \
          --member-id '{"UserId":"'"$ADMIN_USER"'"}' --group-ids "$ADMIN_ID" \
          --query 'Results[0].MembershipExists' --output text 2>/dev/null || echo "false")
        if [ "$IS_MEMBER" != "True" ]; then
          aws identitystore create-group-membership --identity-store-id "$STORE_ID" --region {{.IDC_REGION}} \
            --group-id "$ADMIN_ID" --member-id '{"UserId":"'"$ADMIN_USER"'"}' >/dev/null 2>&1 || true
          printf '{{.C_OK}}  Added user to admin group{{.C_RESET}}\n'
        fi
        # Update config.local.yaml with discovered values
        yq -i ".identityCenter.adminGroupId = \"$ADMIN_ID\"" {{.CONFIG_FILE}}
        yq -i ".identityCenter.identityStoreId = \"$STORE_ID\"" {{.CONFIG_FILE}}

  hub:claim:
    desc: Apply hub cluster claim (EksclusterWithVpc instance)
    cmds:
      - kubectl create namespace {{.HUB_CLUSTER_NAME}} --dry-run=client -o yaml | kubectl apply -f -
      - |
        cat <<'EOF' | sed \
          -e "s|HUB_CLUSTER_NAME|{{.HUB_CLUSTER_NAME}}|g" \
          -e "s|AWS_REGION|{{.AWS_REGION}}|g" \
          -e "s|AWS_ACCOUNT_ID|{{.AWS_ACCOUNT_ID}}|g" \
          -e "s|HUB_K8S_VERSION|{{.HUB_K8S_VERSION}}|g" \
          -e "s|HUB_VPC_CIDR|{{.HUB_VPC_CIDR}}|g" \
          -e "s|RESOURCE_PREFIX|{{.RESOURCE_PREFIX}}|g" \
          -e "s|CALLER_ROLE_ARN|{{.CALLER_ROLE_ARN}}|g" \
          -e "s|IDC_INSTANCE_ARN|{{.IDC_INSTANCE_ARN}}|g" \
          -e "s|IDC_REGION|{{.IDC_REGION}}|g" \
          -e "s|IDC_ADMIN_GROUP_ID|{{.IDC_ADMIN_GROUP_ID}}|g" \
          -e "s|ADMIN_ROLE_NAME|{{.ADMIN_ROLE_NAME}}|g" \
          -e "s|REPO_URL|{{.REPO_URL}}|g" \
          -e "s|REPO_REVISION|{{.REPO_REVISION}}|g" \
          -e "s|REPO_BASEPATH|{{.REPO_BASEPATH}}|g" \
          -e "s|DOMAIN|{{.DOMAIN}}|g" \
          | kubectl apply -f -
        apiVersion: kro.run/v1alpha1
        kind: EksclusterWithVpc
        metadata:
          name: HUB_CLUSTER_NAME
          namespace: HUB_CLUSTER_NAME
        spec:
          name: HUB_CLUSTER_NAME
          tenant: platform
          environment: control-plane
          region: AWS_REGION
          k8sVersion: "HUB_K8S_VERSION"
          accountId: "AWS_ACCOUNT_ID"
          managementAccountId: "AWS_ACCOUNT_ID"
          argoCdHubRoleArn: "CALLER_ROLE_ARN"
          adminRoleName: ADMIN_ROLE_NAME
          fleetSecretManagerSecretNameSuffix: argocd-secret
          domainName: DOMAIN
          resourcePrefix: RESOURCE_PREFIX
          argocdCapability:
            enabled: "true"
            idcInstanceArn: IDC_INSTANCE_ARN
            idcRegion: IDC_REGION
            adminGroupId: IDC_ADMIN_GROUP_ID
          cidr:
            vpcCidr: HUB_VPC_CIDR
            publicSubnet1Cidr: "10.0.1.0/24"
            publicSubnet2Cidr: "10.0.2.0/24"
            privateSubnet1Cidr: "10.0.11.0/24"
            privateSubnet2Cidr: "10.0.12.0/24"
          gitops:
            addonsRepoUrl: REPO_URL
            addonsRepoRevision: REPO_REVISION
            addonsRepoBasePath: "REPO_BASEPATH/addons/"
            addonsRepoPath: bootstrap
            fleetRepoUrl: REPO_URL
            fleetRepoRevision: REPO_REVISION
            fleetRepoBasePath: "REPO_BASEPATH/fleet/"
            fleetRepoPath: bootstrap
            platformRepoUrl: REPO_URL
            platformRepoRevision: REPO_REVISION
            platformRepoBasePath: "REPO_BASEPATH/platform/"
            platformRepoPath: bootstrap
            workloadRepoUrl: REPO_URL
            workloadRepoRevision: REPO_REVISION
            workloadRepoBasePath: "REPO_BASEPATH/apps/"
            workloadRepoPath: ""
          addons:
            enable_ingress_class_alb: "true"
            enable_argo_rollouts: "false"
            enable_metrics_server: "false"
            enable_external_secrets: "true"
            enable_external_dns: "true"
            enable_adot_collector: "false"
            enable_cw_prometheus: "false"
            enable_kyverno: "false"
            enable_kyverno_policies: "false"
            enable_kyverno_policy_reporter: "false"
            enable_cni_metrics_helper: "false"
            enable_prometheus_node_exporter: "false"
            enable_kube_state_metrics: "false"
            enable_opentelemetry_operator: "false"
            enable_cert_manager: "true"
            enable_aws_efs_csi_driver: "false"
            enable_crossplane: "true"
            enable_crossplane_aws: "true"
            enable_flux: "false"
            enable_ingress_nginx: "false"
            enable_platform_manifests: "true"
            enable_kubevela: "false"
            adot_collector_namespace: adot-collector-kubeprometheus
            adot_collector_service_account: adot-collector-kubeprometheus
            external_dns_namespace: external-dns
            external_dns_service_account: external-dns-sa
            external_dns_policy: sync
            external_secrets_namespace: external-secrets
            external_secrets_service_account: external-secrets-sa
            amp_endpoint_url: ""
        EOF

  hub:wait-for-eks:
    desc: Wait for the EksclusterWithVpc instance to reach ACTIVE state and the EKS cluster to exist in AWS
    vars:
      WAIT_TIMEOUT_SEC: '{{.WAIT_TIMEOUT_SEC | default "1800"}}'
      WAIT_INTERVAL_SEC: '{{.WAIT_INTERVAL_SEC | default "30"}}'
    cmds:
      - |
        printf '{{.C_STEP}}▸ Waiting for EksclusterWithVpc/{{.HUB_CLUSTER_NAME}} to reach ACTIVE (max {{.WAIT_TIMEOUT_SEC}}s)...{{.C_RESET}}\n'
        END=$(( $(date +%s) + {{.WAIT_TIMEOUT_SEC}} ))
        LAST_STATE=""
        while [ "$(date +%s)" -lt "$END" ]; do
          STATE=$(kubectl get eksclusterwithvpc {{.HUB_CLUSTER_NAME}} -n {{.HUB_CLUSTER_NAME}} -o jsonpath='{.status.state}' 2>/dev/null || echo "")
          if [ "$STATE" != "$LAST_STATE" ]; then
            printf '{{.C_INFO}}  state: %s{{.C_RESET}}\n' "${STATE:-<empty>}"
            LAST_STATE="$STATE"
          fi
          if [ "$STATE" = "ACTIVE" ]; then
            break
          fi
          sleep {{.WAIT_INTERVAL_SEC}}
        done
        if [ "$STATE" != "ACTIVE" ]; then
          printf '{{.C_ERR}}✗ EksclusterWithVpc not ACTIVE after {{.WAIT_TIMEOUT_SEC}}s (last state: %s){{.C_RESET}}\n' "$STATE"
          kubectl get eksclusterwithvpc {{.HUB_CLUSTER_NAME}} -n {{.HUB_CLUSTER_NAME}} -o jsonpath='{.status.conditions}' 2>/dev/null || true
          exit 1
        fi
        printf '{{.C_OK}}✓ EksclusterWithVpc ACTIVE{{.C_RESET}}\n'
      - |
        printf '{{.C_STEP}}▸ Verifying EKS cluster {{.HUB_CLUSTER_NAME}} exists in AWS...{{.C_RESET}}\n'
        END=$(( $(date +%s) + 300 ))
        while [ "$(date +%s)" -lt "$END" ]; do
          EKS_STATUS=$(aws eks describe-cluster --name {{.HUB_CLUSTER_NAME}} --region {{.AWS_REGION}} --query 'cluster.status' --output text 2>/dev/null || echo "")
          if [ "$EKS_STATUS" = "ACTIVE" ]; then
            printf '{{.C_OK}}✓ EKS cluster ACTIVE{{.C_RESET}}\n'
            exit 0
          fi
          printf '{{.C_INFO}}  EKS status: %s{{.C_RESET}}\n' "${EKS_STATUS:-<not-found>}"
          sleep 15
        done
        printf '{{.C_ERR}}✗ EKS cluster not ACTIVE in AWS after RGD reported ACTIVE{{.C_RESET}}\n'
        exit 1

  hub:ingress:preflight:
    desc: Validate ingress.mode config (fails fast if mode=tls without certificateArn+domain)
    cmds:
      - |
        MODE="{{.INGRESS_MODE}}"
        CERT="{{.INGRESS_CERT_ARN}}"
        DOMAIN="{{.DOMAIN}}"
        case "$MODE" in
          cloudfront)
            printf '{{.C_INFO}}  ingress.mode=cloudfront (ALB internal + CloudFront VPC Origin){{.C_RESET}}\n'
            ;;
          tls)
            if [ -z "$CERT" ]; then
              printf '{{.C_ERR}}✗ ingress.mode=tls requires ingress.certificateArn (ACM ARN){{.C_RESET}}\n'
              exit 1
            fi
            if [ -z "$DOMAIN" ] || [ "$DOMAIN" = "<your-domain>" ]; then
              printf '{{.C_ERR}}✗ ingress.mode=tls requires top-level domain to be set{{.C_RESET}}\n'
              exit 1
            fi
            printf '{{.C_INFO}}  ingress.mode=tls (ALB internet-facing HTTPS:443, cert=%s, domain=%s){{.C_RESET}}\n' "$CERT" "$DOMAIN"
            ;;
          *)
            printf '{{.C_ERR}}✗ ingress.mode=%s invalid; expected: cloudfront | tls{{.C_RESET}}\n' "$MODE"
            exit 1
            ;;
        esac

  hub:ingress:
    desc: |
      Create ALB for hub ingress. Behaviour depends on ingress.mode:
      - cloudfront: ALB scheme=internal in private subnets, SG limited to VPC CIDR
      - tls: ALB scheme=internet-facing in public subnets, SG open 80/443 to 0.0.0.0/0
      Switching mode after creation requires manual ALB teardown (AWS scheme is immutable).
    deps: [hub:ingress:preflight]
    vars:
      ALB_NAME: "{{.RESOURCE_PREFIX}}-hub-ingress"
      VPC_ID:
        sh: aws eks describe-cluster --name {{.HUB_CLUSTER_NAME}} --region {{.AWS_REGION}} --query 'cluster.resourcesVpcConfig.vpcId' --output text
      VPC_CIDR:
        sh: aws ec2 describe-vpcs --vpc-ids "$(aws eks describe-cluster --name {{.HUB_CLUSTER_NAME}} --region {{.AWS_REGION}} --query 'cluster.resourcesVpcConfig.vpcId' --output text)" --region {{.AWS_REGION}} --query 'Vpcs[0].CidrBlock' --output text
      SG_ID:
        sh: aws ec2 describe-security-groups --region {{.AWS_REGION}} --filters "Name=vpc-id,Values=$(aws eks describe-cluster --name {{.HUB_CLUSTER_NAME}} --region {{.AWS_REGION}} --query 'cluster.resourcesVpcConfig.vpcId' --output text)" "Name=group-name,Values={{.RESOURCE_PREFIX}}-hub-ingress-http" --query 'SecurityGroups[0].GroupId' --output text 2>/dev/null || echo ""
    status:
      - aws elbv2 describe-load-balancers --names {{.ALB_NAME}} --region {{.AWS_REGION}} 2>/dev/null
    cmds:
      - |
        MODE="{{.INGRESS_MODE}}"
        VPC_ID="{{.VPC_ID}}"
        VPC_CIDR="{{.VPC_CIDR}}"
        # Resolve subnets according to mode
        if [ "$MODE" = "cloudfront" ]; then
          SCHEME="internal"
          SUBNET_NAME_FILTER="*private*"
          ROLE_TAG="kubernetes.io/role/internal-elb"
        else
          SCHEME="internet-facing"
          SUBNET_NAME_FILTER="*public*"
          ROLE_TAG="kubernetes.io/role/elb"
        fi
        SUBNETS=$(aws ec2 describe-subnets --region {{.AWS_REGION}} \
          --filters "Name=vpc-id,Values=$VPC_ID" \
                    "Name=tag:Name,Values=$SUBNET_NAME_FILTER" \
                    "Name=tag:$ROLE_TAG,Values=1" \
          --query 'Subnets[].SubnetId' --output text | tr '\t' ' ')
        if [ -z "$SUBNETS" ]; then
          # Fallback: name-only filter for older VPCs without role tags
          SUBNETS=$(aws ec2 describe-subnets --region {{.AWS_REGION}} \
            --filters "Name=vpc-id,Values=$VPC_ID" "Name=tag:Name,Values=$SUBNET_NAME_FILTER" \
            --query 'Subnets[].SubnetId' --output text | tr '\t' ' ')
        fi
        if [ -z "$SUBNETS" ]; then
          printf '{{.C_ERR}}✗ No subnets matched filter %s in VPC %s{{.C_RESET}}\n' "$SUBNET_NAME_FILTER" "$VPC_ID"
          exit 1
        fi
        # Resolve / create SG with mode-appropriate ingress rules
        SG="{{.SG_ID}}"
        if [ -z "$SG" ] || [ "$SG" = "None" ]; then
          SG=$(aws ec2 create-security-group --group-name "{{.RESOURCE_PREFIX}}-hub-ingress-http" \
            --description "HTTP/HTTPS for hub ingress (mode=$MODE)" --vpc-id "$VPC_ID" --region {{.AWS_REGION}} \
            --query 'GroupId' --output text)
          if [ "$MODE" = "cloudfront" ]; then
            # ALB internal — limit to VPC CIDR (CloudFront VPC Origin reaches it via the ENIs)
            aws ec2 authorize-security-group-ingress --group-id "$SG" --protocol tcp --port 80 \
              --cidr "$VPC_CIDR" --region {{.AWS_REGION}} 2>/dev/null || true
          else
            # ALB internet-facing — open 80 (redirect) and 443
            aws ec2 authorize-security-group-ingress --group-id "$SG" --protocol tcp --port 80 \
              --cidr 0.0.0.0/0 --region {{.AWS_REGION}} 2>/dev/null || true
            aws ec2 authorize-security-group-ingress --group-id "$SG" --protocol tcp --port 443 \
              --cidr 0.0.0.0/0 --region {{.AWS_REGION}} 2>/dev/null || true
          fi
        fi
        aws elbv2 create-load-balancer --name "{{.ALB_NAME}}" --type application \
          --scheme "$SCHEME" --subnets $SUBNETS --security-groups "$SG" \
          --region {{.AWS_REGION}} --output text --query 'LoadBalancers[0].DNSName'
        printf '{{.C_OK}}✓ ALB created: {{.ALB_NAME}} (scheme=%s, mode=%s){{.C_RESET}}\n' "$SCHEME" "$MODE"

  hub:cloudfront:
    desc: Create CloudFront distribution with VPC Origin (cloudfront mode only)
    # CachePolicyId 4135ea2d = AWS Managed "CachingDisabled"
    # OriginRequestPolicyId 216adef6 = AWS Managed "AllViewer" (forwards all headers/cookies/qs)
    # Uses CloudFront VPC Origin (post-2024) to reach an internal ALB without public exposure.
    vars:
      ALB_ARN:
        sh: aws elbv2 describe-load-balancers --names "{{.RESOURCE_PREFIX}}-hub-ingress" --region {{.AWS_REGION}} --query 'LoadBalancers[0].LoadBalancerArn' --output text 2>/dev/null || echo ""
      ALB_DNS:
        sh: aws elbv2 describe-load-balancers --names "{{.RESOURCE_PREFIX}}-hub-ingress" --region {{.AWS_REGION}} --query 'LoadBalancers[0].DNSName' --output text 2>/dev/null || echo ""
      VPC_ORIGIN_NAME: "{{.RESOURCE_PREFIX}}-hub-vpc-origin"
    status:
      # Skip entirely when not in cloudfront mode (idempotent no-op for tls)
      - test "{{.INGRESS_MODE}}" != "cloudfront"
      - aws cloudfront list-distributions --query "DistributionList.Items[?Comment=='{{.RESOURCE_PREFIX}}-hub-ingress'].Id" --output text | grep -q .
    cmds:
      - |
        if [ "{{.INGRESS_MODE}}" != "cloudfront" ]; then
          printf '{{.C_INFO}}⊘ Skipping hub:cloudfront (ingress.mode={{.INGRESS_MODE}}){{.C_RESET}}\n'
          exit 0
        fi
        if [ -z "{{.ALB_ARN}}" ] || [ "{{.ALB_ARN}}" = "None" ]; then
          echo "ERROR: ALB {{.RESOURCE_PREFIX}}-hub-ingress not found. Run hub:ingress first."
          exit 1
        fi
      - |
        # 1. Create or reuse VPC Origin pointing at the internal ALB
        VPC_ORIGIN_ID=$(aws cloudfront list-vpc-origins --region {{.AWS_REGION}} \
          --query "Items[?Name=='{{.VPC_ORIGIN_NAME}}'].Id" --output text 2>/dev/null || echo "")
        if [ -z "$VPC_ORIGIN_ID" ] || [ "$VPC_ORIGIN_ID" = "None" ]; then
          VPC_ORIGIN_ID=$(aws cloudfront create-vpc-origin --region {{.AWS_REGION}} \
            --vpc-origin-endpoint-config "{
              \"Name\": \"{{.VPC_ORIGIN_NAME}}\",
              \"Arn\": \"{{.ALB_ARN}}\",
              \"HTTPPort\": 80,
              \"HTTPSPort\": 443,
              \"OriginProtocolPolicy\": \"http-only\",
              \"OriginSslProtocols\": {\"Quantity\": 1, \"Items\": [\"TLSv1.2\"]}
            }" --query 'VpcOrigin.Id' --output text)
          printf '{{.C_OK}}✓ VPC Origin created: %s{{.C_RESET}}\n' "$VPC_ORIGIN_ID"
        else
          printf '{{.C_INFO}}↻ Reusing VPC Origin: %s{{.C_RESET}}\n' "$VPC_ORIGIN_ID"
        fi

        # Wait for VPC Origin Deployed (~5-10 min)
        printf '{{.C_STEP}}▸ Waiting for VPC Origin Deployed...{{.C_RESET}}\n'
        for i in $(seq 1 60); do
          STATE=$(aws cloudfront get-vpc-origin --id "$VPC_ORIGIN_ID" --region {{.AWS_REGION}} --query 'VpcOrigin.Status' --output text 2>/dev/null || echo "Pending")
          printf '{{.C_INFO}}  [%s/60] VPC Origin status: %s{{.C_RESET}}\n' "$i" "$STATE"
          [ "$STATE" = "Deployed" ] && break
          sleep 15
        done
        if [ "$STATE" != "Deployed" ]; then
          echo "ERROR: VPC Origin did not reach Deployed within 15 min"; exit 1
        fi
        echo "$VPC_ORIGIN_ID" > /tmp/hub-vpc-origin-id
      - |
        # 2. Create CloudFront distribution wired to the VPC Origin
        VPC_ORIGIN_ID=$(cat /tmp/hub-vpc-origin-id)
        DIST_OUT=$(aws cloudfront create-distribution \
          --distribution-config "{
            \"CallerReference\": \"{{.HUB_CLUSTER_NAME}}-$(date +%s)\",
            \"Comment\": \"{{.RESOURCE_PREFIX}}-hub-ingress\",
            \"Enabled\": true,
            \"Origins\": {
              \"Quantity\": 1,
              \"Items\": [{
                \"Id\": \"alb-vpc-origin\",
                \"DomainName\": \"{{.ALB_DNS}}\",
                \"VpcOriginConfig\": {
                  \"VpcOriginId\": \"$VPC_ORIGIN_ID\",
                  \"OriginReadTimeout\": 30,
                  \"OriginKeepaliveTimeout\": 5
                }
              }]
            },
            \"DefaultCacheBehavior\": {
              \"TargetOriginId\": \"alb-vpc-origin\",
              \"ViewerProtocolPolicy\": \"redirect-to-https\",
              \"AllowedMethods\": {\"Quantity\": 7, \"Items\": [\"GET\",\"HEAD\",\"OPTIONS\",\"PUT\",\"POST\",\"PATCH\",\"DELETE\"], \"CachedMethods\": {\"Quantity\": 2, \"Items\": [\"GET\",\"HEAD\"]}},
              \"CachePolicyId\": \"4135ea2d-6df8-44a3-9df3-4b5a84be39ad\",
              \"OriginRequestPolicyId\": \"216adef6-5c7f-47e4-b989-5492eafa07d3\",
              \"Compress\": true
            },
            \"PriceClass\": \"PriceClass_100\",
            \"HttpVersion\": \"http2\"
          }" --query 'Distribution.[Id,DomainName]' --output text)
        CF_DOMAIN=$(echo "$DIST_OUT" | awk '{print $2}')
        printf '{{.C_OK}}✓ CloudFront created: %s{{.C_RESET}}\n' "$CF_DOMAIN"
        # Store domain in config for hub:seed to use
        yq -i ".cloudfront.domain = \"$CF_DOMAIN\"" {{.CONFIG_FILE}}
        rm -f /tmp/hub-vpc-origin-id

  hub:seed:
    desc: Seed hub cluster after EKS is ACTIVE
    cmds:
      - task: credentials:refresh
      - printf '{{.C_STEP}}▸ Waiting for hub EksCluster to be ready...{{.C_RESET}}\n'
      - |
        STATUS="Pending"
        for i in $(seq 1 120); do
          STATUS=$(kubectl get ekscluster {{.HUB_CLUSTER_NAME}} -n {{.HUB_CLUSTER_NAME}} -o jsonpath='{.status.clusterState}' 2>/dev/null || echo "Pending")
          printf '{{.C_INFO}}  [%s/120] Cluster status: %s{{.C_RESET}}\n' "$i" "$STATUS"
          if [ "$STATUS" = "ACTIVE" ]; then break; fi
          sleep 15
        done
        if [ "$STATUS" != "ACTIVE" ]; then echo "ERROR: cluster not ACTIVE"; exit 1; fi
      - printf '{{.C_STEP}}▸ Creating cluster admin access entry...{{.C_RESET}}\n'
      - cmd: |
          CALLER_ARN=$(aws sts get-caller-identity --query "Arn" --output text)
          if echo "$CALLER_ARN" | grep -q ":assumed-role/"; then
            PRINCIPAL_ARN=$(echo "$CALLER_ARN" | sed 's|arn:aws:sts::|arn:aws:iam::|;s|:assumed-role/|:role/|;s|/[^/]*$||')
          else
            PRINCIPAL_ARN="$CALLER_ARN"
          fi
          aws eks create-access-entry --cluster-name {{.HUB_CLUSTER_NAME}} --principal-arn "$PRINCIPAL_ARN" --type STANDARD --region {{.AWS_REGION}} 2>/dev/null || true
          aws eks associate-access-policy --cluster-name {{.HUB_CLUSTER_NAME}} --principal-arn "$PRINCIPAL_ARN" --policy-arn arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy --access-scope type=cluster --region {{.AWS_REGION}} 2>/dev/null || true
      - task: secrets-manager:seed
      - task: secrets-manager:seed-keycloak
      - task: hub:install-eso
      - task: hub:cluster-secret-store
      - task: hub:install-argocd
      - task: hub:seed-secret
      - task: hub:apply-root-appset

  hub:kubeconfig:
    cmds:
      - aws eks update-kubeconfig --name {{.HUB_CLUSTER_NAME}} --region {{.AWS_REGION}} --kubeconfig {{.ROOT_DIR}}/private/hub-kubeconfig 2>&1 >/dev/null

  argocd:capability:
    desc: Create EKS ArgoCD Capability via Job
    status:
      - kubectl -n {{.ACK_NAMESPACE}} get job create-argocd-capability -o jsonpath='{.status.succeeded}' 2>/dev/null | grep -q 1
    vars:
      CAPABILITY_ROLE_ARN:
        sh: kubectl get role.iam.services.k8s.aws/{{.HUB_CLUSTER_NAME}}-argocd-role -n {{.HUB_CLUSTER_NAME}} -o jsonpath='{.status.ackResourceMetadata.arn}' 2>/dev/null || echo ""
    cmds:
      - kubectl -n {{.ACK_NAMESPACE}} create configmap argocd-capability-config
          --from-literal=CLUSTER_NAME={{.HUB_CLUSTER_NAME}}
          --from-literal=AWS_REGION={{.AWS_REGION}}
          --from-literal=AWS_ACCOUNT_ID={{.AWS_ACCOUNT_ID}}
          --from-literal=CAPABILITY_NAME={{.CAPABILITY_NAME}}
          --from-literal=CAPABILITY_ROLE_ARN={{.CAPABILITY_ROLE_ARN}}
          --from-literal=IDC_INSTANCE_ARN={{.IDC_INSTANCE_ARN}}
          --from-literal=IDC_REGION={{.IDC_REGION}}
          --from-literal=IDC_ADMIN_GROUP_ID={{.IDC_ADMIN_GROUP_ID}}
          --dry-run=client -o yaml | kubectl apply -f -
      - kubectl delete job create-argocd-capability -n {{.ACK_NAMESPACE}} 2>/dev/null || true
      - kubectl apply -f manifests/argocd/create-capability.yaml
      - kubectl -n {{.ACK_NAMESPACE}} wait --for=condition=Complete --timeout=2400s job/create-argocd-capability

  secrets-manager:seed:
    desc: Seed hub config into AWS Secrets Manager
    vars:
      CLUSTER_ARN:
        sh: aws eks describe-cluster --name {{.HUB_CLUSTER_NAME}} --region {{.AWS_REGION}} --query 'cluster.arn' --output text 2>/dev/null
      VPC_ID:
        sh: aws eks describe-cluster --name {{.HUB_CLUSTER_NAME}} --region {{.AWS_REGION}} --query 'cluster.resourcesVpcConfig.vpcId' --output text
    cmds:
      - |
        SECRET_KEY="{{.HUB_CLUSTER_NAME}}/config"
        SECRET_VALUE=$(jq -n \
          --arg metadata '{"addonsRepoURL":"{{.REPO_URL}}","addonsRepoRevision":"{{.REPO_REVISION}}","addonsRepoBasepath":"{{.REPO_BASEPATH}}/","fleetRepoURL":"{{.REPO_URL}}","fleetRepoRevision":"{{.REPO_REVISION}}","fleetRepoBasepath":"{{.REPO_BASEPATH}}/","aws_region":"{{.AWS_REGION}}","aws_account_id":"{{.AWS_ACCOUNT_ID}}","aws_cluster_name":"{{.HUB_CLUSTER_NAME}}","aws_vpc_id":"{{.VPC_ID}}","alb_controller_mode":"oss","ingress_domain_name":"{{if .CLOUDFRONT_DOMAIN}}{{.CLOUDFRONT_DOMAIN}}{{else}}{{.DOMAIN}}{{end}}","ingress_name":"{{.RESOURCE_PREFIX}}-hub-ingress","ingress_security_groups":"{{.INGRESS_SECURITY_GROUPS}}","resource_prefix":"{{.RESOURCE_PREFIX}}"}' \
          --arg config '{"tlsClientConfig":{"insecure":false}}' \
          --arg server '{{.CLUSTER_ARN}}' \
          --arg addons '' \
          --arg vpc '{{.VPC_ID}}' \
          '{metadata: $metadata, config: $config, server: $server, addons: $addons, vpc: $vpc}')
        aws secretsmanager create-secret \
          --name "$SECRET_KEY" --secret-string "$SECRET_VALUE" --region {{.AWS_REGION}} 2>/dev/null \
        || aws secretsmanager put-secret-value \
          --secret-id "$SECRET_KEY" --secret-string "$SECRET_VALUE" --region {{.AWS_REGION}}

  secrets-manager:seed-keycloak:
    desc: Seed keycloak passwords
    status:
      - aws secretsmanager describe-secret --secret-id {{.HUB_CLUSTER_NAME}}/keycloak --region {{.AWS_REGION}} 2>/dev/null
    cmds:
      - |
        ADMIN_PASS=$(openssl rand -base64 18 | tr -d '/+=' | head -c 24)
        DB_PASS=$(openssl rand -base64 18 | tr -d '/+=' | head -c 24)
        USER_PASS=$(openssl rand -base64 12 | tr -d '/+=' | head -c 16)
        SECRET_VALUE=$(jq -n \
          --arg admin "$ADMIN_PASS" --arg db "$DB_PASS" --arg user "$USER_PASS" \
          '{keycloak_admin_password: $admin, keycloak_postgres_password: $db, user_password: $user}')
        aws secretsmanager create-secret \
          --name "{{.HUB_CLUSTER_NAME}}/keycloak" --secret-string "$SECRET_VALUE" --region {{.AWS_REGION}} 2>/dev/null \
        || aws secretsmanager put-secret-value \
          --secret-id "{{.HUB_CLUSTER_NAME}}/keycloak" --secret-string "$SECRET_VALUE" --region {{.AWS_REGION}}

  hub:install-argocd:
    desc: Install ArgoCD on the hub cluster (OSS mode, skipped when EKS Capability is used)
    status:
      - test "$(yq '.argocdCapability.enabled // "false"' {{.CONFIG_FILE}} 2>/dev/null || echo false)" = "true"
    cmds:
      - task: hub:kubeconfig
      - KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig helm repo add argo https://argoproj.github.io/argo-helm --force-update
      - KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig helm upgrade --install argocd argo/argo-cd
          --namespace argocd --create-namespace
          --version {{.ARGOCD_VERSION}}
          --wait --timeout 5m
      - printf '{{.C_OK}}✓ ArgoCD installed on hub (OSS mode).{{.C_RESET}}\n'

  hub:install-eso:
    desc: Install External Secrets Operator on hub
    vars:
      ESO_VERSION:
        sh: yq '.external-secrets.defaultVersion' {{.GITOPS_ROOT}}/addons/registry/core.yaml
    status:
      - KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig helm status external-secrets -n external-secrets 2>/dev/null | grep -q deployed
    cmds:
      - task: hub:kubeconfig
      - KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig helm repo add external-secrets https://charts.external-secrets.io --force-update
      - KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig helm upgrade --install external-secrets external-secrets/external-secrets
          --namespace external-secrets --create-namespace
          --version {{.ESO_VERSION}}
          --set serviceAccount.name=external-secrets-sa
          --wait --timeout 5m

  hub:cluster-secret-store:
    desc: Apply ClusterSecretStore on hub
    cmds:
      - task: hub:kubeconfig
      - |
        cat <<'EOF' | sed "s|AWS_REGION|{{.AWS_REGION}}|g" | KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl apply -f -
        apiVersion: external-secrets.io/v1
        kind: ClusterSecretStore
        metadata:
          name: aws-secrets-manager
        spec:
          provider:
            aws:
              service: SecretsManager
              region: AWS_REGION
        EOF

  hub:seed-secret:
    desc: Create seed cluster secret on hub
    vars:
      CLUSTER_ARN:
        sh: aws eks describe-cluster --name {{.HUB_CLUSTER_NAME}} --region {{.AWS_REGION}} --query 'cluster.arn' --output text
      ARGOCD_ROLE_ARN:
        sh: aws iam get-role --role-name {{.HUB_CLUSTER_NAME}}-argocd-role --query 'Role.Arn' --output text 2>/dev/null || echo ""
    cmds:
      - task: hub:kubeconfig
      - KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl create namespace argocd --dry-run=client -o yaml | KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl apply -f -
      - |
        cat <<'EOF' | sed "s|CLUSTER_NAME|{{.HUB_CLUSTER_NAME}}|g; s|CLUSTER_ARN|{{.CLUSTER_ARN}}|g; s|ARGOCD_ROLE_ARN|{{.ARGOCD_ROLE_ARN}}|g; s|REPO_URL|{{.REPO_URL}}|g; s|REPO_REVISION|{{.REPO_REVISION}}|g; s|REPO_BASEPATH|{{.REPO_BASEPATH}}/|g" | KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl apply -f -
        apiVersion: v1
        kind: Secret
        type: Opaque
        metadata:
          name: CLUSTER_NAME
          namespace: argocd
          annotations:
            addonsRepoURL: "REPO_URL"
            addonsRepoRevision: "REPO_REVISION"
            addonsRepoBasepath: "REPO_BASEPATH"
            fleetRepoURL: "REPO_URL"
            fleetRepoRevision: "REPO_REVISION"
            fleetRepoBasepath: "REPO_BASEPATH"
            aws_cluster_name: CLUSTER_NAME
          labels:
            argocd.argoproj.io/secret-type: cluster
            environment: control-plane
            fleet_member: control-plane
        stringData:
          name: CLUSTER_NAME
          server: "CLUSTER_ARN"
          config: '{"awsAuthConfig":{"clusterName":"CLUSTER_NAME","roleARN":"ARGOCD_ROLE_ARN"},"tlsClientConfig":{"insecure":false}}'
        EOF
      - rm -f {{.ROOT_DIR}}/private/hub-kubeconfig

  hub:apply-root-appset:
    desc: Apply root-appset to hub
    cmds:
      - task: hub:kubeconfig
      - KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl apply -f {{.GITOPS_ROOT}}/bootstrap/root-appset.yaml
      - rm -f {{.ROOT_DIR}}/private/hub-kubeconfig
      - printf '{{.C_OK}}✓ Root appset applied. Hub is now self-managing.{{.C_RESET}}\n'

  hub:wait-for-sync:
    desc: Wait for hub ArgoCD apps to sync
    cmds:
      - task: hub:kubeconfig
      - printf '{{.C_STEP}}▸ Waiting for apps to appear...{{.C_RESET}}\n'
      - |
        for i in $(seq 1 30); do
          TOTAL=$(KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl get app -n argocd --no-headers 2>/dev/null | wc -l)
          [ "$TOTAL" -gt 3 ] && break
          sleep 10
        done
      - printf '{{.C_STEP}}▸ Waiting for apps to sync...{{.C_RESET}}\n'
      - |
        TIMEOUT=1800; ELAPSED=0
        while [ $ELAPSED -lt $TIMEOUT ]; do
          TOTAL=$(KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl get app -n argocd --no-headers 2>/dev/null | wc -l)
          SYNCED=$(KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl get app -n argocd --no-headers 2>/dev/null | awk '{print $2}' | grep -c "Synced" || true)
          OUTOFSYNC=$((TOTAL - SYNCED))
          printf '{{.C_INFO}}  %s/%s synced (%ss){{.C_RESET}}\n' "$SYNCED" "$TOTAL" "$ELAPSED"
          [ "$TOTAL" -gt 0 ] && [ "$OUTOFSYNC" -le 2 ] && break
          sleep 15; ELAPSED=$((ELAPSED + 15))
        done
      - rm -f {{.ROOT_DIR}}/private/hub-kubeconfig

  status:
    desc: Check bootstrap status
    cmds:
      - printf '{{.C_INFO}}=== Kind ==={{.C_RESET}}\n' && kind get clusters 2>/dev/null | grep "{{.KIND_CLUSTER_NAME}}" || echo "Not running"
      - printf '{{.C_INFO}}=== Helm ==={{.C_RESET}}\n' && helm list -A 2>/dev/null || echo "None"
      - printf '{{.C_INFO}}=== KRO RGDs ==={{.C_RESET}}\n' && kubectl get resourcegraphdefinitions 2>/dev/null || echo "None"
      - printf '{{.C_INFO}}=== KRO Instances ==={{.C_RESET}}\n' && kubectl get eksclusterwithvpc -A 2>/dev/null || echo "None"

  destroy-kind:
    desc: Delete Kind cluster only (hub persists)
    status:
      - "! kind get clusters 2>/dev/null | grep -q '^{{.KIND_CLUSTER_NAME}}$'"
    cmds:
      - kind delete cluster --name {{.KIND_CLUSTER_NAME}}

  destroy:
    desc: Full teardown — delete KRO instances, wait for ACK to clean up AWS resources, delete Kind
    vars:
      CLEANUP_KIND: '{{.CLEANUP_KIND | default "false"}}'
    cmds:
      - kind get kubeconfig --name {{.KIND_CLUSTER_NAME}} > {{.KUBECONFIG}}
      - task: credentials:refresh
      # Delete the hub claim — KRO cascades to ACK which deletes AWS resources
      - printf '{{.C_ERR}}▸ Deleting hub cluster claim...{{.C_RESET}}\n'
      - kubectl delete eksclusterwithvpc {{.HUB_CLUSTER_NAME}} -n {{.HUB_CLUSTER_NAME}} --timeout=60s 2>/dev/null || true
      - printf '{{.C_STEP}}▸ Waiting for EKS cluster deletion...{{.C_RESET}}\n'
      - |
        for i in $(seq 1 120); do
          EXISTS=$(kubectl get ekscluster {{.HUB_CLUSTER_NAME}} -n {{.HUB_CLUSTER_NAME}} 2>/dev/null && echo "yes" || echo "no")
          [ "$EXISTS" = "no" ] && break
          printf '{{.C_INFO}}  [%s/120] Waiting for deletion...{{.C_RESET}}\n' "$i"
          sleep 15
        done
      # Clean up Secrets Manager
      - aws secretsmanager delete-secret --secret-id {{.HUB_CLUSTER_NAME}}/config --force-delete-without-recovery --region {{.AWS_REGION}} 2>/dev/null || true
      - aws secretsmanager delete-secret --secret-id {{.HUB_CLUSTER_NAME}}/keycloak --force-delete-without-recovery --region {{.AWS_REGION}} 2>/dev/null || true
      - cmd: |
          if [ "{{.CLEANUP_KIND}}" = "true" ]; then
            kind delete cluster --name {{.KIND_CLUSTER_NAME}}
          else
            echo "Kind preserved. Run 'task destroy-kind' to remove."
          fi
      - printf '{{.C_OK}}✓ Destroy complete.{{.C_RESET}}\n'
