version: "3"
set: [errexit, nounset, pipefail]
silent: true

includes:
  cloudfront:
    taskfile: ./Taskfile.cloudfront.yaml
    vars:
      AWS_REGION: '{{.AWS_REGION}}'
      HUB_CLUSTER_NAME: '{{.HUB_CLUSTER_NAME}}'
      ROOT_DIR: '{{.ROOT_DIR}}'
      EXPOSURE_MODE:
        sh: 'if [ -z "$(yq ''.domain // ""'' {{.ROOT_DIR}}/config.local.yaml)" ]; then echo "cloudfront"; else echo "domain"; fi'
      C_STEP: '{{.C_STEP}}'
      C_OK: '{{.C_OK}}'
      C_RESET: '{{.C_RESET}}'
      C_INFO: '{{.C_INFO}}'
      CLOUDFRONT_DOMAIN: '{{.CLOUDFRONT_DOMAIN}}'
      CLOUDFRONT_VPC_ID: '{{.CLOUDFRONT_VPC_ID}}'


env:
  KUBECONFIG: "{{.ROOT_DIR}}/private/kubeconfig"
  AWS_PAGER: ""
  AWS_PROFILE: "{{.AWS_PROFILE}}"

vars:
  CONFIG_FILE: "{{.ROOT_DIR}}/config.local.yaml"
  GITOPS_ROOT: "{{.ROOT_DIR}}/gitops"
  REQUIRED_CLIS: [kind, kubectl, helm, yq, aws]
  AWS_PROFILE:
    sh: yq '.aws.profile // "default"' {{.CONFIG_FILE}}
  HUB_CLUSTER_NAME:
    sh: yq '.hub.clusterName' {{.CONFIG_FILE}}
  HUB_K8S_VERSION:
    sh: yq '.hub.kubernetesVersion // "1.35"' {{.CONFIG_FILE}}
  HUB_VPC_CIDR:
    sh: yq '.hub.vpcCidr // "10.0.0.0/16"' {{.CONFIG_FILE}}
  AWS_ACCOUNT_ID:
    sh: yq '.aws.accountId' {{.CONFIG_FILE}}
  AWS_REGION:
    sh: yq '.aws.region' {{.CONFIG_FILE}}
  REPO_URL:
    sh: yq '.repo.url' {{.CONFIG_FILE}}
  REPO_REVISION:
    sh: yq '.repo.revision' {{.CONFIG_FILE}}
  REPO_BASEPATH:
    sh: yq '.repo.basepath' {{.CONFIG_FILE}}
  FLEET_REPO_URL:
    sh: yq '.fleetRepo.url // .repo.url' {{.CONFIG_FILE}}
  FLEET_REPO_REVISION:
    sh: yq '.fleetRepo.revision // .repo.revision' {{.CONFIG_FILE}}
  FLEET_REPO_BASEPATH:
    sh: yq '.fleetRepo.basepath // .repo.basepath' {{.CONFIG_FILE}}
  DOMAIN:
    sh: yq '.domain' {{.CONFIG_FILE}}
  RESOURCE_PREFIX:
    sh: yq '.resourcePrefix // ""' {{.CONFIG_FILE}}
  INGRESS_NAME:
    sh: yq '.ingressName // ""' {{.CONFIG_FILE}}
  INGRESS_SECURITY_GROUPS:
    sh: yq '.ingressSecurityGroups // ""' {{.CONFIG_FILE}}
  EXPOSURE_MODE:
    sh: 'if [ -z "$(yq ''.domain // ""'' {{.CONFIG_FILE}})" ]; then echo "cloudfront"; else echo "domain"; fi'
  CLOUDFRONT_DOMAIN:
    sh: yq '.cloudfront.cloudfrontDomain // ""' {{.CONFIG_FILE}}
  CLOUDFRONT_VPC_ID:
    sh: yq '.cloudfront.vpcId // ""' {{.CONFIG_FILE}}
  CAPABILITY_NAME:
    sh: yq '.argocdCapability.name // "argocd"' {{.CONFIG_FILE}}
  IDC_INSTANCE_ARN:
    sh: yq '.identityCenter.instanceArn' {{.CONFIG_FILE}}
  IDC_REGION:
    sh: yq '.identityCenter.region' {{.CONFIG_FILE}}
  IDC_ADMIN_GROUP_ID:
    sh: yq '.identityCenter.adminGroupId' {{.CONFIG_FILE}}
  KIND_CLUSTER_NAME: "{{.HUB_CLUSTER_NAME}}-bootstrap"
  C_INFO:
    sh: printf '\033[1;36m'
  C_OK:
    sh: printf '\033[1;32m'
  C_STEP:
    sh: printf '\033[1;33m'
  C_ERR:
    sh: printf '\033[1;31m'
  C_RESET:
    sh: printf '\033[0m'
  ARGOCD_VERSION:
    sh: yq '.argocd.defaultVersion' "{{.ROOT_DIR}}/gitops/addons/registry/core.yaml"

tasks:
  validate:
    desc: Pre-flight checks for kind-crossplane provider
    cmds:
      - printf '{{.C_STEP}}▸ Checking required CLIs...{{.C_RESET}}\n'
      - cmd: command -v {{.ITEM}} >/dev/null 2>&1 || { echo "Missing required CLI {{.ITEM}}"; exit 1; }
        for:
          var: REQUIRED_CLIS
      - printf '{{.C_STEP}}▸ Checking config.local.yaml...{{.C_RESET}}\n'
      - test -f {{.CONFIG_FILE}} || { echo "config.local.yaml not found"; exit 1; }
      - yq '.hub.clusterName' {{.CONFIG_FILE}} | grep -qv null || { echo "hub.clusterName not set in config.local.yaml"; exit 1; }
      - yq '.aws.region' {{.CONFIG_FILE}} | grep -qv null || { echo "aws.region not set in config.local.yaml"; exit 1; }
      - yq '.aws.accountId' {{.CONFIG_FILE}} | grep -qv null || { echo "aws.accountId not set in config.local.yaml"; exit 1; }
      - yq '.repo.url' {{.CONFIG_FILE}} | grep -qv null || { echo "repo.url not set in config.local.yaml"; exit 1; }
      - printf '{{.C_STEP}}▸ Checking AWS credentials...{{.C_RESET}}\n'
      - aws sts get-caller-identity >/dev/null || { echo "AWS credentials not configured"; exit 1; }
      - printf '{{.C_OK}}✓ All pre-flight checks passed.{{.C_RESET}}\n'

  init:
    desc: Verify prerequisites
    cmds:
      - cmd: command -v {{.ITEM}}
        for:
          var: REQUIRED_CLIS
      - cmd: printf '{{.C_STEP}}▸ AWS region - {{.AWS_REGION}}{{.C_RESET}}\n'

  install:
    desc: Bootstrap the platform (idempotent, with parallel phases)
    vars:
      INSTALL_START:
        sh: date +%s
    cmds:
      - task: init
      - 'printf "{{.C_INFO}}  [%ds] init done{{.C_RESET}}\n" "$(($(date +%s) - {{.INSTALL_START}}))"'
      - task: kind:create
      - 'printf "{{.C_INFO}}  [%ds] kind:create done{{.C_RESET}}\n" "$(($(date +%s) - {{.INSTALL_START}}))"'
      - task: credentials:setup
      - 'printf "{{.C_INFO}}  [%ds] credentials:setup done{{.C_RESET}}\n" "$(($(date +%s) - {{.INSTALL_START}}))"'
      - task: crossplane:setup
      - 'printf "{{.C_INFO}}  [%ds] crossplane:setup done{{.C_RESET}}\n" "$(($(date +%s) - {{.INSTALL_START}}))"'
      - task: hub:seed
      - 'printf "{{.C_INFO}}  [%ds] hub:seed done{{.C_RESET}}\n" "$(($(date +%s) - {{.INSTALL_START}}))"'
      - task: hub:wait-for-sync
      - 'printf "{{.C_INFO}}  [%ds] hub:wait-for-sync done{{.C_RESET}}\n" "$(($(date +%s) - {{.INSTALL_START}}))"'
      # Phase 1 (parallel): CloudFront+identity restart || observability seeding
      - task: install:phase1-parallel
      - 'printf "{{.C_INFO}}  [%ds] phase1-parallel done (cloudfront+restart || observability){{.C_RESET}}\n" "$(($(date +%s) - {{.INSTALL_START}}))"'
      - task: hub:wait-for-full-sync
      - 'printf "{{.C_INFO}}  [%ds] hub:wait-for-full-sync done{{.C_RESET}}\n" "$(($(date +%s) - {{.INSTALL_START}}))"'
      # Phase 1b (parallel): langfuse restart || urls || gitlab clone — all independent
      - task: install:phase1b-parallel
      - task: hub:set-overlay-repo
      - 'printf "{{.C_INFO}}  [%ds] hub:set-overlay-repo done{{.C_RESET}}\n" "$(($(date +%s) - {{.INSTALL_START}}))"'
      # Phase 2 (parallel): spoke-dev (crossplane) || spoke-prod (kro) || idc:configure
      - task: install:phase2-parallel
      - 'printf "{{.C_INFO}}  [%ds] phase2-parallel done (spokes || idc){{.C_RESET}}\n" "$(($(date +%s) - {{.INSTALL_START}}))"'
      - |
        # Pull local fleet-config so it reflects the spoke overlay changes just pushed
        LOCAL_FLEET="$HOME/environment/fleet-config"
        if [ -d "$LOCAL_FLEET/.git" ]; then
          git -C "$LOCAL_FLEET" pull --ff-only -q 2>/dev/null || true
        fi
      - 'printf "{{.C_OK}}✓ Bootstrap complete in %ds. Run task status.{{.C_RESET}}\n" "$(($(date +%s) - {{.INSTALL_START}}))"'

  install:phase1b-parallel:
    internal: true
    deps:
      - hub:restart-langfuse
      - urls

  install:phase1-parallel:
    internal: true
    deps:
      - install:phase1-cloudfront
      - install:phase1-playwright-prefetch
      - install:phase1-observability-bg

  install:phase1-observability-bg:
    internal: true
    desc: Seed observability in background — non-blocking so slow AMP provisioning doesn't delay install
    cmds:
      - |
        # Run in background. On slow accounts AMP can take 30+ min; this must not
        # block task install from completing within the CFN WaitCondition window.
        # The log is written to /tmp/observability-seed.log for post-install inspection.
        #
        # IMPORTANT: invoke the nested task from the REPO ROOT via the root Taskfile
        # namespace (task kind-crossplane:...). A bare `task secrets-manager:...`
        # spawns a new go-task process that re-resolves ROOT_DIR to THIS Taskfile's
        # own dir (cluster-providers/kind-crossplane), so CONFIG_FILE becomes
        # <here>/config.local.yaml — which does not exist (config.local.yaml lives at
        # the repo root). That made the background seed abort immediately with
        # "config.local.yaml: no such file or directory", so grafana_api_key / AMP
        # creds were never written and Grafana (external-grafana) failed to
        # reconcile. Resolve the repo root from the workshop env vars (set by
        # /etc/profile.d/workshop.sh) rather than {{.ROOT_DIR}} templating, which
        # expands empty inside this backgrounded subshell.
        REPO_ROOT="${WORKSPACE_PATH:-/home/ec2-user/environment}/${WORKING_REPO:-platform-on-eks-workshop}"
        ( cd "$REPO_ROOT" && task kind-crossplane:secrets-manager:seed-observability >> /tmp/observability-seed.log 2>&1 ) &
        printf '{{.C_INFO}}  Observability seeding running in background (log: /tmp/observability-seed.log){{.C_RESET}}\n'

  install:phase1-playwright-prefetch:
    internal: true
    desc: Pre-fetch Playwright chromium during observability wait to avoid blocking phase2
    cmds:
      - |
        if [ -d "$HOME/.cache/ms-playwright/chromium-"* ] 2>/dev/null; then
          printf '{{.C_OK}}✓ Playwright chromium already cached.{{.C_RESET}}\n'
        else
          printf '{{.C_STEP}}▸ Pre-fetching Playwright chromium (runs in parallel with observability)...{{.C_RESET}}\n'
          pip install playwright --quiet 2>/dev/null || true
          python3 -m playwright install chromium --quiet 2>/dev/null || true
          printf '{{.C_OK}}✓ Playwright chromium pre-fetched.{{.C_RESET}}\n'
        fi

  install:phase1-cloudfront:
    internal: true
    cmds:
      - task: cloudfront:hub-distribution
      # Update ingress_domain_name in the ArgoCD cluster secret now that CloudFront domain is known
      - task: hub:update-ingress-domain
      - task: hub:restart-identity-pods

  install:phase2-parallel:
    internal: true
    deps:
      - install:phase2-spoke-dev
      - install:phase2-spoke-prod

  install:phase2-spoke-dev:
    internal: true
    cmds:
      - task: spokes:enable-crossplane
        vars: { CLI_ARGS: "{{.RESOURCE_PREFIX}}-spoke-dev" }
      - task: spokes:create-capabilities
        vars: { CLI_ARGS: "{{.RESOURCE_PREFIX}}-spoke-dev" }

  install:phase2-spoke-prod:
    internal: true
    cmds:
      - task: spokes:enable-kro
        vars: { CLI_ARGS: "{{.RESOURCE_PREFIX}}-spoke-prod" }

  credentials:setup:
    desc: Create AWS credentials secret (auto-detects EC2 vs local, skips if exists)
    status:
      - kubectl -n crossplane-system get secret aws-credentials 2>/dev/null
    cmds:
      - task: credentials:refresh

  credentials:refresh:
    desc: Force-refresh AWS credentials secret (use when tokens expire)
    cmds:
      - kubectl create namespace crossplane-system --dry-run=client -o yaml | kubectl apply -f -
      - |
        set -e
        TOKEN=$(curl -s -m 2 -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600" 2>/dev/null || true)
        if [ -n "$TOKEN" ]; then
          echo "Detected EC2 — using instance profile"
          ROLE=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/iam/security-credentials/)
          CREDS=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/iam/security-credentials/$ROLE)
          AKI=$(echo "$CREDS" | jq -r .AccessKeyId)
          SAK=$(echo "$CREDS" | jq -r .SecretAccessKey)
          ST=$(echo  "$CREDS" | jq -r .Token)
        else
          # Resolve credentials via the full AWS credential provider chain
          # (env vars, SSO, assume-role, credential_process, static profile).
          # `aws configure get` only reads static keys from ~/.aws/credentials
          # and silently returns empty for SSO / Isengard / assumed-role sessions,
          # producing an empty secret and silent reconcile failures.
          AWS_PROFILE_NAME=$(yq '.aws.profile // "default"' {{.CONFIG_FILE}})
          echo "Resolving AWS credentials via credential provider chain (profile: $AWS_PROFILE_NAME)"
          if ! EXPORTED=$(aws configure export-credentials --profile "$AWS_PROFILE_NAME" --format env-no-export 2>&1); then
            echo "ERROR: Unable to resolve AWS credentials for profile '$AWS_PROFILE_NAME'."
            echo "       Run 'aws sts get-caller-identity --profile $AWS_PROFILE_NAME' to verify."
            echo "       If using Isengard / SSO, refresh your session first"
            echo "       (isengardcli, ada, aws sso login, etc.)."
            echo "       CLI output: $EXPORTED"
            exit 1
          fi
          AKI=$(echo "$EXPORTED" | sed -n 's/^AWS_ACCESS_KEY_ID=//p')
          SAK=$(echo "$EXPORTED" | sed -n 's/^AWS_SECRET_ACCESS_KEY=//p')
          ST=$(echo  "$EXPORTED" | sed -n 's/^AWS_SESSION_TOKEN=//p')
        fi
        if [ -z "$AKI" ] || [ -z "$SAK" ]; then
          echo "ERROR: Resolved credentials are empty (access key or secret missing)."
          echo "       Refusing to write an empty aws-credentials secret."
          exit 1
        fi
        # Create the file with 0600 up front so creds are never world-readable,
        # even briefly. (Task's embedded shell doesn't support `umask` as a
        # builtin, so we set the mode explicitly.)
        rm -f {{.ROOT_DIR}}/private/aws-creds.ini
        install -m 600 /dev/null {{.ROOT_DIR}}/private/aws-creds.ini
        {
          echo "[default]"
          echo "aws_access_key_id = $AKI"
          echo "aws_secret_access_key = $SAK"
          if [ -n "$ST" ]; then echo "aws_session_token = $ST"; fi
        } > {{.ROOT_DIR}}/private/aws-creds.ini
      - kubectl -n crossplane-system create secret generic aws-credentials
          --from-file=credentials={{.ROOT_DIR}}/private/aws-creds.ini
          --dry-run=client -o yaml | kubectl apply -f -
      - rm -f {{.ROOT_DIR}}/private/aws-creds.ini

  hub:kubeconfig:
    desc: Fetch hub EKS kubeconfig
    cmds:
      - rm -f {{.ROOT_DIR}}/private/hub-kubeconfig
      - aws eks update-kubeconfig --name {{.HUB_CLUSTER_NAME}} --region {{.AWS_REGION}} --alias {{.HUB_CLUSTER_NAME}} --kubeconfig {{.ROOT_DIR}}/private/hub-kubeconfig 2>&1 >/dev/null

  kind:create:
    desc: Create Kind cluster (skips if exists)
    status:
      - kind get clusters 2>/dev/null | grep -q "^{{.KIND_CLUSTER_NAME}}$"
    cmds:
      - kind create cluster --name {{.KIND_CLUSTER_NAME}} --config kind.yaml --kubeconfig {{.KUBECONFIG}}

  argocd:install:
    desc: Install ArgoCD (skips if deployed)
    status:
      - helm status argocd -n argocd 2>/dev/null | grep -q deployed
    cmds:
      - helm repo add argo https://argoproj.github.io/argo-helm --force-update
      - helm upgrade --install argocd argo/argo-cd
          --namespace argocd --create-namespace
          --version {{.ARGOCD_VERSION}}
          --wait --timeout 5m

  crossplane:setup:
    desc: Install Crossplane and providers (idempotent)
    cmds:
      - task: crossplane:helm
      - task: crossplane:providers
      - task: crossplane:provider-config
      - task: crossplane:claims

  crossplane:helm:
    status:
      - helm status crossplane -n crossplane-system 2>/dev/null | grep -q deployed
    cmds:
      - kubectl create namespace crossplane-system --dry-run=client -o yaml | kubectl apply -f -
      - helm repo add crossplane-stable https://charts.crossplane.io/stable --force-update
      - helm upgrade --install crossplane crossplane-stable/crossplane
          --namespace crossplane-system
          --version $(yq '.crossplane.defaultVersion' {{.GITOPS_ROOT}}/addons/registry/platform.yaml)
          --wait --timeout 5m

  crossplane:providers:
    status:
      - kubectl get providers.pkg.crossplane.io provider-aws-iam -o jsonpath='{.status.conditions[?(@.type=="Healthy")].status}' 2>/dev/null | grep -q True
      - kubectl get providerconfig.kubernetes.crossplane.io default 2>/dev/null
    vars:
      K8S_PROVIDER_VERSION:
        sh: yq '.crossplane-base.valuesObject.providers.kubernetes.version // "v1.2.1"' {{.GITOPS_ROOT}}/addons/registry/platform.yaml
    cmds:
      - kubectl apply -f manifests/crossplane/drc-stub.yaml
      # Apply all providers except kubernetes ProviderConfig (CRD not ready yet)
      - helm template crossplane-base {{.GITOPS_ROOT}}/addons/charts/crossplane-base
          --set providerConfig.enabled=false
          --set aws.region={{.AWS_REGION}}
          --set aws.clusterName={{.HUB_CLUSTER_NAME}}
          --set aws.accountId={{.AWS_ACCOUNT_ID}}
          --set providerResources.cpuRequest=100m
          --set providerResources.memoryRequest=256Mi
          --set functions.patchAndTransform.version=v0.10.0
          --set functions.environmentConfigs.version=v0.3.0
          --set functions.celFilter.version=v0.2.0
          --set providers.family.version=v2.5.3
          --set providers.iam.version=v2.5.3
          --set providers.iam.createIdentity=false
          --set providers.eks.version=v2.5.3
          --set providers.eks.createIdentity=false
          --set providers.ec2.version=v2.5.3
          --set providers.ec2.createIdentity=false
          --set providers.kubernetes.version={{.K8S_PROVIDER_VERSION}}
          --set providers.kubernetes.serviceAccount=provider-kubernetes
          | kubectl apply --server-side --force-conflicts -f - 2>&1 | grep -v "ProviderConfig" || true
      - kubectl wait --for=condition=Healthy --timeout=300s providers.pkg.crossplane.io --all
      - kubectl wait --for=condition=Healthy --timeout=300s functions.pkg.crossplane.io --all
      # Grant cluster-admin to provider-kubernetes (needed to manage Jobs, Secrets, etc.)
      - kubectl create clusterrolebinding provider-kubernetes-admin --clusterrole=cluster-admin --serviceaccount=crossplane-system:provider-kubernetes 2>/dev/null || true
      # Now apply the kubernetes ProviderConfig (CRD is registered after provider is healthy)
      - cmd: |
          kubectl wait --for=condition=Established crd/providerconfigs.kubernetes.crossplane.io --timeout=60s 2>/dev/null || true
          cat <<'EOF' | kubectl apply -f -
          apiVersion: kubernetes.crossplane.io/v1alpha1
          kind: ProviderConfig
          metadata:
            name: default
          spec:
            credentials:
              source: InjectedIdentity
          EOF

  crossplane:provider-config:
    status:
      - kubectl get providerconfig.aws.upbound.io default 2>/dev/null
    cmds:
      - kubectl apply -f manifests/crossplane/provider-config-bootstrap.yaml

  crossplane:claims:
    vars:
      MNG_ENABLED:
        sh: yq '.hub.managedNodeGroup.enabled // false' {{.CONFIG_FILE}}
      MNG_SETS:
        sh: |
          if [ "$(yq '.hub.managedNodeGroup.enabled // false' {{.CONFIG_FILE}})" = "true" ]; then
            SETS="--set clusters.hub.managedNodeGroup.enabled=true"
            IDX=0
            for TYPE in $(yq '.hub.managedNodeGroup.instanceTypes // ["m5.large"] | .[]' {{.CONFIG_FILE}}); do
              SETS="$SETS --set clusters.hub.managedNodeGroup.instanceTypes[$IDX]=$TYPE"
              IDX=$((IDX+1))
            done
            SETS="$SETS --set clusters.hub.managedNodeGroup.desiredSize=$(yq '.hub.managedNodeGroup.desiredSize // 2' {{.CONFIG_FILE}})"
            SETS="$SETS --set clusters.hub.managedNodeGroup.minSize=$(yq '.hub.managedNodeGroup.minSize // 1' {{.CONFIG_FILE}})"
            SETS="$SETS --set clusters.hub.managedNodeGroup.maxSize=$(yq '.hub.managedNodeGroup.maxSize // 5' {{.CONFIG_FILE}})"
            SETS="$SETS --set clusters.hub.managedNodeGroup.diskSize=$(yq '.hub.managedNodeGroup.diskSize // 50' {{.CONFIG_FILE}})"
            SETS="$SETS --set clusters.hub.managedNodeGroup.capacityType=$(yq '.hub.managedNodeGroup.capacityType // "ON_DEMAND"' {{.CONFIG_FILE}})"
            echo "$SETS"
          fi
    cmds:
      # Apply XRD and Composition first (rendered via helm template since files contain Go templates)
      - cmd: |
          helm template hub-cluster {{.GITOPS_ROOT}}/abstractions/crossplane/platform-cluster \
            --set clusters.hub.region={{.AWS_REGION}} \
            --set clusters.hub.clusterName={{.HUB_CLUSTER_NAME}} \
            --show-only templates/xrd.yaml | kubectl apply -f -
          helm template hub-cluster {{.GITOPS_ROOT}}/abstractions/crossplane/platform-cluster \
            --set clusters.hub.region={{.AWS_REGION}} \
            --set clusters.hub.clusterName={{.HUB_CLUSTER_NAME}} \
            --show-only templates/composition.yaml | kubectl apply -f -
      # Wait for XRD to generate the PlatformCluster CRD before applying the claim
      - kubectl wait --for=condition=Established xrd/xplatformclusters.platform.gitops.io --timeout=60s
      - helm template hub-cluster {{.GITOPS_ROOT}}/abstractions/crossplane/platform-cluster
          --set clusters.hub.region={{.AWS_REGION}}
          --set clusters.hub.clusterName={{.HUB_CLUSTER_NAME}}
          --set clusters.hub.kubernetesVersion={{.HUB_K8S_VERSION}}
          --set clusters.hub.vpcCidr={{.HUB_VPC_CIDR}}
          --set clusters.hub.resourcePrefix={{.RESOURCE_PREFIX}}
          {{.MNG_SETS}}
          | kubectl apply -f -
      - sed "s|CLUSTER_NAME|{{.HUB_CLUSTER_NAME}}|g" claims/argocd-capability-role.yaml | kubectl apply -f -
      # Wait for ArgoCD capability role to be ready, then patch the composite so the access entry gets its principalArn
      - cmd: |
          kubectl -n crossplane-system wait --for=condition=Ready roles.iam.aws.upbound.io/argocd-capability-role --timeout=120s 2>/dev/null || true
          ROLE_ARN=$(kubectl get role.iam.aws.upbound.io/argocd-capability-role -o jsonpath='{.status.atProvider.arn}' 2>/dev/null)
          if [ -n "$ROLE_ARN" ]; then
            XPC_NAME=$(kubectl get xplatformcluster -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
            if [ -n "$XPC_NAME" ]; then
              kubectl patch xplatformcluster "$XPC_NAME" --type merge -p "{\"spec\":{\"argoCDRoleArn\":\"$ROLE_ARN\"}}"
            fi
          fi
        ignore_error: true
      - helm template crossplane-base {{.GITOPS_ROOT}}/addons/charts/crossplane-base
          --set providerConfig.enabled=false
          --set aws.region={{.AWS_REGION}}
          --set aws.clusterName={{.HUB_CLUSTER_NAME}}
          --set aws.accountId={{.AWS_ACCOUNT_ID}}
          --set providers.iam.version=v2.5.3
          --set providers.eks.version=v2.5.3
          | kubectl apply -f -
      - helm template crossplane-pod-identity {{.GITOPS_ROOT}}/addons/charts/crossplane-pod-identity
          --set aws.region={{.AWS_REGION}}
          --set aws.clusterName={{.HUB_CLUSTER_NAME}}
          --set aws.accountId={{.AWS_ACCOUNT_ID}}
          --set identities.eso.enabled=true
          | kubectl apply -f -

  hub:seed:
    cmds:
      - task: credentials:refresh
      - printf '{{.C_STEP}}▸ Waiting for hub cluster...{{.C_RESET}}\n'
      - |
        if aws eks describe-cluster --name {{.HUB_CLUSTER_NAME}} --region {{.AWS_REGION}} \
            --query 'cluster.status' --output text 2>/dev/null | grep -q ACTIVE; then
          printf '{{.C_OK}}✓ Hub cluster already ACTIVE — skipping Crossplane XR wait.{{.C_RESET}}\n'
        else
          kubectl wait --for=condition=Ready --timeout=5400s platformclusters.platform.gitops.io/{{.HUB_CLUSTER_NAME}} -n crossplane-system || \
            printf '{{.C_ERR}}⚠ XR wait timed out — continuing via ACTIVE check below.{{.C_RESET}}\\n'
        fi
      - printf '{{.C_STEP}}▸ Verifying hub EKS cluster is ACTIVE...{{.C_RESET}}\n'
      - |
        until aws eks describe-cluster --name {{.HUB_CLUSTER_NAME}} --region {{.AWS_REGION}} --query "cluster.status" --output text 2>/dev/null | grep -q ACTIVE; do
          sleep 10
        done
      - printf '{{.C_STEP}}▸ Creating cluster admin access entry...{{.C_RESET}}\n'
      - cmd: |
          CALLER_ARN=$(aws sts get-caller-identity --query "Arn" --output text)
          if echo "$CALLER_ARN" | grep -q ":assumed-role/"; then
            PRINCIPAL_ARN=$(echo "$CALLER_ARN" | sed 's|arn:aws:sts::|arn:aws:iam::|;s|:assumed-role/|:role/|;s|/[^/]*$||')
          else
            PRINCIPAL_ARN="$CALLER_ARN"
          fi
          aws eks create-access-entry --cluster-name {{.HUB_CLUSTER_NAME}} --principal-arn "$PRINCIPAL_ARN" --type STANDARD --region {{.AWS_REGION}} --output text 2>/dev/null || true
          aws eks associate-access-policy --cluster-name {{.HUB_CLUSTER_NAME}} --principal-arn "$PRINCIPAL_ARN" --policy-arn arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy --access-scope type=cluster --region {{.AWS_REGION}} --output text 2>/dev/null || true
          echo "Access entry created for $PRINCIPAL_ARN"
      - cmd: |
          ADMIN_ROLE=$(yq '.adminRoleName // ""' {{.CONFIG_FILE}})
          if [ -n "$ADMIN_ROLE" ]; then
            ADMIN_ARN="arn:aws:iam::{{.AWS_ACCOUNT_ID}}:role/$ADMIN_ROLE"
            aws eks create-access-entry --cluster-name {{.HUB_CLUSTER_NAME}} --principal-arn "$ADMIN_ARN" --type STANDARD --region {{.AWS_REGION}} --output text 2>/dev/null || true
            aws eks associate-access-policy --cluster-name {{.HUB_CLUSTER_NAME}} --principal-arn "$ADMIN_ARN" --policy-arn arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy --access-scope type=cluster --region {{.AWS_REGION}} --output text 2>/dev/null || true
            echo "Admin access entry created for $ADMIN_ARN"
          fi
      - printf '{{.C_STEP}}▸ Ensuring EKS Pod Identity Agent addon is installed...{{.C_RESET}}\n'
      - cmd: |
          if ! aws eks describe-addon --cluster-name {{.HUB_CLUSTER_NAME}} --addon-name eks-pod-identity-agent --region {{.AWS_REGION}} --query 'addon.status' --output text 2>/dev/null | grep -qE "ACTIVE|CREATING"; then
            aws eks create-addon --cluster-name {{.HUB_CLUSTER_NAME}} --addon-name eks-pod-identity-agent --region {{.AWS_REGION}} --output text 2>/dev/null || true
            echo "EKS Pod Identity Agent addon created"
          else
            echo "EKS Pod Identity Agent addon already exists"
          fi
      - printf '{{.C_STEP}}▸ Waiting for IAM roles...{{.C_RESET}}\n'
      - kubectl -n crossplane-system wait --for=condition=Ready --timeout=300s roles.iam.aws.upbound.io/argocd-capability-role
      - printf '{{.C_STEP}}▸ Waiting for pod identity resources...{{.C_RESET}}\n'
      - kubectl -n crossplane-system wait --for=condition=Ready --timeout=300s roles.iam.aws.upbound.io --all
      - kubectl -n crossplane-system wait --for=condition=Ready --timeout=600s podidentityassociations.eks.aws.upbound.io --all
      - task: argocd:capability
      - task: hub:create-mgmt-roles
      - task: secrets-manager:seed
      - task: secrets-manager:seed-keycloak
      - task: secrets-manager:seed-secrets
      - task: hub:install-eso
      - task: hub:cluster-secret-store
      - task: hub:seed-secret
      - task: hub:apply-root-appset

  hub:create-mgmt-roles:
    desc: Create cluster-mgmt IAM roles assumed by ACK controllers (single-account prereq)
    vars:
      ACK_CAPABILITY_ROLE:
        sh: aws eks describe-capability --cluster-name {{.HUB_CLUSTER_NAME}} --capability-name ack --region {{.AWS_REGION}} --query 'capability.roleArn' --output text 2>/dev/null | sed 's|.*/||' || echo "{{.HUB_CLUSTER_NAME}}-ArgoCDCapabilityRole"
    cmds:
      - printf '{{.C_STEP}}▸ Creating cluster-mgmt IAM roles for ACK...{{.C_RESET}}\n'
      - |
        TRUST_POLICY=$(cat <<EOF
        {
          "Version": "2012-10-17",
          "Statement": [{
            "Effect": "Allow",
            "Principal": {"AWS": "arn:aws:iam::{{.AWS_ACCOUNT_ID}}:root"},
            "Action": ["sts:AssumeRole", "sts:TagSession"],
            "Condition": {"ArnLike": {"aws:PrincipalArn": [
              "arn:aws:iam::{{.AWS_ACCOUNT_ID}}:role/{{.ACK_CAPABILITY_ROLE}}",
              "arn:aws:iam::{{.AWS_ACCOUNT_ID}}:role/{{.RESOURCE_PREFIX}}-ack-*"
            ]}}
          }]
        }
        EOF
        )
        get_policies() {
          case $1 in
            ec2) echo "arn:aws:iam::aws:policy/AmazonEC2FullAccess arn:aws:iam::aws:policy/AmazonVPCFullAccess";;
            eks) echo "arn:aws:iam::aws:policy/AmazonEKSClusterPolicy arn:aws:iam::aws:policy/AmazonEKSServicePolicy arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly";;
            iam) echo "arn:aws:iam::aws:policy/IAMFullAccess";;
            ecr) echo "arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryFullAccess";;
            s3) echo "arn:aws:iam::aws:policy/AmazonS3FullAccess";;
            dynamodb) echo "arn:aws:iam::aws:policy/AmazonDynamoDBFullAccess";;
            secretsmanager) echo "arn:aws:iam::aws:policy/SecretsManagerReadWrite";;
          esac
        }
        for service in ec2 eks iam ecr s3 dynamodb secretsmanager; do
          ROLE_NAME="{{.RESOURCE_PREFIX}}-cluster-mgmt-${service}"
          if aws iam get-role --role-name "$ROLE_NAME" >/dev/null 2>&1; then
            aws iam update-assume-role-policy --role-name "$ROLE_NAME" --policy-document "$TRUST_POLICY"
          else
            aws iam create-role --role-name "$ROLE_NAME" --assume-role-policy-document "$TRUST_POLICY" --no-cli-pager >/dev/null
          fi
          for arn in $(get_policies $service); do
            aws iam attach-role-policy --role-name "$ROLE_NAME" --policy-arn "$arn" 2>/dev/null || true
          done
          echo "  ✓ $ROLE_NAME"
        done
        # Inline policies for EKS role: AccessEntry, PodIdentity, PassRole
        EKS_ROLE="{{.RESOURCE_PREFIX}}-cluster-mgmt-eks"
        aws iam put-role-policy --role-name "$EKS_ROLE" --policy-name eks-access-management --policy-document '{
          "Version": "2012-10-17",
          "Statement": [
            {"Effect": "Allow", "Action": ["eks:*"], "Resource": "*"},
            {"Effect": "Allow", "Action": ["iam:PassRole","iam:GetRole"], "Resource": "arn:aws:iam::{{.AWS_ACCOUNT_ID}}:role/{{.RESOURCE_PREFIX}}-*"}
          ]
        }'
        # Allow ACK capability role to assume cluster-mgmt roles
        aws iam put-role-policy --role-name "{{.ACK_CAPABILITY_ROLE}}" --policy-name ack-assume-role --policy-document '{
          "Version": "2012-10-17",
          "Statement": [{
            "Effect": "Allow",
            "Action": ["sts:AssumeRole", "sts:TagSession"],
            "Resource": "arn:aws:iam::{{.AWS_ACCOUNT_ID}}:role/{{.RESOURCE_PREFIX}}-cluster-mgmt-*"
          }]
        }'
      - printf '{{.C_OK}}✓ cluster-mgmt roles ready.{{.C_RESET}}\n'

  hub:install-eso:
    desc: Install External Secrets Operator on the hub cluster
    vars:
      ESO_VERSION:
        sh: yq '.external-secrets.defaultVersion' {{.GITOPS_ROOT}}/addons/registry/core.yaml
    status:
      - KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig helm status external-secrets -n external-secrets 2>/dev/null | grep -q deployed
    cmds:
      - task: hub:kubeconfig
      - KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig helm repo add external-secrets https://charts.external-secrets.io --force-update
      - KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig helm upgrade --install external-secrets external-secrets/external-secrets
          --namespace external-secrets --create-namespace
          --version {{.ESO_VERSION}}
          --set serviceAccount.name=external-secrets-sa
          --wait --timeout 5m
      - printf '{{.C_OK}}✓ External Secrets Operator installed on hub{{.C_RESET}}\n'

  hub:cluster-secret-store:
    desc: Apply ClusterSecretStore for AWS Secrets Manager on the hub cluster
    cmds:
      - task: hub:kubeconfig
      - |
        cat <<'EOF' | sed "s|AWS_REGION|{{.AWS_REGION}}|g" | KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl apply -f -
        apiVersion: external-secrets.io/v1
        kind: ClusterSecretStore
        metadata:
          name: aws-secrets-manager
        spec:
          provider:
            aws:
              service: SecretsManager
              region: AWS_REGION
        EOF
      - printf '{{.C_OK}}✓ ClusterSecretStore applied on hub{{.C_RESET}}\n'

  hub:seed-secret:
    desc: Create minimal seed cluster secret on the hub (repo coords + fleet labels only)
    vars:
      CLUSTER_ARN:
        sh: kubectl -n crossplane-system get clusters.eks.aws.upbound.io hub -o jsonpath='{.status.atProvider.arn}' 2>/dev/null || aws eks describe-cluster --name $(yq '.hub.clusterName' {{.CONFIG_FILE}}) --region {{.AWS_REGION}} --query 'cluster.arn' --output text 2>/dev/null || echo "arn:aws:eks:{{.AWS_REGION}}:$(yq '.aws.accountId' {{.CONFIG_FILE}}):cluster/$(yq '.hub.clusterName' {{.CONFIG_FILE}})"
    cmds:
      - printf '{{.C_STEP}}▸ Getting hub kubeconfig...{{.C_RESET}}\n'
      - task: hub:kubeconfig
      - printf '{{.C_STEP}}▸ Creating seed cluster secret on hub...{{.C_RESET}}\n'
      - KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl create namespace argocd --dry-run=client -o yaml | KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl apply -f -
      - |
        cat <<'EOF' | sed "s|CLUSTER_NAME|{{.HUB_CLUSTER_NAME}}|g; s|CLUSTER_ARN|{{.CLUSTER_ARN}}|g; s|FLEET_REPO_URL|{{.FLEET_REPO_URL}}|g; s|FLEET_REPO_REVISION|{{.FLEET_REPO_REVISION}}|g; s|FLEET_REPO_BASEPATH|{{.FLEET_REPO_BASEPATH}}|g; s|REPO_URL|{{.REPO_URL}}|g; s|REPO_REVISION|{{.REPO_REVISION}}|g; s|REPO_BASEPATH|{{.REPO_BASEPATH}}|g" | KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl apply -f -
        apiVersion: v1
        kind: Secret
        type: Opaque
        metadata:
          name: CLUSTER_NAME
          namespace: argocd
          annotations:
            addonsRepoURL: "REPO_URL"
            addonsRepoRevision: "REPO_REVISION"
            addonsRepoBasepath: "REPO_BASEPATH"
            fleetRepoURL: "FLEET_REPO_URL"
            fleetRepoRevision: "FLEET_REPO_REVISION"
            fleetRepoBasepath: "FLEET_REPO_BASEPATH"
            aws_cluster_name: {{.HUB_CLUSTER_NAME}}
          labels:
            argocd.argoproj.io/secret-type: cluster
            environment: control-plane
            fleet_member: control-plane
        stringData:
          name: CLUSTER_NAME
          server: "CLUSTER_ARN"
          config: '{"tlsClientConfig":{"insecure":false}}'
          project: default
        EOF
      - printf '{{.C_OK}}✓ Seed secret created on hub{{.C_RESET}}\n'
      - rm -f {{.ROOT_DIR}}/private/hub-kubeconfig

  hub:apply-root-appset:
    desc: Apply root-appset to the hub cluster
    cmds:
      - task: hub:kubeconfig
      - printf '{{.C_STEP}}▸ Applying root-appset to hub...{{.C_RESET}}\n'
      - KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl apply -f {{.GITOPS_ROOT}}/bootstrap/root-appset.yaml
      - rm -f {{.ROOT_DIR}}/private/hub-kubeconfig
      - printf '{{.C_OK}}✓ Root appset applied. Hub is now self-managing.{{.C_RESET}}\n'

  hub:update-ingress-domain:
    desc: Update ingress_domain_name in Secrets Manager metadata so ESO propagates the CloudFront domain to cluster secrets
    internal: true
    vars:
      CF_DOMAIN:
        sh: yq '.cloudfront.cloudfrontDomain // ""' {{.CONFIG_FILE}}
    cmds:
      - |
        CF="{{.CF_DOMAIN}}"
        [ -z "$CF" ] && CF=$(cat {{.ROOT_DIR}}/private/cloudfront-domain 2>/dev/null || true)
        [ -z "$CF" ] && printf '{{.C_INFO}}  Skipping ingress_domain_name update — cloudfrontDomain not set yet{{.C_RESET}}\n' && exit 0
        for SECRET_ID in {{.HUB_CLUSTER_NAME}}/config; do
          CUR=$(aws secretsmanager get-secret-value --secret-id "$SECRET_ID" --region {{.AWS_REGION}} --query SecretString --output text 2>/dev/null)
          [ -z "$CUR" ] && printf '  Skipping %s — not found\n' "$SECRET_ID" && continue
          CURRENT_VAL=$(echo "$CUR" | jq -r '.metadata | fromjson | .ingress_domain_name // empty' 2>/dev/null)
          if [ "$CURRENT_VAL" = "$CF" ]; then
            printf '  ingress_domain_name already correct in %s\n' "$SECRET_ID"
            continue
          fi
          NEW=$(echo "$CUR" | jq -c --arg cf "$CF" '.metadata = ((.metadata | fromjson | .ingress_domain_name = $cf) | tojson)')
          printf '%s' "$NEW" > /tmp/secret_ingress_update.json
          aws secretsmanager put-secret-value --secret-id "$SECRET_ID" --region {{.AWS_REGION}} \
            --secret-string file:///tmp/secret_ingress_update.json --query 'Name' --output text
          rm -f /tmp/secret_ingress_update.json
          printf '  Updated ingress_domain_name=%s in %s\n' "$CF" "$SECRET_ID"
        done
        printf '{{.C_OK}}✓ ingress_domain_name updated in Secrets Manager (ESO will propagate within 1min){{.C_RESET}}\n'

  hub:wait-for-sync:
    desc: Wait for hub ArgoCD apps to reach Synced state
    vars:
      MAX_OUTOFSYNC: '{{.MAX_OUTOFSYNC | default "5"}}'
    cmds:
      - task: hub:kubeconfig
      - printf '{{.C_STEP}}▸ Waiting for root-appset to generate apps...{{.C_RESET}}\n'
      - |
        TIMEOUT=300
        ELAPSED=0
        while [ $ELAPSED -lt $TIMEOUT ]; do
          TOTAL=$(KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl get applications.argoproj.io -n argocd --no-headers 2>/dev/null | wc -l | tr -d ' ')
          if [ "$TOTAL" -gt 3 ]; then
            printf '{{.C_INFO}}  %s apps detected, proceeding to sync check{{.C_RESET}}\n' "$TOTAL"
            break
          fi
          printf '{{.C_INFO}}  %s apps so far, waiting...{{.C_RESET}}\n' "$TOTAL"
          sleep 10
          ELAPSED=$((ELAPSED + 10))
        done
      - printf '{{.C_STEP}}▸ Waiting for hub apps to sync (max %s OutOfSync tolerated)...{{.C_RESET}}\n' "{{.MAX_OUTOFSYNC}}"
      - |
        TIMEOUT=1800
        INTERVAL=15
        ELAPSED=0
        while [ $ELAPSED -lt $TIMEOUT ]; do
          # Count only apps that are NOT in Unknown sync state (spoke apps targeting
          # non-existent clusters show Unknown and should not block the install).
          APP_OUTPUT=$(KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl get applications.argoproj.io -n argocd --no-headers 2>/dev/null || echo "")
          TOTAL=$(echo "$APP_OUTPUT" | awk '$2 != "Unknown" && NF>0' | wc -l | tr -d ' ')
          SYNCED=$(echo "$APP_OUTPUT" | awk '$2 == "Synced"' | wc -l | tr -d ' ')
          HEALTHY=$(echo "$APP_OUTPUT" | awk '$3 == "Healthy"' | wc -l | tr -d ' ')
          UNKNOWN=$(echo "$APP_OUTPUT" | awk '$2 == "Unknown"' | wc -l | tr -d ' ')
          OUTOFSYNC=$((TOTAL - SYNCED))
          printf '{{.C_INFO}}  Apps: %s/%s synced, %s out-of-sync, %s unknown/spoke (%ss elapsed){{.C_RESET}}\n' "$SYNCED" "$TOTAL" "$OUTOFSYNC" "$UNKNOWN" "$ELAPSED"
          if [ "$TOTAL" -gt 0 ] && [ "$OUTOFSYNC" -le {{.MAX_OUTOFSYNC}} ]; then
            if [ "$OUTOFSYNC" -gt 0 ]; then
              printf '{{.C_STEP}}▸ %s app(s) still OutOfSync (within tolerance):{{.C_RESET}}\n' "$OUTOFSYNC"
              echo "$APP_OUTPUT" | awk '$2 != "Synced" && $2 != "Unknown" && NF>0 {printf "  - %s (%s/%s)\n", $1, $3, $2}'
            fi
            printf '{{.C_OK}}✓ %s/%s hub apps are Synced (%s spoke apps pending).{{.C_RESET}}\n' "$SYNCED" "$TOTAL" "$UNKNOWN"
            break
          fi
          sleep $INTERVAL
          ELAPSED=$((ELAPSED + INTERVAL))
        done
        if [ $ELAPSED -ge $TIMEOUT ]; then
          printf '{{.C_ERR}}⚠ Timed out after %ss. %s hub app(s) still OutOfSync:{{.C_RESET}}\n' "$TIMEOUT" "$OUTOFSYNC"
          echo "$APP_OUTPUT" | awk '$2 != "Synced" && $2 != "Unknown" && NF>0 {printf "  - %s (%s/%s)\n", $1, $3, $2}'
          printf '{{.C_STEP}}▸ Continuing with remaining steps (spoke apps will sync when clusters are ready)...{{.C_RESET}}\n'
        fi
      - rm -f {{.ROOT_DIR}}/private/hub-kubeconfig

  urls:
    desc: Print platform URLs (alias for print-urls)
    aliases: [print-urls]
    vars:
      INGRESS_DOMAIN:
        sh: |
          if [ "{{.EXPOSURE_MODE}}" = "cloudfront" ]; then
            # In CloudFront mode the platform services (Backstage, Grafana, etc.) are on the
            # hub EKS ALB, not the CloudFront/IDE domain. Discover the ALB hostname from the hub.
            HUB_KC="{{.ROOT_DIR}}/private/hub-kubeconfig"
            [ ! -f "$HUB_KC" ] && HUB_KC="{{.ROOT_DIR}}/private/kubeconfig"
            ALB=$(kubectl --kubeconfig "$HUB_KC" get ingress -A \
              -l "app.kubernetes.io/name=backstage" \
              -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
            [ -z "$ALB" ] && ALB=$(kubectl --kubeconfig "$HUB_KC" get ingress -A \
              -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
            echo "${ALB:-{{.CLOUDFRONT_DOMAIN}}}"
          else
            echo "{{.DOMAIN}}"
          fi
      GITLAB_DOMAIN:
        sh: |
          if [ -f {{.ROOT_DIR}}/private/gitlab-cloudfront-domain ]; then
            cat {{.ROOT_DIR}}/private/gitlab-cloudfront-domain
          else
            echo "{{.DOMAIN}}"
          fi
      KC_ADMIN_PASSWORD:
        sh: aws secretsmanager get-secret-value --secret-id {{.HUB_CLUSTER_NAME}}/keycloak --region {{.AWS_REGION}} --query 'SecretString' --output text 2>/dev/null | jq -r '.keycloak_admin_password // empty'
      USER_PASSWORD:
        sh: aws secretsmanager get-secret-value --secret-id {{.HUB_CLUSTER_NAME}}/keycloak --region {{.AWS_REGION}} --query 'SecretString' --output text 2>/dev/null | jq -r '.user_password // "workshop-user-2026"'
      ARGOCD_URL:
        sh: aws eks describe-capability --cluster-name {{.HUB_CLUSTER_NAME}} --capability-name argocd --query 'capability.configuration.argoCd.serverUrl' --output text --region {{.AWS_REGION}} 2>/dev/null || echo ""
    cmds:
      - |
        printf '{{.C_OK}}Platform URLs{{.C_RESET}}\n'
        printf '  Backstage:  https://{{.INGRESS_DOMAIN}}/backstage\n'
        printf '  Keycloak:   https://{{.INGRESS_DOMAIN}}/keycloak\n'
        printf '  Argo WF:    https://{{.INGRESS_DOMAIN}}/argo-workflows\n'
        printf '  Kargo:      https://{{.INGRESS_DOMAIN}}/\n'
        printf '  Grafana:    https://{{.INGRESS_DOMAIN}}/grafana\n'
        printf '  GitLab:     https://{{.GITLAB_DOMAIN}}\n'
        printf '  ArgoCD:     {{.ARGOCD_URL}}\n'
        printf '\n'
        printf '{{.C_INFO}}Credentials{{.C_RESET}}\n'
        printf '  User:       user1 / {{.USER_PASSWORD}}\n'
        printf '  Keycloak:   admin / {{.KC_ADMIN_PASSWORD}}\n'


  hub:set-overlay-repo:
    desc: >-
      Wire overlay_repo_url -> GitLab fleet-config on the hub cluster config so
      every overlay-aware Argo app (incl. multi-acct) reads $overlay from
      fleet-config instead of falling back to the GitHub addons repo. Runs LATE
      (after GitLab + fleet-config exist) because $overlay is a real Argo source:
      pointing it at a non-existent/unauthenticated repo breaks ALL overlay-aware
      apps. Self-protecting: verifies reachability, registers an ArgoCD repo
      credential, flips <hub>/config (ESO reconciles the cluster secret), then
      verifies the flip resolved and auto-reverts if it did not. Idempotent.
    vars:
      GITLAB_CF_DOMAIN:
        sh: |
          if [ -f {{.ROOT_DIR}}/private/gitlab-cloudfront-domain ]; then
            cat {{.ROOT_DIR}}/private/gitlab-cloudfront-domain
          else
            echo "{{.DOMAIN}}"
          fi
      GIT_USERNAME:
        sh: yq '.gitUsername // "user1"' {{.CONFIG_FILE}}
      GIT_PASSWORD:
        sh: yq '.hub.gitlabRootPassword // ""' {{.CONFIG_FILE}} | grep -v '^$' || (aws secretsmanager get-secret-value --secret-id {{.HUB_CLUSTER_NAME}}/keycloak --region {{.AWS_REGION}} --query 'SecretString' --output text 2>/dev/null | jq -r '.user_password')
      # Root of the fleet-config overlay structure (configs/, overlays/) per the
      # GitLab init-job seed. Keep "" unless the overlay repo nests under a prefix.
      OVERLAY_REPO_BASEPATH: ""
    cmds:
      - |
        OVERLAY_URL="https://{{.GITLAB_CF_DOMAIN}}/{{.GIT_USERNAME}}/fleet-config.git"
        SECRET_KEY="{{.HUB_CLUSTER_NAME}}/config"
        KC="{{.ROOT_DIR}}/private/hub-kubeconfig"

        # 1. Reachability guard. $overlay is a REAL Argo source — never point it at
        #    an unreachable repo. This is one shell block, so exit 0 here correctly
        #    skips ALL wiring below (the earlier multi-block version did not).
        #    fleet-config is created asynchronously by the gitlab-init Job, so it
        #    can be a minute or two behind this step. Previously we skipped on the
        #    first miss — but then the overlay was never wired to fleet-config and
        #    the spoke entries that enable-crossplane/enable-kro push later were
        #    IGNORED by the appset (hub kept reading the GitHub addons fallback),
        #    so NO spoke EKS clusters were ever provisioned. Wait (up to ~5min)
        #    for it to become reachable before deciding.
        FLEET_LS="https://{{.GIT_USERNAME}}:{{.GIT_PASSWORD}}@{{.GITLAB_CF_DOMAIN}}/{{.GIT_USERNAME}}/fleet-config.git"
        printf '{{.C_STEP}}▸ Verifying fleet-config overlay repo is reachable...{{.C_RESET}}\n'
        FLEET_OK=false
        for i in $(seq 1 30); do
          if git ls-remote "$FLEET_LS" >/dev/null 2>&1; then FLEET_OK=true; break; fi
          sleep 10
        done
        if [ "$FLEET_OK" != true ]; then
          printf '{{.C_ERR}}⚠ fleet-config not reachable after 5min — skipping overlay wiring (no change made).{{.C_RESET}}\n'
          printf '{{.C_INFO}}  Re-run later: task kind-crossplane:hub:set-overlay-repo{{.C_RESET}}\n'
          exit 0
        fi
        printf '{{.C_OK}}✓ fleet-config reachable.{{.C_RESET}}\n'

        # 2. Hub kubeconfig (inline so the guard governs everything)
        rm -f "$KC"
        aws eks update-kubeconfig --name {{.HUB_CLUSTER_NAME}} --region {{.AWS_REGION}} --alias {{.HUB_CLUSTER_NAME}} --kubeconfig "$KC" >/dev/null

        # 3. ArgoCD repo credential for the private GitLab fleet-config repo
        printf '{{.C_STEP}}▸ Registering ArgoCD repository credential for fleet-config...{{.C_RESET}}\n'
        cat <<EOF | KUBECONFIG="$KC" kubectl apply -f -
        apiVersion: v1
        kind: Secret
        metadata:
          name: fleet-config-repo
          namespace: argocd
          labels:
            argocd.argoproj.io/secret-type: repository
        stringData:
          type: git
          url: https://{{.GITLAB_CF_DOMAIN}}/{{.GIT_USERNAME}}/fleet-config.git
          username: "{{.GIT_USERNAME}}"
          password: "{{.GIT_PASSWORD}}"
        EOF

        # 3a. ArgoCD repo-creds credential TEMPLATE for all repos under the user's GitLab
        #     namespace. Backstage scaffolder creates per-app GitLab repos
        #     (https://<gitlab>/{{.GIT_USERNAME}}/<app>.git) that ArgoCD must pull; without a
        #     matching credential template those CD Applications fail with ComparisonError.
        #     A repo-creds secret applies to every repository whose URL starts with `url`.
        printf '{{.C_STEP}}▸ Registering ArgoCD repo-creds for {{.GIT_USERNAME}} GitLab namespace...{{.C_RESET}}\n'
        cat <<EOF | KUBECONFIG="$KC" kubectl apply -f -
        apiVersion: v1
        kind: Secret
        metadata:
          name: gitlab-user-repo-creds
          namespace: argocd
          labels:
            argocd.argoproj.io/secret-type: repo-creds
        stringData:
          type: git
          url: https://{{.GITLAB_CF_DOMAIN}}/{{.GIT_USERNAME}}
          username: "{{.GIT_USERNAME}}"
          password: "{{.GIT_PASSWORD}}"
        EOF

        # 3b. Snapshot the CURRENT overlay wiring BEFORE touching anything. This lets us
        #     (a) skip entirely when it is already correct, and (b) on failure restore the
        #     PREVIOUS good value instead of dropping to the GitHub base (clusters:{}),
        #     which is what cascade-deleted live spoke clusters on re-install.
        EXISTING=$(aws secretsmanager get-secret-value --secret-id "$SECRET_KEY" --region {{.AWS_REGION}} --query SecretString --output text)
        PREV_URL=$(echo "$EXISTING" | jq -r '(.metadata | fromjson).overlay_repo_url // ""')
        PREV_REV=$(echo "$EXISTING" | jq -r '(.metadata | fromjson).overlay_repo_revision // ""')
        PREV_BP=$(echo "$EXISTING"  | jq -r '(.metadata | fromjson).overlay_repo_basepath // ""')

        # Idempotent fast-path: overlay already wired to the target repo -> leave it
        # untouched. Never re-flip/verify/revert an already-working overlay, since a
        # transient verify hiccup must never unset a good overlay.
        if [ "$PREV_URL" = "$OVERLAY_URL" ]; then
          printf '{{.C_OK}}✓ Overlay already wired to fleet-config (%s) — leaving untouched (idempotent).{{.C_RESET}}\n' "$OVERLAY_URL"
          rm -f "$KC"
          exit 0
        fi

        # 4. Flip overlay_* in <hub>/config (ESO reconciles the cluster secret annotations)
        printf '{{.C_STEP}}▸ Wiring overlay_repo_url into %s...{{.C_RESET}}\n' "$SECRET_KEY"
        EXISTING=$(aws secretsmanager get-secret-value --secret-id "$SECRET_KEY" --region {{.AWS_REGION}} --query SecretString --output text)
        UPDATED=$(echo "$EXISTING" | jq --arg url "$OVERLAY_URL" --arg rev "main" --arg bp "{{.OVERLAY_REPO_BASEPATH}}" \
          '.metadata = (.metadata | fromjson | . + {overlay_repo_url: $url, overlay_repo_revision: $rev, overlay_repo_basepath: $bp} | tojson)')
        aws secretsmanager put-secret-value --secret-id "$SECRET_KEY" --secret-string "$UPDATED" --region {{.AWS_REGION}} >/dev/null
        echo "Set overlay_repo_url=$OVERLAY_URL (basepath='{{.OVERLAY_REPO_BASEPATH}}')"

        # 5. Force ESO re-sync; wait until the new overlay actually PROPAGATES to the
        #    cluster-addons app source (avoids the false-positive the old verify had).
        ES=$(KUBECONFIG="$KC" kubectl -n argocd get externalsecret -o name 2>/dev/null | grep -i fleet-secret | head -1 || true)
        [ -n "$ES" ] && KUBECONFIG="$KC" kubectl -n argocd annotate "$ES" force-sync="$(date +%s)" --overwrite >/dev/null 2>&1 || true
        printf '{{.C_STEP}}▸ Waiting for cluster-addons to pick up the new overlay source...{{.C_RESET}}\n'
        PROPAGATED=false
        for i in $(seq 1 30); do
          SRC=$(KUBECONFIG="$KC" kubectl -n argocd get application cluster-addons -o jsonpath='{.spec.sources[?(@.ref=="overlay")].repoURL}' 2>/dev/null || echo "")
          [ "$SRC" = "$OVERLAY_URL" ] && { PROPAGATED=true; break; }
          sleep 10
        done

        # 6. Verify it resolves cleanly; auto-revert on any ComparisonError/InvalidSpec.
        OK=false
        if [ "$PROPAGATED" = true ]; then
          printf '{{.C_STEP}}▸ Overlay propagated; verifying clean resolution...{{.C_RESET}}\n'
          for i in $(seq 1 24); do
            SYNC=$(KUBECONFIG="$KC" kubectl -n argocd get application cluster-addons -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "")
            ERR=$(KUBECONFIG="$KC" kubectl -n argocd get application cluster-addons -o jsonpath='{range .status.conditions[*]}{.type}{"\n"}{end}' 2>/dev/null | grep -iE "error|invalid" || true)
            if [ -z "$ERR" ] && { [ "$SYNC" = "Synced" ] || [ "$SYNC" = "OutOfSync" ]; }; then OK=true; break; fi
            printf '{{.C_INFO}}  waiting for clean resolution (sync=%s) (%d/24)...{{.C_RESET}}\n' "$SYNC" "$i"
            sleep 10
          done
        else
          printf '{{.C_ERR}}⚠ Overlay did not propagate to cluster-addons in time.{{.C_RESET}}\n'
        fi

        if [ "$OK" != true ]; then
          EXISTING=$(aws secretsmanager get-secret-value --secret-id "$SECRET_KEY" --region {{.AWS_REGION}} --query SecretString --output text)
          if [ -n "$PREV_URL" ]; then
            # A previous overlay was already wired — RESTORE it rather than dropping to
            # the GitHub base. Falling back to base renders clusters:{} and would
            # cascade-delete live spoke clusters; restoring keeps them intact.
            printf '{{.C_ERR}}⚠ New overlay not resolving cleanly — restoring previous overlay (%s).{{.C_RESET}}\n' "$PREV_URL"
            REVERTED=$(echo "$EXISTING" | jq --arg url "$PREV_URL" --arg rev "$PREV_REV" --arg bp "$PREV_BP" \
              '.metadata = (.metadata | fromjson | . + {overlay_repo_url: $url, overlay_repo_revision: $rev, overlay_repo_basepath: $bp} | tojson)')
          else
            # No overlay was set before this run — clean rollback to the GitHub base.
            printf '{{.C_ERR}}⚠ Overlay not resolving cleanly and none was set before — rolling back to GitHub base.{{.C_RESET}}\n'
            REVERTED=$(echo "$EXISTING" | jq '.metadata = (.metadata | fromjson | del(.overlay_repo_url, .overlay_repo_revision, .overlay_repo_basepath) | tojson)')
          fi
          aws secretsmanager put-secret-value --secret-id "$SECRET_KEY" --secret-string "$REVERTED" --region {{.AWS_REGION}} >/dev/null
          [ -n "$ES" ] && KUBECONFIG="$KC" kubectl -n argocd annotate "$ES" force-sync="$(date +%s)" --overwrite >/dev/null 2>&1 || true
          # Only strip the cluster-secret annotations on a true rollback-to-base (no prev);
          # for a restore, let ESO reconcile the previous values back from SecretsManager.
          if [ -z "$PREV_URL" ]; then
            KUBECONFIG="$KC" kubectl -n argocd annotate secret {{.HUB_CLUSTER_NAME}} overlay_repo_url- overlay_repo_revision- overlay_repo_basepath- >/dev/null 2>&1 || true
          fi
          printf '{{.C_ERR}}  Fix GitLab reachability/credential, then re-run.{{.C_RESET}}\n'
          rm -f "$KC"
          exit 0
        fi
        printf '{{.C_OK}}✓ Overlay wired to fleet-config and resolving fleet-wide (hub + spokes).{{.C_RESET}}\n'
        rm -f "$KC"

  spokes:enable-crossplane:
    desc: "Enable a spoke cluster via Crossplane (usage: task spokes:enable-crossplane -- <cluster-name>)"
    vars:
      CLUSTER: '{{.CLI_ARGS}}'
      GITLAB_CF_DOMAIN:
        sh: |
          if [ -f {{.ROOT_DIR}}/private/gitlab-cloudfront-domain ]; then
            cat {{.ROOT_DIR}}/private/gitlab-cloudfront-domain
          else
            echo "{{.DOMAIN}}"
          fi
      GIT_PASSWORD:
        sh: yq '.hub.gitlabRootPassword // ""' {{.CONFIG_FILE}} | grep -v '^$' || (aws secretsmanager get-secret-value --secret-id {{.HUB_CLUSTER_NAME}}/keycloak --region {{.AWS_REGION}} --query 'SecretString' --output text 2>/dev/null | jq -r '.user_password')
    cmds:
      - |
        if [ -z "{{.CLUSTER}}" ]; then echo "Usage: task spokes:enable-crossplane -- <cluster-name>"; exit 1; fi
        FLEET_URL="https://{{.GIT_USERNAME}}:{{.GIT_PASSWORD}}@{{.GITLAB_CF_DOMAIN}}/{{.GIT_USERNAME}}/fleet-config.git"
        # fleet-config is created asynchronously by the gitlab-init Job (Helm
        # post-install hook, which waits for GitLab readiness), so this task can
        # race ahead of it. Cloning an absent repo left $REPO_DIR without a .git
        # dir and the later `git add -A` failed with exit 128, taking down
        # `task install` (install:phase2-spoke-dev). Wait (up to ~5min) for the
        # repo to be reachable, then verify the clone produced a git repo.
        printf '{{.C_STEP}}▸ Waiting for fleet-config repo to be reachable...{{.C_RESET}}\n'
        for i in $(seq 1 30); do
          git ls-remote "$FLEET_URL" >/dev/null 2>&1 && break
          if [ "$i" -eq 30 ]; then
            printf '{{.C_ERR}}⚠ fleet-config not reachable after 5min — cannot enable spoke {{.CLUSTER}} via Crossplane.{{.C_RESET}}\n'
            printf '{{.C_INFO}}  GitLab/gitlab-init may still be initializing. Re-run later: task kind-crossplane:spokes:enable-crossplane -- {{.CLUSTER}}{{.C_RESET}}\n'
            exit 1
          fi
          sleep 10
        done
        printf '{{.C_OK}}✓ fleet-config reachable.{{.C_RESET}}\n'
        REPO_DIR=$(mktemp -d)
        git clone "$FLEET_URL" "$REPO_DIR"
        if [ ! -d "$REPO_DIR/.git" ]; then
          printf '{{.C_ERR}}⚠ fleet-config clone failed — aborting enable-crossplane for {{.CLUSTER}}.{{.C_RESET}}\n'
          rm -rf "$REPO_DIR"
          exit 1
        fi
        mkdir -p "$REPO_DIR/gitops/fleet/spoke-values/tenants/workshop/crossplane-clusters"
        XP_VALUES="$REPO_DIR/gitops/fleet/spoke-values/tenants/workshop/crossplane-clusters/values.yaml"
        # Idempotency: keep the existing vpcCidr if this spoke is already enabled so
        # re-running install does not generate a new random CIDR and churn the VPC.
        if [ -f "$XP_VALUES" ] && yq -e '.clusters."{{.CLUSTER}}".vpcCidr' "$XP_VALUES" >/dev/null 2>&1; then
          echo "  Spoke {{.CLUSTER}} already has a vpcCidr — keeping existing values (idempotent)."
        else
          # adminRoleArn grants the console/participant admin role cluster-admin on
          # the spoke. adminInstanceRoleArn grants the IDE/instance *SharedRole* a
          # SECOND cluster-admin access entry — required so `kubectl` run from the
          # IDE (which assumes the instance role, NOT adminRoleName) works against
          # the spoke. create-config.sh deliberately excludes the SharedRole from
          # adminRoleName, so we detect it here. Both are idempotent / optional.
          ADMIN_ROLE=$(yq '.adminRoleName // ""' {{.CONFIG_FILE}})
          ADMIN_ARN_LINE=""
          if [ -n "$ADMIN_ROLE" ]; then
            ADMIN_ARN_LINE="    adminRoleArn: arn:aws:iam::{{.AWS_ACCOUNT_ID}}:role/$ADMIN_ROLE"
          fi
          INSTANCE_ROLE=$(aws iam list-roles --query "Roles[?contains(RoleName,'SharedRole')].RoleName | [0]" --output text 2>/dev/null || echo "")
          ADMIN_INSTANCE_ARN_LINE=""
          if [ -n "$INSTANCE_ROLE" ] && [ "$INSTANCE_ROLE" != "None" ] && [ "$INSTANCE_ROLE" != "null" ]; then
            ADMIN_INSTANCE_ARN_LINE="    adminInstanceRoleArn: arn:aws:iam::{{.AWS_ACCOUNT_ID}}:role/$INSTANCE_ROLE"
          fi
          cat > "$XP_VALUES" <<EOF
        clusters:
          {{.CLUSTER}}:
            clusterName: {{.CLUSTER}}
            vpcCidr: "10.$(printf '%s' '{{.CLUSTER}}' | cksum | awk '{print ($1 % 253) + 2}').0.0/16"
            kubernetesVersion: "{{.K8S_VERSION}}"
            autoMode: true
            resourcePrefix: {{.RESOURCE_PREFIX}}
        $ADMIN_ARN_LINE
        $ADMIN_INSTANCE_ARN_LINE
        EOF
        fi
        # Fleet member file: only Crossplane/Terraform spokes need a fleet-secret
        # ArgoCD registration. KRO spokes do NOT (their cluster Secret is created by
        # the EksclusterWithVpc RGD). The fleet-secrets appset discovers members from
        # the overlay (fleet-config), so write it here. environment is derived from
        # the cluster name (dev/prod/staging/test), defaulting to dev.
        ENV=$(echo "{{.CLUSTER}}" | grep -oE 'prod|staging|test|dev' | head -1); ENV="${ENV:-dev}"
        mkdir -p "$REPO_DIR/gitops/fleet/members/{{.CLUSTER}}"
        cat > "$REPO_DIR/gitops/fleet/members/{{.CLUSTER}}/values.yaml" <<EOF
        clusterName: {{.CLUSTER}}
        labels:
          environment: ${ENV}
          tenant: workshop
        EOF
        cd "$REPO_DIR"
        git add -A
        if git diff --cached --quiet; then
          printf '{{.C_INFO}}  No fleet-config changes for {{.CLUSTER}} — already enabled (idempotent).{{.C_RESET}}\n'
        else
          git commit -m "feat: enable spoke {{.CLUSTER}} via Crossplane (+ fleet member)"
          PUSHED=false
          for i in 1 2 3; do
            # Ensure fleet-config main branch is not protected before pushing
            docker exec gitlab-gitlab-1 gitlab-rails runner "u=User.find_by(username:'user1'); p=Project.find_by(path:'fleet-config',namespace_id:u&.namespace_id); ProtectedBranch.where(project:p).destroy_all" 2>/dev/null || true
            if git push 2>&1; then PUSHED=true; break; fi
            echo "  Push attempt $i failed, rebasing..."
            git pull --rebase 2>&1 && sleep 2
          done
          if [ "$PUSHED" != "true" ]; then
            printf '{{.C_ERR}}\u26a0 fleet-config push failed after 3 attempts.{{.C_RESET}}\n'
            exit 1
          fi
        fi
        rm -rf "$REPO_DIR"
        # Refresh the local fleet-config checkout so the committed overlay change is
        # visible in ~/environment/fleet-config (the task pushes from a temp clone).
        # Best-effort and non-fatal: skipped if absent, warns if not fast-forwardable.
        LOCAL_FLEET="$HOME/environment/fleet-config"
        if [ -d "$LOCAL_FLEET/.git" ]; then
          (git -C "$LOCAL_FLEET" fetch origin -q && git -C "$LOCAL_FLEET" pull --ff-only -q) \
            && printf '{{.C_INFO}}  Refreshed local fleet-config checkout.{{.C_RESET}}\n' \
            || printf '{{.C_INFO}}  Local fleet-config not auto-updated — run: git -C %s pull{{.C_RESET}}\n' "$LOCAL_FLEET"
        fi
        printf '{{.C_OK}}✓ Spoke {{.CLUSTER}} enabled via Crossplane in fleet-config overlay.{{.C_RESET}}\n'

  spokes:create-capabilities:
    desc: "Create KRO + ACK EKS Capabilities on a Crossplane-provisioned spoke (usage: task spokes:create-capabilities -- <cluster-name>)"
    # KRO-path spokes get their kro/ACK capabilities declaratively from the EksclusterWithVpc
    # RGD. Crossplane-path spokes do NOT, so create them here the same way the hub does
    # (aws eks create-capability), with per-spoke capability IAM roles. Idempotent.
    vars:
      CLUSTER: '{{.CLI_ARGS}}'
    cmds:
      - |
        set -e
        if [ -z "{{.CLUSTER}}" ]; then echo "Usage: task spokes:create-capabilities -- <cluster-name>"; exit 1; fi
        CLUSTER="{{.CLUSTER}}"
        REGION="{{.AWS_REGION}}"
        ACCOUNT="{{.AWS_ACCOUNT_ID}}"
        PREFIX="{{.RESOURCE_PREFIX}}"
        # CLUSTER already carries the resource prefix (e.g. peeks-spoke-staging), so the
        # capability role name is just <cluster>-<type>-capability-role — prepending PREFIX
        # again would double it (peeks-peeks-...). PREFIX is still used below for the
        # cluster-mgmt-* assume-role resource ARNs.
        ACK_ROLE_NAME="${CLUSTER}-ack-capability-role"
        KRO_ROLE_NAME="${CLUSTER}-kro-capability-role"

        # Wait for the Crossplane-provisioned spoke EKS cluster to be ACTIVE (up to ~90 min).
        printf '{{.C_STEP}}▸ [%s] Waiting for spoke EKS cluster ACTIVE...{{.C_RESET}}\n' "$CLUSTER"
        i=0
        until aws eks describe-cluster --name "$CLUSTER" --region "$REGION" --query 'cluster.status' --output text 2>/dev/null | grep -q ACTIVE; do
          i=$((i+1)); [ "$i" -ge 360 ] && { printf '{{.C_ERR}}⚠ %s not ACTIVE after timeout — skipping capability creation.{{.C_RESET}}\n' "$CLUSTER"; exit 0; }
          sleep 15
        done

        ASSUME_DOC='{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":{"Service":"capabilities.eks.amazonaws.com"},"Action":["sts:AssumeRole","sts:TagSession"]}]}'

        # --- ACK capability role (AssumeWorkloadRoles + ManageIRSARoles) ---
        printf '{{.C_STEP}}▸ [%s] Ensuring ACK capability role %s...{{.C_RESET}}\n' "$CLUSTER" "$ACK_ROLE_NAME"
        aws iam get-role --role-name "$ACK_ROLE_NAME" >/dev/null 2>&1 || \
          aws iam create-role --role-name "$ACK_ROLE_NAME" --assume-role-policy-document "$ASSUME_DOC" >/dev/null
        aws iam put-role-policy --role-name "$ACK_ROLE_NAME" --policy-name AssumeWorkloadRoles --policy-document \
          "{\"Version\":\"2012-10-17\",\"Statement\":[{\"Effect\":\"Allow\",\"Action\":[\"sts:AssumeRole\",\"sts:TagSession\"],\"Resource\":[\"arn:aws:iam::${ACCOUNT}:role/${PREFIX}-cluster-mgmt-*\"]}]}" >/dev/null
        aws iam put-role-policy --role-name "$ACK_ROLE_NAME" --policy-name ManageIRSARoles --policy-document \
          "{\"Version\":\"2012-10-17\",\"Statement\":[{\"Effect\":\"Allow\",\"Action\":[\"iam:GetRole\",\"iam:CreateRole\",\"iam:DeleteRole\",\"iam:TagRole\",\"iam:UntagRole\",\"iam:UpdateRole\",\"iam:UpdateAssumeRolePolicy\",\"iam:AttachRolePolicy\",\"iam:DetachRolePolicy\",\"iam:ListAttachedRolePolicies\",\"iam:ListRolePolicies\",\"iam:ListRoleTags\",\"iam:ListInstanceProfilesForRole\",\"iam:PutRolePolicy\",\"iam:DeleteRolePolicy\",\"iam:GetRolePolicy\"],\"Resource\":[\"arn:aws:iam::${ACCOUNT}:role/${CLUSTER}-*\"]}]}" >/dev/null
        ACK_ROLE_ARN="arn:aws:iam::${ACCOUNT}:role/${ACK_ROLE_NAME}"

        # --- KRO capability role (AmazonEKSClusterPolicy) ---
        printf '{{.C_STEP}}▸ [%s] Ensuring KRO capability role %s...{{.C_RESET}}\n' "$CLUSTER" "$KRO_ROLE_NAME"
        aws iam get-role --role-name "$KRO_ROLE_NAME" >/dev/null 2>&1 || \
          aws iam create-role --role-name "$KRO_ROLE_NAME" --assume-role-policy-document "$ASSUME_DOC" >/dev/null
        aws iam attach-role-policy --role-name "$KRO_ROLE_NAME" --policy-arn arn:aws:iam::aws:policy/AmazonEKSClusterPolicy >/dev/null 2>&1 || true
        KRO_ROLE_ARN="arn:aws:iam::${ACCOUNT}:role/${KRO_ROLE_NAME}"

        # --- Create the capabilities (idempotent) ---
        for cap in "kro:KRO:$KRO_ROLE_ARN" "ack:ACK:$ACK_ROLE_ARN"; do
          NAME="${cap%%:*}"; rest="${cap#*:}"; TYPE="${rest%%:*}"; ROLE_ARN="${rest#*:}"
          STATUS=$(aws eks describe-capability --cluster-name "$CLUSTER" --capability-name "$NAME" --region "$REGION" --query 'capability.status' --output text 2>/dev/null || echo "NOT_FOUND")
          if [ "$STATUS" = "NOT_FOUND" ]; then
            printf '{{.C_STEP}}▸ [%s] Creating %s capability...{{.C_RESET}}\n' "$CLUSTER" "$TYPE"
            # The capability role was just created/updated above; EKS may reject
            # CreateCapability with "trust policy is invalid" until IAM has
            # propagated the role's trust policy. Retry on that transient error.
            j=0
            until aws eks create-capability --region "$REGION" --cluster-name "$CLUSTER" --capability-name "$NAME" --type "$TYPE" --role-arn "$ROLE_ARN" --delete-propagation-policy RETAIN >/dev/null 2>/tmp/create-cap-err; do
              j=$((j+1))
              if [ "$j" -ge 12 ]; then
                printf '{{.C_ERR}}⚠ [%s] %s capability creation failed after retries:{{.C_RESET}}\n' "$CLUSTER" "$TYPE"; cat /tmp/create-cap-err; exit 1
              fi
              if grep -q "trust policy" /tmp/create-cap-err; then
                printf '{{.C_INFO}}  [%s] Waiting for IAM trust policy propagation (attempt %s)...{{.C_RESET}}\n' "$CLUSTER" "$j"
                sleep 10
              else
                cat /tmp/create-cap-err; exit 1
              fi
            done
          else
            printf '{{.C_INFO}}  [%s] %s capability already exists (%s).{{.C_RESET}}\n' "$CLUSTER" "$TYPE" "$STATUS"
          fi
        done

        # --- Wait for both ACTIVE ---
        for NAME in kro ack; do
          i=0
          until aws eks describe-capability --cluster-name "$CLUSTER" --capability-name "$NAME" --region "$REGION" --query 'capability.status' --output text 2>/dev/null | grep -q ACTIVE; do
            i=$((i+1)); [ "$i" -ge 40 ] && { printf '{{.C_ERR}}⚠ [%s] %s capability not ACTIVE after timeout.{{.C_RESET}}\n' "$CLUSTER" "$NAME"; break; }
            sleep 15
          done
        done
        printf '{{.C_OK}}✓ [%s] KRO + ACK capabilities created.{{.C_RESET}}\n' "$CLUSTER"

  spokes:enable-kro:
    desc: "Enable a spoke cluster via KRO (usage: task spokes:enable-kro -- <cluster-name>)"
    vars:
      CLUSTER: '{{.CLI_ARGS}}'
      GITLAB_CF_DOMAIN:
        sh: |
          if [ -f {{.ROOT_DIR}}/private/gitlab-cloudfront-domain ]; then
            cat {{.ROOT_DIR}}/private/gitlab-cloudfront-domain
          else
            echo "{{.DOMAIN}}"
          fi
      GIT_PASSWORD:
        sh: yq '.hub.gitlabRootPassword // ""' {{.CONFIG_FILE}} | grep -v '^$' || (aws secretsmanager get-secret-value --secret-id {{.HUB_CLUSTER_NAME}}/keycloak --region {{.AWS_REGION}} --query 'SecretString' --output text 2>/dev/null | jq -r '.user_password')
    cmds:
      - |
        if [ -z "{{.CLUSTER}}" ]; then echo "Usage: task spokes:enable-kro -- <cluster-name>"; exit 1; fi
        FLEET_URL="https://{{.GIT_USERNAME}}:{{.GIT_PASSWORD}}@{{.GITLAB_CF_DOMAIN}}/{{.GIT_USERNAME}}/fleet-config.git"
        # fleet-config is created asynchronously by the gitlab-init Job (Helm
        # post-install hook), which itself waits for GitLab to become ready. When
        # enable-kro runs in phase2 it can race ahead of that job. Cloning an
        # absent/empty repo previously left $REPO_DIR without a .git dir, so the
        # later `git add -A` failed with exit 128 and took down the whole
        # `task install`. Wait (up to ~5min) for the repo to be reachable, then
        # verify the clone actually produced a git repo before proceeding.
        printf '{{.C_STEP}}▸ Waiting for fleet-config repo to be reachable...{{.C_RESET}}\n'
        for i in $(seq 1 30); do
          git ls-remote "$FLEET_URL" >/dev/null 2>&1 && break
          if [ "$i" -eq 30 ]; then
            printf '{{.C_ERR}}⚠ fleet-config not reachable after 5min — cannot enable spoke {{.CLUSTER}} via KRO.{{.C_RESET}}\n'
            printf '{{.C_INFO}}  GitLab/gitlab-init may still be initializing. Re-run later: task kind-crossplane:spokes:enable-kro -- {{.CLUSTER}}{{.C_RESET}}\n'
            exit 1
          fi
          sleep 10
        done
        printf '{{.C_OK}}✓ fleet-config reachable.{{.C_RESET}}\n'
        REPO_DIR=$(mktemp -d)
        git clone "$FLEET_URL" "$REPO_DIR"
        if [ ! -d "$REPO_DIR/.git" ]; then
          printf '{{.C_ERR}}⚠ fleet-config clone failed — aborting enable-kro for {{.CLUSTER}}.{{.C_RESET}}\n'
          rm -rf "$REPO_DIR"
          exit 1
        fi
        mkdir -p "$REPO_DIR/gitops/fleet/spoke-values/tenants/workshop/kro-clusters/clusters"
        cat > "$REPO_DIR/gitops/fleet/spoke-values/tenants/workshop/kro-clusters/clusters/{{.CLUSTER}}.json" <<EOF
        {"clusterName": "{{.CLUSTER}}"}
        EOF
        # Deterministic second octet derived from cluster name (stable across re-runs).
        # Uses cksum to hash the name into a value 2-254.
        KRO_VALUES="$REPO_DIR/gitops/fleet/spoke-values/tenants/workshop/kro-clusters/values.yaml"
        if [ -f "$KRO_VALUES" ] && yq -e '.clusters."{{.CLUSTER}}".cidr.vpcCidr' "$KRO_VALUES" >/dev/null 2>&1; then
          echo "  Spoke {{.CLUSTER}} already has a CIDR — keeping existing values (idempotent)."
        else
          OCTET=$(printf '%s' '{{.CLUSTER}}' | cksum | awk '{print ($1 % 253) + 2}')
          cat > "$KRO_VALUES" <<EOF
        clusters:
          {{.CLUSTER}}:
            clusterName: {{.CLUSTER}}
            tenant: workshop
            environment: prod
            region: {{.AWS_REGION}}
            k8sVersion: "{{.K8S_VERSION}}"
            accountId: "{{.AWS_ACCOUNT_ID}}"
            managementAccountId: "{{.AWS_ACCOUNT_ID}}"
            resourcePrefix: {{.RESOURCE_PREFIX}}
            cidr:
              vpcCidr: "10.${OCTET}.0.0/16"
              publicSubnet1Cidr: "10.${OCTET}.1.0/24"
              publicSubnet2Cidr: "10.${OCTET}.2.0/24"
              privateSubnet1Cidr: "10.${OCTET}.11.0/24"
              privateSubnet2Cidr: "10.${OCTET}.12.0/24"
        EOF
        fi
        # admin roles: grant cluster-admin to BOTH the console/participant role
        # (config.local.yaml .adminRoleName) and the IDE/instance role (the
        # peeks-ide *SharedRole*, which create-config.sh deliberately excludes
        # from adminRoleName). The EksCluster RGD turns each into its own
        # cluster-admin AccessEntry. Set on every run (idempotent) so existing
        # spokes also pick up the instance role.
        CONSOLE_ROLE=$(yq '.adminRoleName // ""' {{.CONFIG_FILE}})
        INSTANCE_ROLE=$(aws iam list-roles --query "Roles[?contains(RoleName,'SharedRole')].RoleName | [0]" --output text 2>/dev/null || echo "")
        yq -i 'del(.clusters."{{.CLUSTER}}".adminRoles)' "$KRO_VALUES" 2>/dev/null || true
        if [ -n "$CONSOLE_ROLE" ] && [ "$CONSOLE_ROLE" != "null" ]; then
          CONSOLE_ROLE="$CONSOLE_ROLE" yq -i '.clusters."{{.CLUSTER}}".adminRoleName = env(CONSOLE_ROLE)' "$KRO_VALUES"
        fi
        if [ -n "$INSTANCE_ROLE" ] && [ "$INSTANCE_ROLE" != "None" ] && [ "$INSTANCE_ROLE" != "null" ]; then
          INSTANCE_ROLE="$INSTANCE_ROLE" yq -i '.clusters."{{.CLUSTER}}".adminInstanceRoleName = env(INSTANCE_ROLE)' "$KRO_VALUES"
        fi
        # multi-acct (ACK CARM): map this spoke's namespace -> AWS account so the
        # hub's ACK controllers render an IAMRoleSelector per service and assume
        # the {{.RESOURCE_PREFIX}}-cluster-mgmt-<svc> roles when provisioning the
        # spoke. The KRO EksclusterWithVpc lands in namespace == clusterName, which
        # is the key the multi-acct chart selects on. Only KRO spokes need this —
        # ACK does the provisioning; Crossplane spokes do not use CARM.
        # Path = the appset-chart external per-addon overlay tier:
        #   $overlay/<overlay_repo_basepath>configs/multi-acct/values.yaml
        # The fleet-config repo (seeded by the GitLab init-job) keeps configs/ and
        # overlays/ at the REPO ROOT (overlay_repo_basepath=""), so this lives at
        # configs/multi-acct/values.yaml — NOT under gitops/. (Spoke cluster values
        # use gitops/fleet/... because that appset falls back to fleetRepoBasepath.)
        # yq merge keeps it idempotent and accumulates entries across spokes.
        mkdir -p "$REPO_DIR/configs/multi-acct"
        MA_FILE="$REPO_DIR/configs/multi-acct/values.yaml"
        [ -f "$MA_FILE" ] || printf 'clusters: {}\n' > "$MA_FILE"
        yq -i '.clusters."{{.CLUSTER}}" = "{{.AWS_ACCOUNT_ID}}"' "$MA_FILE"
        # platform-manifests: disable HuggingFaceModel CRs on KRO spokes. The
        # HuggingFaceModel CRD (kro.run) is not installed on spokes, so the chart's
        # CRs fail to apply ("no matches for kind HuggingFaceModel"); these models
        # target GPU/Trainium clusters, not spokes. An empty list makes the chart's
        # huggingfaceModels guard render nothing. Written to the per-cluster overlay
        # tier the platform-manifests appset reads last:
        #   $overlay/overlays/clusters/<cluster>/platform-manifests/values.yaml
        mkdir -p "$REPO_DIR/overlays/clusters/{{.CLUSTER}}/platform-manifests"
        printf 'huggingfaceModels: []\n' > "$REPO_DIR/overlays/clusters/{{.CLUSTER}}/platform-manifests/values.yaml"
        cd "$REPO_DIR"
        git add -A
        if git diff --cached --quiet; then
          printf '{{.C_INFO}}  No fleet-config changes for {{.CLUSTER}} — already enabled (idempotent).{{.C_RESET}}\n'
        else
          git commit -m "feat: enable spoke {{.CLUSTER}} via KRO (+ multi-acct CARM mapping)"
          PUSHED=false
          for i in 1 2 3; do
            # Ensure fleet-config main branch is not protected before pushing
            docker exec gitlab-gitlab-1 gitlab-rails runner "u=User.find_by(username:'user1'); p=Project.find_by(path:'fleet-config',namespace_id:u&.namespace_id); ProtectedBranch.where(project:p).destroy_all" 2>/dev/null || true
            if git push 2>&1; then PUSHED=true; break; fi
            echo "  Push attempt $i failed, rebasing..."
            git pull --rebase 2>&1 && sleep 2
          done
          if [ "$PUSHED" != "true" ]; then
            printf '{{.C_ERR}}\u26a0 fleet-config push failed after 3 attempts.{{.C_RESET}}\n'
            exit 1
          fi
        fi
        rm -rf "$REPO_DIR"
        # Refresh the local fleet-config checkout so the committed overlay change is
        # visible in ~/environment/fleet-config (the task pushes from a temp clone).
        # Best-effort and non-fatal: skipped if absent, warns if not fast-forwardable.
        LOCAL_FLEET="$HOME/environment/fleet-config"
        if [ -d "$LOCAL_FLEET/.git" ]; then
          (git -C "$LOCAL_FLEET" fetch origin -q && git -C "$LOCAL_FLEET" pull --ff-only -q) \
            && printf '{{.C_INFO}}  Refreshed local fleet-config checkout.{{.C_RESET}}\n' \
            || printf '{{.C_INFO}}  Local fleet-config not auto-updated — run: git -C %s pull{{.C_RESET}}\n' "$LOCAL_FLEET"
        fi
        printf '{{.C_OK}}✓ Spoke {{.CLUSTER}} enabled via KRO + multi-acct CARM mapping in fleet-config overlay.{{.C_RESET}}\n'

  spokes:disable-crossplane:
    desc: "DELETE a Crossplane spoke on purpose: remove from overlay, then prune (usage: task spokes:disable-crossplane -- <cluster-name>)"
    vars:
      CLUSTER: '{{.CLI_ARGS}}'
      GITLAB_CF_DOMAIN:
        sh: |
          if [ -f {{.ROOT_DIR}}/private/gitlab-cloudfront-domain ]; then
            cat {{.ROOT_DIR}}/private/gitlab-cloudfront-domain
          else
            echo "{{.DOMAIN}}"
          fi
      GIT_PASSWORD:
        sh: yq '.hub.gitlabRootPassword // ""' {{.CONFIG_FILE}} | grep -v '^$' || (aws secretsmanager get-secret-value --secret-id {{.HUB_CLUSTER_NAME}}/keycloak --region {{.AWS_REGION}} --query 'SecretString' --output text 2>/dev/null | jq -r '.user_password')
    cmds:
      - |
        if [ -z "{{.CLUSTER}}" ]; then echo "Usage: task spokes:disable-crossplane -- <cluster-name>"; exit 1; fi
        # Crossplane clusters are grouped under one per-tenant app (clusters-<tenant>).
        APP="clusters-workshop"

        # 1. Declarative removal: drop the cluster entry from the overlay (Git).
        FLEET_URL="https://{{.GIT_USERNAME}}:{{.GIT_PASSWORD}}@{{.GITLAB_CF_DOMAIN}}/{{.GIT_USERNAME}}/fleet-config.git"
        # Guard: a silently-failed clone would leave an empty $REPO_DIR, making us
        # wrongly conclude the cluster is absent from the overlay and skip the Git
        # removal (stale overlay left behind). Wait for fleet-config then verify.
        printf '{{.C_STEP}}▸ Waiting for fleet-config repo to be reachable...{{.C_RESET}}\n'
        for i in $(seq 1 30); do
          git ls-remote "$FLEET_URL" >/dev/null 2>&1 && break
          if [ "$i" -eq 30 ]; then
            printf '{{.C_ERR}}⚠ fleet-config not reachable after 5min — cannot disable spoke {{.CLUSTER}} via Crossplane.{{.C_RESET}}\n'
            exit 1
          fi
          sleep 10
        done
        REPO_DIR=$(mktemp -d)
        git clone "$FLEET_URL" "$REPO_DIR"
        if [ ! -d "$REPO_DIR/.git" ]; then
          printf '{{.C_ERR}}⚠ fleet-config clone failed — aborting disable-crossplane for {{.CLUSTER}}.{{.C_RESET}}\n'
          rm -rf "$REPO_DIR"
          exit 1
        fi
        XP_VALUES="$REPO_DIR/gitops/fleet/spoke-values/tenants/workshop/crossplane-clusters/values.yaml"
        if [ -f "$XP_VALUES" ] && yq -e '.clusters."{{.CLUSTER}}"' "$XP_VALUES" >/dev/null 2>&1; then
          yq -i 'del(.clusters."{{.CLUSTER}}")' "$XP_VALUES"
          ( cd "$REPO_DIR" && git add -A && git commit -m "feat: disable spoke {{.CLUSTER}} (remove from Crossplane overlay)" && git push 2>/dev/null )
          printf '{{.C_OK}}✓ Removed {{.CLUSTER}} from the Crossplane overlay (Git).{{.C_RESET}}\n'
        else
          printf '{{.C_INFO}}  {{.CLUSTER}} not present in Crossplane overlay — proceeding to prune any leftover resources.{{.C_RESET}}\n'
        fi
        rm -rf "$REPO_DIR"

        # 2. Deliberate prune. With prune:false on the appset this manual --prune is
        #    the explicit destructive step. Refresh + show the diff first so the
        #    operator sees exactly what will be deleted.
        printf '{{.C_ERR}}▸ Pruning app %s — this DELETES the live cluster {{.CLUSTER}} + its VPC.{{.C_RESET}}\n' "$APP"
        if command -v argocd >/dev/null 2>&1; then
          argocd app get "$APP" --refresh >/dev/null 2>&1 || true
          argocd app diff "$APP" || true
          if ! argocd app sync "$APP" --prune --timeout 600; then
            printf '{{.C_ERR}}⚠ argocd prune failed (auth?). Run: argocd-refresh-token && source ~/.bashrc.d/platform.sh, then:{{.C_RESET}}\n'
            printf '    argocd app sync %s --prune\n' "$APP"
          fi
        else
          printf '{{.C_INFO}}  argocd CLI not found. Finish the deletion manually:{{.C_RESET}}\n'
          printf '    argocd app sync %s --prune\n' "$APP"
        fi

  spokes:disable-kro:
    desc: "DELETE a KRO spoke on purpose: remove from overlay, then prune (usage: task spokes:disable-kro -- <cluster-name>)"
    vars:
      CLUSTER: '{{.CLI_ARGS}}'
      GITLAB_CF_DOMAIN:
        sh: |
          if [ -f {{.ROOT_DIR}}/private/gitlab-cloudfront-domain ]; then
            cat {{.ROOT_DIR}}/private/gitlab-cloudfront-domain
          else
            echo "{{.DOMAIN}}"
          fi
      GIT_PASSWORD:
        sh: yq '.hub.gitlabRootPassword // ""' {{.CONFIG_FILE}} | grep -v '^$' || (aws secretsmanager get-secret-value --secret-id {{.HUB_CLUSTER_NAME}}/keycloak --region {{.AWS_REGION}} --query 'SecretString' --output text 2>/dev/null | jq -r '.user_password')
    cmds:
      - |
        if [ -z "{{.CLUSTER}}" ]; then echo "Usage: task spokes:disable-kro -- <cluster-name>"; exit 1; fi
        # KRO generates one app per cluster: clusters-kro-<name>.
        APP="clusters-kro-{{.CLUSTER}}"
        FLEET_URL="https://{{.GIT_USERNAME}}:{{.GIT_PASSWORD}}@{{.GITLAB_CF_DOMAIN}}/{{.GIT_USERNAME}}/fleet-config.git"
        # Guard: a silently-failed clone would leave an empty $REPO_DIR, making the
        # overlay cleanup below a no-op (stale kro overlay + marker left behind).
        # Wait for fleet-config then verify the clone produced a git repo.
        printf '{{.C_STEP}}▸ Waiting for fleet-config repo to be reachable...{{.C_RESET}}\n'
        for i in $(seq 1 30); do
          git ls-remote "$FLEET_URL" >/dev/null 2>&1 && break
          if [ "$i" -eq 30 ]; then
            printf '{{.C_ERR}}⚠ fleet-config not reachable after 5min — cannot disable spoke {{.CLUSTER}} via KRO.{{.C_RESET}}\n'
            exit 1
          fi
          sleep 10
        done
        REPO_DIR=$(mktemp -d)
        git clone "$FLEET_URL" "$REPO_DIR"
        if [ ! -d "$REPO_DIR/.git" ]; then
          printf '{{.C_ERR}}⚠ fleet-config clone failed — aborting disable-kro for {{.CLUSTER}}.{{.C_RESET}}\n'
          rm -rf "$REPO_DIR"
          exit 1
        fi
        BASE="$REPO_DIR/gitops/fleet/spoke-values/tenants/workshop/kro-clusters"
        KRO_VALUES="$BASE/values.yaml"
        MARKER="$BASE/clusters/{{.CLUSTER}}.json"
        MA_FILE="$REPO_DIR/configs/multi-acct/values.yaml"

        # PHASE 1: remove ONLY the cluster spec from values.yaml. Keep the clusters/*.json
        # marker for now so the appset still generates clusters-kro-<name> and we can prune
        # through it. (Deleting the marker first would make the appset remove the app with
        # preserveResourcesOnDeletion=true -> the EksclusterWithVpc would be ORPHANED, not
        # deleted.)
        if [ -f "$KRO_VALUES" ] && yq -e '.clusters."{{.CLUSTER}}"' "$KRO_VALUES" >/dev/null 2>&1; then
          yq -i 'del(.clusters."{{.CLUSTER}}")' "$KRO_VALUES"
          ( cd "$REPO_DIR" && git add -A && git commit -m "feat: disable spoke {{.CLUSTER}} (remove KRO cluster spec)" && git push 2>/dev/null )
          printf '{{.C_OK}}✓ Removed {{.CLUSTER}} spec from the KRO overlay (Git).{{.C_RESET}}\n'
        else
          printf '{{.C_INFO}}  {{.CLUSTER}} spec not present in KRO overlay — proceeding to prune any leftovers.{{.C_RESET}}\n'
        fi

        # PHASE 2: deliberate prune through the still-existing app.
        printf '{{.C_ERR}}▸ Pruning app %s — this DELETES the live cluster {{.CLUSTER}} + its VPC.{{.C_RESET}}\n' "$APP"
        PRUNED=false
        if command -v argocd >/dev/null 2>&1; then
          argocd app get "$APP" --refresh >/dev/null 2>&1 || true
          argocd app diff "$APP" || true
          if argocd app sync "$APP" --prune --timeout 600; then PRUNED=true; else
            printf '{{.C_ERR}}⚠ argocd prune failed (auth?). Run: argocd-refresh-token && source ~/.bashrc.d/platform.sh, then: argocd app sync %s --prune{{.C_RESET}}\n' "$APP"
          fi
        else
          printf '{{.C_INFO}}  argocd CLI not found. Run manually then re-run this task to clean up: argocd app sync %s --prune{{.C_RESET}}\n' "$APP"
        fi

        # PHASE 3: cleanup the now-empty app + CARM mapping (only after a successful prune,
        # so we never orphan a live resource). The appset removes clusters-kro-<name> once
        # the marker is gone; its resources are already pruned.
        if [ "$PRUNED" = true ]; then
          CHANGED=0
          [ -f "$MARKER" ] && { rm -f "$MARKER"; CHANGED=1; }
          [ -f "$MA_FILE" ] && yq -e '.clusters."{{.CLUSTER}}"' "$MA_FILE" >/dev/null 2>&1 && { yq -i 'del(.clusters."{{.CLUSTER}}")' "$MA_FILE"; CHANGED=1; }
          if [ "$CHANGED" = "1" ]; then
            ( cd "$REPO_DIR" && git add -A && git commit -m "chore: remove {{.CLUSTER}} KRO marker + multi-acct mapping (post-prune cleanup)" && git push 2>/dev/null )
            printf '{{.C_OK}}✓ Cleaned up {{.CLUSTER}} marker + multi-acct mapping; app will be removed by the appset.{{.C_RESET}}\n'
          fi
        else
          printf '{{.C_INFO}}  Skipped marker/CARM cleanup (prune not confirmed). Re-run this task after a successful prune.{{.C_RESET}}\n'
        fi
        rm -rf "$REPO_DIR"

  spokes:disable-all:
    desc: >-
      DELETE every spoke cluster (KRO + Crossplane) declared in the fleet-config
      overlay, then wait for them to disappear from AWS. Used as Phase 0 of
      `destroy` so spokes are removed while the hub controllers (KRO/ACK/Crossplane)
      are still alive to reconcile their deletion. Idempotent.
    vars:
      GITLAB_CF_DOMAIN:
        sh: |
          if [ -f {{.ROOT_DIR}}/private/gitlab-cloudfront-domain ]; then
            cat {{.ROOT_DIR}}/private/gitlab-cloudfront-domain
          else
            echo "{{.DOMAIN}}"
          fi
      GIT_PASSWORD:
        sh: yq '.hub.gitlabRootPassword // ""' {{.CONFIG_FILE}} | grep -v '^$' || (aws secretsmanager get-secret-value --secret-id {{.HUB_CLUSTER_NAME}}/keycloak --region {{.AWS_REGION}} --query 'SecretString' --output text 2>/dev/null | jq -r '.user_password')
    cmds:
      - |
        set -u
        # 1. Discover spokes from the fleet-config overlay (the single source of truth
        #    for cluster specs). If the overlay is unreachable we must NOT silently
        #    proceed to hub teardown — surviving spokes would be orphaned.
        REPO_DIR=$(mktemp -d)
        if ! git clone "https://{{.GIT_USERNAME}}:{{.GIT_PASSWORD}}@{{.GITLAB_CF_DOMAIN}}/{{.GIT_USERNAME}}/fleet-config.git" "$REPO_DIR" 2>/dev/null; then
          printf '{{.C_ERR}}⚠ fleet-config overlay unreachable — cannot discover spokes automatically.{{.C_RESET}}\n'
          printf '{{.C_INFO}}  If any spoke clusters exist, delete them first with:{{.C_RESET}}\n'
          printf '    task spokes:disable-kro -- <name>   /   task spokes:disable-crossplane -- <name>\n'
          rm -rf "$REPO_DIR"; exit 0
        fi
        KRO_VALUES="$REPO_DIR/gitops/fleet/spoke-values/tenants/workshop/kro-clusters/values.yaml"
        XP_VALUES="$REPO_DIR/gitops/fleet/spoke-values/tenants/workshop/crossplane-clusters/values.yaml"
        KRO_SPOKES=""; XP_SPOKES=""
        [ -f "$KRO_VALUES" ] && KRO_SPOKES=$(yq '.clusters // {} | keys | .[]' "$KRO_VALUES" 2>/dev/null)
        [ -f "$XP_VALUES" ]  && XP_SPOKES=$(yq '.clusters // {} | keys | .[]' "$XP_VALUES" 2>/dev/null)
        rm -rf "$REPO_DIR"

        if [ -z "$(echo $KRO_SPOKES $XP_SPOKES | tr -d ' ')" ]; then
          printf '{{.C_OK}}✓ No spoke clusters declared in the overlay — nothing to tear down.{{.C_RESET}}\n'
          exit 0
        fi
        printf '{{.C_STEP}}▸ Spokes to delete — KRO: [%s]  Crossplane: [%s]{{.C_RESET}}\n' "$(echo $KRO_SPOKES | tr '\n' ' ')" "$(echo $XP_SPOKES | tr '\n' ' ')"

        # 2. Deliberate deletion via the existing per-cluster disable tasks (they remove
        #    the cluster from the overlay in Git, then run a scoped `argocd app sync --prune`).
        for c in $KRO_SPOKES; do
          printf '{{.C_STEP}}▸ Disabling KRO spoke %s...{{.C_RESET}}\n' "$c"
          task spokes:disable-kro -- "$c" || printf '{{.C_ERR}}⚠ disable-kro failed for %s (continuing).{{.C_RESET}}\n' "$c"
        done
        for c in $XP_SPOKES; do
          printf '{{.C_STEP}}▸ Disabling Crossplane spoke %s...{{.C_RESET}}\n' "$c"
          task spokes:disable-crossplane -- "$c" || printf '{{.C_ERR}}⚠ disable-crossplane failed for %s (continuing).{{.C_RESET}}\n' "$c"
        done

        # 3. Wait for the spoke EKS clusters to actually disappear from AWS BEFORE the
        #    hub teardown removes the controllers that reconcile their deletion. Without
        #    this, killing the hub mid-deletion leaves orphaned EKS clusters + VPCs.
        ALL_SPOKES="$KRO_SPOKES $XP_SPOKES"
        printf '{{.C_STEP}}▸ Waiting for spoke EKS clusters to delete in AWS (up to 30m)...{{.C_RESET}}\n'
        for i in $(seq 1 90); do
          LIVE=""
          for c in $ALL_SPOKES; do
            aws eks describe-cluster --name "$c" --region {{.AWS_REGION}} >/dev/null 2>&1 && LIVE="$LIVE $c"
          done
          if [ -z "$(echo $LIVE | tr -d ' ')" ]; then
            printf '{{.C_OK}}✓ All spoke clusters deleted from AWS.{{.C_RESET}}\n'; break
          fi
          printf '{{.C_INFO}}  Still deleting:%s ... (%s/90){{.C_RESET}}\n' "$LIVE" "$i"
          sleep 20
        done
        # Final check — warn loudly (but do not hard-fail) if a spoke survived, so the
        # operator can intervene before/after the hub goes away.
        STILL_LIVE=""
        for c in $ALL_SPOKES; do
          aws eks describe-cluster --name "$c" --region {{.AWS_REGION}} >/dev/null 2>&1 && STILL_LIVE="$STILL_LIVE $c"
        done
        if [ -n "$(echo $STILL_LIVE | tr -d ' ')" ]; then
          printf '{{.C_ERR}}⚠ Spoke clusters still present after wait:%s{{.C_RESET}}\n' "$STILL_LIVE"
          printf '{{.C_ERR}}  Proceeding with hub teardown will ORPHAN them. See troubleshooting.md →{{.C_RESET}}\n'
          printf '{{.C_ERR}}  "Spoke Cluster Stuck Deletion / Recovery". Recommend aborting and fixing first.{{.C_RESET}}\n'
        fi

  hub:restart-identity-pods:
    desc: Restart pods that depend on Pod Identity (external-dns, LBC, Crossplane providers) after identities are ready
    status:
      - |
        KC={{.ROOT_DIR}}/private/hub-kubeconfig
        # Skip if all providers are Healthy and oldest provider pod is >5min old
        UNHEALTHY=$(KUBECONFIG=$KC kubectl get providers.pkg.crossplane.io \
          -o jsonpath='{.items[?(@.status.conditions[?(@.type=="Healthy")].status!="True")].metadata.name}' \
          2>/dev/null | wc -w)
        [ "$UNHEALTHY" != "0" ] && exit 1
        # Use kubectl to get pod start time as epoch via jsonpath, then compare
        OLDEST_EPOCH=$(KUBECONFIG=$KC kubectl get pods -n crossplane-system \
          -l pkg.crossplane.io/revision \
          --sort-by=.metadata.creationTimestamp \
          -o jsonpath='{.items[0].metadata.creationTimestamp}' 2>/dev/null)
        [ -z "$OLDEST_EPOCH" ] && exit 1
        # Convert ISO8601 to epoch (GNU date)
        POD_START=$(date -d "$OLDEST_EPOCH" +%s 2>/dev/null || echo 0)
        NOW=$(date +%s)
        AGE=$(( NOW - POD_START ))
        [ "$AGE" -gt 300 ]
    cmds:
      - task: hub:kubeconfig
      - printf '{{.C_STEP}}▸ Terminating any stuck ArgoCD sync operations on pod-identities apps...{{.C_RESET}}\n'
      - |
        # A stuck PreSync hook on pod-identities-* (e.g. crd-wait Job whose
        # resources were already deleted) leaves operationState.phase=Running
        # indefinitely. This prevents PodIdentityAssociations from ever being
        # created, which in turn means LBC/external-dns never get AWS creds.
        # Terminate any such stuck operations before waiting.
        KC="KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig"
        eval "$KC" kubectl get applications -n argocd -o json 2>/dev/null | \
          jq -r '.items[] | select(
            (.metadata.name | startswith("pod-identities")) and
            (.status.operationState.phase == "Running")
          ) | .metadata.name' | \
        while read -r app; do
          printf '  ⚠ Terminating stuck sync on %s\n' "$app"
          eval "$KC" kubectl patch application "$app" -n argocd \
            --type='json' -p='[{"op":"remove","path":"/operation"}]' 2>/dev/null || true
          sleep 3
          eval "$KC" kubectl patch application "$app" -n argocd --type merge \
            -p '{"operation":{"initiatedBy":{"username":"admin"},"sync":{"revision":"HEAD"}}}' \
            2>/dev/null || true
        done
      - printf '{{.C_STEP}}▸ Waiting for pod identity associations to be Ready...{{.C_RESET}}\n'
      - KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl -n crossplane-system wait --for=condition=Ready podidentityassociations.eks.aws.upbound.io --all --timeout=300s 2>/dev/null || true
      - printf '{{.C_STEP}}▸ Restarting Crossplane providers to pick up pod identity credentials...{{.C_RESET}}\n'
      - KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl delete pod -n crossplane-system -l pkg.crossplane.io/revision --force --grace-period=0 2>/dev/null || true
      - sleep 15
      - printf '{{.C_STEP}}▸ Restarting external-dns and LBC to pick up pod identity credentials...{{.C_RESET}}\n'
      - KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl rollout restart deploy -n kube-system -l app.kubernetes.io/name=external-dns 2>/dev/null || true
      - KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl rollout restart deploy -n kube-system -l app.kubernetes.io/name=aws-load-balancer-controller 2>/dev/null || true
      - printf '{{.C_STEP}}▸ Restarting LiteLLM to pick up pod identity credentials...{{.C_RESET}}\n'
      - KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl rollout restart deploy -n kagent litellm 2>/dev/null || true
      - KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl rollout restart deploy -n otel otel-collector 2>/dev/null || true
      - KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl rollout status deploy -n kube-system -l app.kubernetes.io/name=external-dns --timeout=60s 2>/dev/null || true
      - KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl rollout status deploy -n kube-system -l app.kubernetes.io/name=aws-load-balancer-controller --timeout=60s 2>/dev/null || true
      - KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl rollout status deploy -n kagent litellm --timeout=120s 2>/dev/null || true
      - rm -f {{.ROOT_DIR}}/private/hub-kubeconfig
      - printf '{{.C_OK}}✓ Identity-dependent pods restarted.{{.C_RESET}}\n'

  hub:restart-langfuse:
    desc: Restart Langfuse to pick up Keycloak client secret (created by config job after initial deploy)
    cmds:
      - task: hub:kubeconfig
      - printf '{{.C_STEP}}▸ Restarting Langfuse to pick up Keycloak client secret...{{.C_RESET}}\n'
      - KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl rollout restart deploy -n langfuse langfuse 2>/dev/null || true
      - KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl rollout status deploy -n langfuse langfuse --timeout=120s 2>/dev/null || true
      - rm -f {{.ROOT_DIR}}/private/hub-kubeconfig
      - printf '{{.C_OK}}✓ Langfuse restarted with Keycloak SSO credentials.{{.C_RESET}}\n'

  hub:wait-for-full-sync:
    desc: Wait for ALL apps (including spokes) to sync after provider restart
    vars:
      MAX_OUTOFSYNC: '{{.MAX_OUTOFSYNC | default "5"}}'
    cmds:
      - task: hub:kubeconfig
      - printf '{{.C_STEP}}▸ Waiting for all apps to sync (spoke clusters provisioning)...{{.C_RESET}}\n'
      - |
        TIMEOUT=2400
        INTERVAL=30
        ELAPSED=0
        while [ $ELAPSED -lt $TIMEOUT ]; do
          APP_OUTPUT=$(KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl get applications.argoproj.io -n argocd --no-headers 2>/dev/null || echo "")
          TOTAL=$(echo "$APP_OUTPUT" | awk 'NF>0' | wc -l | tr -d ' ')
          SYNCED=$(echo "$APP_OUTPUT" | awk '$2 == "Synced"' | wc -l | tr -d ' ')
          UNKNOWN=$(echo "$APP_OUTPUT" | awk '$2 == "Unknown"' | wc -l | tr -d ' ')
          OUTOFSYNC=$((TOTAL - SYNCED - UNKNOWN))
          printf '{{.C_INFO}}  Apps: %s/%s synced, %s unknown, %s out-of-sync (%ss elapsed){{.C_RESET}}\n' "$SYNCED" "$TOTAL" "$UNKNOWN" "$OUTOFSYNC" "$ELAPSED"
          if [ "$TOTAL" -gt 0 ] && [ "$OUTOFSYNC" -le {{.MAX_OUTOFSYNC}} ]; then
            printf '{{.C_OK}}✓ All %s apps synced (within %s tolerance, %s unknown).{{.C_RESET}}\n' "$SYNCED" "{{.MAX_OUTOFSYNC}}" "$UNKNOWN"
            break
          fi
          sleep $INTERVAL
          ELAPSED=$((ELAPSED + INTERVAL))
        done
        if [ $ELAPSED -ge $TIMEOUT ]; then
          printf '{{.C_ERR}}⚠ Timed out after %ss. %s app(s) still not synced:{{.C_RESET}}\n' "$TIMEOUT" "$OUTOFSYNC"
          echo "$APP_OUTPUT" | awk '$2 != "Synced" && NF>0 {printf "  - %s (%s/%s)\n", $1, $3, $2}'
          printf '{{.C_STEP}}▸ Continuing — spoke clusters may still be provisioning.{{.C_RESET}}\n'
        fi
      - rm -f {{.ROOT_DIR}}/private/hub-kubeconfig

  secrets-manager:seed:
    desc: Seed hub cluster config into AWS Secrets Manager for ExternalSecrets
    vars:
      ARGOCD_URL:
        sh: aws eks describe-capability --cluster-name {{.HUB_CLUSTER_NAME}} --capability-name argocd --query 'capability.configuration.argoCd.serverUrl' --output text --region {{.AWS_REGION}} 2>/dev/null | sed 's|https://||' || echo ""
      CLUSTER_ARN:
        sh: kubectl -n crossplane-system get clusters.eks.aws.upbound.io hub -o jsonpath='{.status.atProvider.arn}' 2>/dev/null || echo "arn:aws:eks:{{.AWS_REGION}}:$(yq '.aws.accountId' {{.CONFIG_FILE}}):cluster/$(yq '.hub.clusterName' {{.CONFIG_FILE}})"
      VPC_ID:
        sh: aws eks describe-cluster --name $(yq '.hub.clusterName' {{.CONFIG_FILE}}) --region {{.AWS_REGION}} --query 'cluster.resourcesVpcConfig.vpcId' --output text
      SUBNET_IDS:
        sh: aws eks describe-cluster --name $(yq '.hub.clusterName' {{.CONFIG_FILE}}) --region {{.AWS_REGION}} --query 'cluster.resourcesVpcConfig.subnetIds' --output text | tr '\t' ','
      PRIVATE_SUBNET_IDS:
        sh: |
          SUBNETS=$(aws eks describe-cluster --name $(yq '.hub.clusterName' {{.CONFIG_FILE}}) --region {{.AWS_REGION}} --query 'cluster.resourcesVpcConfig.subnetIds' --output text | tr '\t' '\n')
          aws ec2 describe-subnets --subnet-ids $SUBNETS --region {{.AWS_REGION}} --query 'Subnets[?MapPublicIpOnLaunch==`false`].SubnetId' --output text | tr '\t' ','
      CLUSTER_SG:
        sh: aws eks describe-cluster --name $(yq '.hub.clusterName' {{.CONFIG_FILE}}) --region {{.AWS_REGION}} --query 'cluster.resourcesVpcConfig.clusterSecurityGroupId' --output text
      INGRESS_DOMAIN:
        sh: |
          if [ "{{.EXPOSURE_MODE}}" = "cloudfront" ]; then
            echo ""
          else
            echo "{{.DOMAIN}}"
          fi
      ADMIN_ROLE_NAME:
        sh: yq '.adminRoleName // ""' {{.CONFIG_FILE}}
      GITLAB_DOMAIN:
        sh: |
          if [ -f {{.ROOT_DIR}}/private/gitlab-cloudfront-domain ]; then
            cat {{.ROOT_DIR}}/private/gitlab-cloudfront-domain
          else
            echo "{{.DOMAIN}}"
          fi
    cmds:
      - |
        SECRET_KEY="{{.HUB_CLUSTER_NAME}}/config"
        # Preserve any overlay wiring already set on <hub>/config. hub:set-overlay-repo
        # writes overlay_repo_url/revision/basepath into this same secret's metadata to
        # point $overlay at the GitLab fleet-config repo. This seed task rebuilds the
        # metadata from scratch and has no status: guard, so without re-merging these
        # keys a re-run (re-install) would WIPE the overlay wiring — disabling the
        # fleet-config overlay fleet-wide (per-addon ApplicationSets drop their $overlay
        # source) and orphaning spokes that only exist in fleet-config. Read them first.
        PREV_SECRET=$(aws secretsmanager get-secret-value --secret-id "$SECRET_KEY" --region {{.AWS_REGION}} --query SecretString --output text 2>/dev/null || echo "")
        OVL_URL=$(echo "$PREV_SECRET" | jq -r 'try (.metadata | fromjson | .overlay_repo_url) // empty' 2>/dev/null)
        OVL_REV=$(echo "$PREV_SECRET" | jq -r 'try (.metadata | fromjson | .overlay_repo_revision) // empty' 2>/dev/null)
        OVL_BP=$(echo "$PREV_SECRET"  | jq -r 'try (.metadata | fromjson | .overlay_repo_basepath) // empty' 2>/dev/null)
        # Build VPC JSON for the aws-resources chart ExternalSecret
        PRIVATE_SUBNETS_JSON=$(echo "{{.PRIVATE_SUBNET_IDS}}" | tr ',' '\n' | jq -R . | jq -s .)
        VPC_JSON=$(jq -n \
          --arg id "{{.VPC_ID}}" \
          --argjson subnet_ids "$PRIVATE_SUBNETS_JSON" \
          --arg cluster_security_group_id "{{.CLUSTER_SG}}" \
          '{id: $id, subnet_ids: $subnet_ids, cluster_security_group_id: $cluster_security_group_id}' | jq -c .)
        # Base metadata (string), then re-merge preserved overlay_* keys (only when set).
        METADATA='{"addonsRepoURL":"{{.REPO_URL}}","addonsRepoRevision":"{{.REPO_REVISION}}","addonsRepoBasepath":"{{.REPO_BASEPATH}}","fleetRepoURL":"{{.FLEET_REPO_URL}}","fleetRepoRevision":"{{.FLEET_REPO_REVISION}}","fleetRepoBasepath":"{{.FLEET_REPO_BASEPATH}}","aws_region":"{{.AWS_REGION}}","aws_account_id":"{{.AWS_ACCOUNT_ID}}","aws_cluster_name":"{{.HUB_CLUSTER_NAME}}","aws_cluster_arn":"{{.CLUSTER_ARN}}","aws_vpc_id":"{{.VPC_ID}}","aws_subnet_ids":"{{.SUBNET_IDS}}","aws_private_subnet_ids":"{{.PRIVATE_SUBNET_IDS}}","aws_cluster_security_group_id":"{{.CLUSTER_SG}}","alb_controller_mode":"oss","ingress_domain_name":"{{.INGRESS_DOMAIN}}","ingress_name":"{{.INGRESS_NAME}}","ingress_security_groups":"{{.INGRESS_SECURITY_GROUPS}}","exposure_mode":"{{.EXPOSURE_MODE}}","resource_prefix":"{{.RESOURCE_PREFIX}}","admin_role_name":"{{.ADMIN_ROLE_NAME}}","gitlab_domain_name":"{{.GITLAB_DOMAIN}}","git_token":"{{.USER_PASSWORD}}","aws_argocd_url":"{{.ARGOCD_URL}}"}'
        if [ -n "$OVL_URL" ]; then
          METADATA=$(echo "$METADATA" | jq -c --arg u "$OVL_URL" --arg r "$OVL_REV" --arg b "$OVL_BP" '. + {overlay_repo_url:$u, overlay_repo_revision:$r, overlay_repo_basepath:$b}')
          echo "Preserving existing overlay wiring: overlay_repo_url=$OVL_URL"
        fi
        SECRET_VALUE=$(jq -n \
          --arg metadata "$METADATA" \
          --arg config '{"tlsClientConfig":{"insecure":false}}' \
          --arg server '{{.CLUSTER_ARN}}' \
          --arg addons '' \
          --arg vpc "$VPC_JSON" \
          '{metadata: $metadata, config: $config, server: $server, addons: $addons, vpc: $vpc}')
        aws secretsmanager create-secret \
          --name "$SECRET_KEY" \
          --secret-string "$SECRET_VALUE" \
          --region {{.AWS_REGION}} 2>/dev/null \
        || aws secretsmanager put-secret-value \
          --secret-id "$SECRET_KEY" \
          --secret-string "$SECRET_VALUE" \
          --region {{.AWS_REGION}}
        echo "Seeded Secrets Manager: $SECRET_KEY"

  secrets-manager:seed-keycloak:
    desc: Seed keycloak passwords into AWS Secrets Manager
    status:
      - aws secretsmanager describe-secret --secret-id {{.HUB_CLUSTER_NAME}}/keycloak --region {{.AWS_REGION}} 2>/dev/null
    cmds:
      - |
        SECRET_KEY="{{.HUB_CLUSTER_NAME}}/keycloak"
        ADMIN_PASS=$(openssl rand -base64 18 | tr -d '/+=' | head -c 24)
        DB_PASS=$(openssl rand -base64 18 | tr -d '/+=' | head -c 24)
        USER_PASS=${IDE_PASSWORD:-$(openssl rand -base64 12 | tr -d '/+=' | head -c 16)}
        SECRET_VALUE=$(jq -n \
          --arg admin "$ADMIN_PASS" \
          --arg db "$DB_PASS" \
          --arg user "$USER_PASS" \
          '{keycloak_admin_password: $admin, keycloak_postgres_password: $db, user_password: $user}')
        aws secretsmanager create-secret \
          --name "$SECRET_KEY" \
          --secret-string "$SECRET_VALUE" \
          --region {{.AWS_REGION}} 2>/dev/null \
        || aws secretsmanager put-secret-value \
          --secret-id "$SECRET_KEY" \
          --secret-string "$SECRET_VALUE" \
          --region {{.AWS_REGION}}
        echo "Seeded Secrets Manager: $SECRET_KEY"

  secrets-manager:seed-secrets:
    desc: Seed platform user credentials into Secrets Manager for ExternalSecrets
    cmds:
      - |
        SECRET_KEY="{{.HUB_CLUSTER_NAME}}/secrets"
        USER_PASS=$(aws secretsmanager get-secret-value --secret-id {{.HUB_CLUSTER_NAME}}/keycloak --region {{.AWS_REGION}} --query SecretString --output text | jq -r .user_password)
        # Merge into the existing secret so a re-run backfills any keys a previous
        # (partial) install left out — and never rotates values live consumers
        # depend on. First run: no secret yet, start from {} and create-then-put.
        EXISTING=$(aws secretsmanager get-secret-value --secret-id "$SECRET_KEY" --region {{.AWS_REGION}} --query SecretString --output text 2>/dev/null || echo "{}")
        # Reuse existing hash/key on re-runs (don't rotate them out from under Kargo etc.)
        USER_PASS_HASH=$(echo "$EXISTING" | jq -r '.user_password_hash // ""')
        if [ -z "$USER_PASS_HASH" ]; then
          USER_PASS_HASH=$(echo -n "$USER_PASS" | python3 -c "import sys,bcrypt; print(bcrypt.hashpw(sys.stdin.buffer.read(), bcrypt.gensalt()).decode())" 2>/dev/null || echo "")
        fi
        USER_PASS_KEY=$(echo "$EXISTING" | jq -r '.user_password_key // ""')
        if [ -z "$USER_PASS_KEY" ]; then
          USER_PASS_KEY=$(echo -n "$USER_PASS" | base64)
        fi
        UPDATED=$(echo "$EXISTING" | jq \
          --arg user_password "$USER_PASS" \
          --arg user_password_hash "$USER_PASS_HASH" \
          --arg user_password_key "$USER_PASS_KEY" \
          '. + {user_password: $user_password, user_password_hash: $user_password_hash, user_password_key: $user_password_key}')
        # DevLake credentials. These belong here (NOT in seed-observability) so the
        # devlake-encryption-secret ExternalSecret resolves during the normal install,
        # independent of the AMP/AMG observability flow — which waits up to 30 min for
        # the AMP workspace and is frequently re-run separately (task observability-seed).
        # Gating these behind observability left DevLake's ExternalSecret in
        # SecretSyncedError whenever observability seeding didn't complete.
        # Generate only if absent so re-runs don't break existing encrypted connections.
        #   - encryption secret: 128 uppercase chars (DevLake requirement)
        if ! echo "$UPDATED" | jq -e 'has("devlake_encryption_secret")' >/dev/null; then
          DEVLAKE_ENC=$(openssl rand -base64 2000 | tr -dc 'A-Z' | fold -w 128 | head -n 1)
          UPDATED=$(echo "$UPDATED" | jq --arg p "$DEVLAKE_ENC" '. + {devlake_encryption_secret: $p}')
        fi
        if ! echo "$UPDATED" | jq -e 'has("devlake_mysql_password")' >/dev/null; then
          DEVLAKE_MYSQL=$(openssl rand -base64 18 | tr -d '/+=' | head -c 24)
          UPDATED=$(echo "$UPDATED" | jq --arg p "$DEVLAKE_MYSQL" '. + {devlake_mysql_password: $p}')
        fi
        # grafana_mysql_password: the devlake `mysql-passwords` ExternalSecret reads
        # BOTH devlake_mysql_password AND grafana_mysql_password — ESO fails the whole
        # ExternalSecret if either property is missing, so this must be seeded here too
        # (it was previously only generated in the AMP-gated seed-observability flow,
        # leaving mysql-passwords in SecretSyncedError and devlake-peeks-hub Degraded).
        if ! echo "$UPDATED" | jq -e 'has("grafana_mysql_password")' >/dev/null; then
          GRAFANA_MYSQL=$(openssl rand -base64 18 | tr -d '/+=' | head -c 24)
          UPDATED=$(echo "$UPDATED" | jq --arg p "$GRAFANA_MYSQL" '. + {grafana_mysql_password: $p}')
        fi
        # backstage_postgres_password + git_token: the backstage-postgres and
        # git-credentials ExternalSecrets read these from <hub>/secrets. They were
        # previously only generated in the AMP-gated seed-observability flow, so on a
        # fresh install where observability seeding hadn't completed Backstage stayed
        # OutOfSync/Degraded ('key backstage_postgres_password does not exist') and
        # $BACKSTAGE_URL returned 503 — blocking every Backstage-dependent module.
        # Seed them here (in the always-runs early phase) instead. git_token mirrors
        # the workshop user password (GitLab PAT == user password in this workshop).
        if ! echo "$UPDATED" | jq -e 'has("backstage_postgres_password")' >/dev/null; then
          BS_PG_PASS=$(openssl rand -base64 18 | tr -d '/+=' | head -c 24)
          UPDATED=$(echo "$UPDATED" | jq --arg p "$BS_PG_PASS" '. + {backstage_postgres_password: $p}')
        fi
        # git_token is seeded by CDK at deploy time (root-<ide_password>) — no runtime seeding needed.
        aws secretsmanager create-secret \
          --name "$SECRET_KEY" \
          --secret-string "$UPDATED" \
          --region {{.AWS_REGION}} 2>/dev/null \
        || aws secretsmanager put-secret-value \
          --secret-id "$SECRET_KEY" \
          --secret-string "$UPDATED" \
          --region {{.AWS_REGION}}
        echo "Seeded Secrets Manager: $SECRET_KEY"

  secrets-manager:seed-observability:
    desc: Seed observability credentials (AMP endpoint, AMG API key) into Secrets Manager
    vars:
      KC_DOMAIN:
        sh: |
          if [ "{{.EXPOSURE_MODE}}" = "cloudfront" ] && [ -f {{.ROOT_DIR}}/private/cloudfront-domain ]; then
            cat {{.ROOT_DIR}}/private/cloudfront-domain
          else
            echo "{{.DOMAIN}}"
          fi
    cmds:
      - |
        set -e
        SECRET_KEY="{{.HUB_CLUSTER_NAME}}/secrets"

        # Poll for AMP workspace (up to 60 min — Crossplane provisioning of AMP/AMG
        # can take well over 30 min on busy accounts; the previous 30 min ceiling
        # was too short and left Grafana unseeded on slow installs).
        # Use crossplane-name tag to identify the correct workspace (avoids ambiguity with duplicates)
        AMP_WORKSPACE_ID=""
        printf '{{.C_STEP}}▸ Waiting for AMP workspace...{{.C_RESET}}\n'
        for i in $(seq 1 120); do
          for WS_ID in $(aws amp list-workspaces --region {{.AWS_REGION}} --query "workspaces[?alias=='{{.RESOURCE_PREFIX}}-observability-amp'].workspaceId" --output text 2>/dev/null); do
            TAG_VAL=$(aws amp list-tags-for-resource --resource-arn "arn:aws:aps:{{.AWS_REGION}}:{{.AWS_ACCOUNT_ID}}:workspace/$WS_ID" --region {{.AWS_REGION}} --query "tags.\"crossplane-name\"" --output text 2>/dev/null || echo "")
            if [ "$TAG_VAL" = "{{.RESOURCE_PREFIX}}-amp" ]; then
              AMP_WORKSPACE_ID="$WS_ID"
              break
            fi
          done
          if [ -n "$AMP_WORKSPACE_ID" ]; then
            break
          fi
          printf '  [%d/120] AMP workspace not ready yet...\n' "$i"
          sleep 30
        done
        if [ -z "$AMP_WORKSPACE_ID" ] || [ "$AMP_WORKSPACE_ID" = "None" ]; then
          echo ""
          echo "============================================================"
          echo "WARN: AMP workspace not created after 60 min."
          echo "  The peeks-observability-seed.timer will keep retrying this"
          echo "  automatically; or run 'task observability-seed' manually once"
          echo "  the observability-aws ArgoCD app is Synced and AMP/AMG are ACTIVE."
          echo "============================================================"
          exit 0
        fi
        AMP_ENDPOINT=$(aws amp describe-workspace --workspace-id "$AMP_WORKSPACE_ID" --region {{.AWS_REGION}} --query "workspace.prometheusEndpoint" --output text)
        echo "Found AMP endpoint: $AMP_ENDPOINT"

        # Poll for AMG workspace (up to 15 min)
        # Use crossplane-name tag to identify the correct workspace
        AMG_WORKSPACE_ID=""
        printf '{{.C_STEP}}▸ Waiting for AMG workspace...{{.C_RESET}}\n'
        for i in $(seq 1 30); do
          for WS in $(aws grafana list-workspaces --region {{.AWS_REGION}} --query "workspaces[?name=='{{.RESOURCE_PREFIX}}-observability' && status=='ACTIVE'].id" --output text 2>/dev/null); do
            TAG_VAL=$(aws grafana describe-workspace --workspace-id "$WS" --region {{.AWS_REGION}} --query "workspace.tags.\"crossplane-name\"" --output text 2>/dev/null || echo "")
            if [ "$TAG_VAL" = "{{.RESOURCE_PREFIX}}-amg" ]; then
              AMG_WORKSPACE_ID="$WS"
              break
            fi
          done
          if [ -n "$AMG_WORKSPACE_ID" ]; then
            break
          fi
          printf '  [%d/30] AMG workspace not ready yet...\n' "$i"
          sleep 30
        done
        if [ -z "$AMG_WORKSPACE_ID" ] || [ "$AMG_WORKSPACE_ID" = "None" ]; then
          echo "WARN: AMG workspace not found. Run 'task observability-seed' later."
          exit 0
        fi
        AMG_ENDPOINT=$(aws grafana describe-workspace --workspace-id "$AMG_WORKSPACE_ID" --region {{.AWS_REGION}} --query "workspace.endpoint" --output text)
        echo "Found AMG endpoint: $AMG_ENDPOINT"

        # Create AMG service account + token (admin, 30 days) — API keys removed in Grafana 12
        SA_NAME="crossplane-$(date +%s)"
        SA_ID=$(aws grafana create-workspace-service-account --workspace-id "$AMG_WORKSPACE_ID" --grafana-role ADMIN --name "$SA_NAME" --region {{.AWS_REGION}} --query "id" --output text 2>/dev/null || echo "")
        if [ -z "$SA_ID" ] || [ "$SA_ID" = "None" ]; then
          echo "WARN: Could not create AMG service account. Skipping."
          exit 0
        fi
        AMG_API_KEY=$(aws grafana create-workspace-service-account-token --workspace-id "$AMG_WORKSPACE_ID" --service-account-id "$SA_ID" --name "token-$SA_NAME" --seconds-to-live 2592000 --region {{.AWS_REGION}} --query "serviceAccountToken.key" --output text 2>/dev/null || echo "")
        if [ -z "$AMG_API_KEY" ]; then
          echo "WARN: Could not create AMG service account token. Skipping."
          exit 0
        fi

        # Install required Grafana plugins (X-Ray for trace visualization)
        printf '{{.C_STEP}}▸ Installing AMG plugins (X-Ray)...{{.C_RESET}}\n'
        curl -s -X POST -H "Authorization: Bearer $AMG_API_KEY" \
          -H "Content-Type: application/json" \
          "https://$AMG_ENDPOINT/api/plugins/grafana-x-ray-datasource/install" 2>/dev/null || true
        echo "X-Ray plugin installed"

        # Merge into existing secret (preserves other keys). On first run
        # the secret doesn't exist yet — `get-secret-value` returns empty,
        # we start from `{}`, and `put-secret-value` would fail with
        # ResourceNotFoundException, so create-then-put.
        EXISTING=$(aws secretsmanager get-secret-value --secret-id "$SECRET_KEY" --region {{.AWS_REGION}} --query "SecretString" --output text 2>/dev/null || echo "{}")
        # Pull user_password from keycloak secret for backstage ExternalSecrets
        KC_SECRET=$(aws secretsmanager get-secret-value --secret-id "{{.HUB_CLUSTER_NAME}}/keycloak" --region {{.AWS_REGION}} --query "SecretString" --output text 2>/dev/null || echo "{}")
        USER_PASS=$(echo "$KC_SECRET" | jq -r '.user_password // "workshop-user-2026"')
        # Generate backstage_postgres_password if not already present
        if ! echo "$EXISTING" | jq -e 'has("backstage_postgres_password")' >/dev/null 2>&1; then
          BS_PG_PASS=$(openssl rand -base64 18 | tr -d '/+=' | head -c 24)
        else
          BS_PG_PASS=$(echo "$EXISTING" | jq -r '.backstage_postgres_password')
        fi
        # Kargo admin credentials: bcrypt hash of user password + random signing key.
        # Reuse existing values on re-runs so we don't rotate them out from under Kargo.
        KARGO_HASH=$(echo "$EXISTING" | jq -r '.user_password_hash // ""')
        if [ -z "$KARGO_HASH" ]; then
          pip install bcrypt --quiet 2>/dev/null || true
          KARGO_HASH=$(python3 -c "import bcrypt,sys; print(bcrypt.hashpw(sys.argv[1].encode(), bcrypt.gensalt(rounds=10)).decode())" "$USER_PASS" 2>/dev/null)
        fi
        KARGO_KEY=$(echo "$EXISTING" | jq -r '.user_password_key // ""')
        if [ -z "$KARGO_KEY" ]; then
          KARGO_KEY=$(openssl rand -base64 30 | tr -d '/+=' | head -c 40)
        fi
        UPDATED=$(echo "$EXISTING" | jq \
          --arg amp_url "${AMP_ENDPOINT}api/v1/remote_write" \
          --arg amp_query_url "$AMP_ENDPOINT" \
          --arg amp_region "{{.AWS_REGION}}" \
          --arg grafana_api_key "$AMG_API_KEY" \
          --arg grafana_url "$AMG_ENDPOINT" \
          --arg user_password "$USER_PASS" \
          --arg git_token "$USER_PASS" \
          --arg backstage_postgres_password "$BS_PG_PASS" \
          --arg user_password_hash "$KARGO_HASH" \
          --arg user_password_key "$KARGO_KEY" \
          '. + {amp_endpoint_url: $amp_query_url, amp_region: $amp_region, grafana_api_key: $grafana_api_key, grafana_url: $grafana_url, user_password: $user_password, git_token: $git_token, backstage_postgres_password: $backstage_postgres_password, user_password_hash: $user_password_hash, user_password_key: $user_password_key}')
        # Generate the grafana_mysql_password the grafana-dashboards
        # ExternalSecret expects, but only if it isn't already there
        # (so re-runs don't rotate it out from under live consumers).
        if ! echo "$UPDATED" | jq -e 'has("grafana_mysql_password")' >/dev/null; then
          GRAFANA_MYSQL_PASSWORD=$(openssl rand -base64 18 | tr -d '/+=' | head -c 24)
          UPDATED=$(echo "$UPDATED" | jq --arg p "$GRAFANA_MYSQL_PASSWORD" '. + {grafana_mysql_password: $p}')
        fi
        # DevLake encryption secret (128 uppercase chars, per DevLake requirement).
        # Reuse on re-runs so we don't break existing encrypted connections.
        if ! echo "$UPDATED" | jq -e 'has("devlake_encryption_secret")' >/dev/null; then
          DEVLAKE_ENC=$(openssl rand -base64 2000 | tr -dc 'A-Z' | fold -w 128 | head -n 1)
          UPDATED=$(echo "$UPDATED" | jq --arg p "$DEVLAKE_ENC" '. + {devlake_encryption_secret: $p}')
        fi
        if ! echo "$UPDATED" | jq -e 'has("devlake_mysql_password")' >/dev/null; then
          DEVLAKE_MYSQL=$(openssl rand -base64 18 | tr -d '/+=' | head -c 24)
          UPDATED=$(echo "$UPDATED" | jq --arg p "$DEVLAKE_MYSQL" '. + {devlake_mysql_password: $p}')
        fi
        aws secretsmanager create-secret \
          --name "$SECRET_KEY" \
          --secret-string "$UPDATED" \
          --region {{.AWS_REGION}} 2>/dev/null \
        || aws secretsmanager put-secret-value \
          --secret-id "$SECRET_KEY" \
          --secret-string "$UPDATED" \
          --region {{.AWS_REGION}}
        echo "Seeded observability credentials into $SECRET_KEY"

        # Spoke amp-workspace-secrets ExternalSecrets (Argo Rollouts metric queries on the
        # spokes) read a SEPARATE secret <prefix>/platform/amp with properties
        # 'amp-workspace' (the AMP query endpoint) and 'amp-region'. In the terraform flow
        # this was created by common/secrets.tf; the kind-crossplane flow never created it,
        # so every spoke amp-workspace-secrets-* ExternalSecret stayed in SecretSyncedError.
        # Create/refresh it here now that AMP_ENDPOINT is known.
        AMP_SECRET_KEY="{{.RESOURCE_PREFIX}}/platform/amp"
        AMP_SECRET_VALUE=$(jq -n --arg r "{{.AWS_REGION}}" --arg w "$AMP_ENDPOINT" '{"amp-region": $r, "amp-workspace": $w}')
        aws secretsmanager create-secret \
          --name "$AMP_SECRET_KEY" \
          --secret-string "$AMP_SECRET_VALUE" \
          --region {{.AWS_REGION}} 2>/dev/null \
        || aws secretsmanager put-secret-value \
          --secret-id "$AMP_SECRET_KEY" \
          --secret-string "$AMP_SECRET_VALUE" \
          --region {{.AWS_REGION}}
        echo "Seeded AMP workspace secret: $AMP_SECRET_KEY"

        # Update hub cluster config secret with AMG URL for Keycloak SAML and grafana-dashboards
        CONFIG_KEY="{{.HUB_CLUSTER_NAME}}/config"
        CONFIG_EXISTING=$(aws secretsmanager get-secret-value --secret-id "$CONFIG_KEY" --region {{.AWS_REGION}} --query "SecretString" --output text)
        CONFIG_UPDATED=$(echo "$CONFIG_EXISTING" | jq \
          --arg grafana_url "$AMG_ENDPOINT" \
          '.metadata = (.metadata | fromjson | . + {aws_grafana_url: $grafana_url} | tojson)')
        aws secretsmanager put-secret-value \
          --secret-id "$CONFIG_KEY" \
          --secret-string "$CONFIG_UPDATED" \
          --region {{.AWS_REGION}}
        echo "Updated hub config with AMG URL: $AMG_ENDPOINT"

        # Populate spoke scraper values into hub Secrets Manager secret (dynamic, no file commits needed)
        CONFIG_KEY="{{.HUB_CLUSTER_NAME}}/config"
        CONFIG_EXISTING=$(aws secretsmanager get-secret-value --secret-id "$CONFIG_KEY" --region {{.AWS_REGION}} --query "SecretString" --output text)
        SPOKE_DEV_ARN=""
        SPOKE_DEV_SUBNETS=""
        SPOKE_DEV_SG=""
        SPOKE_PROD_ARN=""
        SPOKE_PROD_SUBNETS=""
        SPOKE_PROD_SG=""
        for CLUSTER in spoke-dev spoke-prod; do
          SPOKE_ARN=$(aws eks describe-cluster --name "$CLUSTER" --region {{.AWS_REGION}} --query 'cluster.arn' --output text 2>/dev/null || echo "")
          if [ -n "$SPOKE_ARN" ] && [ "$SPOKE_ARN" != "None" ]; then
            SPOKE_ALL_SUBNETS=$(aws eks describe-cluster --name "$CLUSTER" --region {{.AWS_REGION}} --query 'cluster.resourcesVpcConfig.subnetIds[]' --output text)
            SPOKE_PRIVATE_SUBNETS=$(aws ec2 describe-subnets --subnet-ids $SPOKE_ALL_SUBNETS --region {{.AWS_REGION}} --query 'Subnets[?MapPublicIpOnLaunch==`false`].SubnetId' --output text | tr '\t' '\n' | awk '!seen[$0]++' | head -2 | paste -sd ',' -)
            if [ -z "$SPOKE_PRIVATE_SUBNETS" ]; then
              SPOKE_PRIVATE_SUBNETS=$(echo "$SPOKE_ALL_SUBNETS" | tr '\t' '\n' | head -2 | paste -sd ',' -)
            fi
            SPOKE_SG=$(aws eks describe-cluster --name "$CLUSTER" --region {{.AWS_REGION}} --query 'cluster.resourcesVpcConfig.clusterSecurityGroupId' --output text)
            echo "Spoke $CLUSTER: arn=$SPOKE_ARN subnets=$SPOKE_PRIVATE_SUBNETS sg=$SPOKE_SG"
            if [ "$CLUSTER" = "spoke-dev" ]; then
              SPOKE_DEV_ARN="$SPOKE_ARN"
              SPOKE_DEV_SUBNETS="$SPOKE_PRIVATE_SUBNETS"
              SPOKE_DEV_SG="$SPOKE_SG"
            else
              SPOKE_PROD_ARN="$SPOKE_ARN"
              SPOKE_PROD_SUBNETS="$SPOKE_PRIVATE_SUBNETS"
              SPOKE_PROD_SG="$SPOKE_SG"
            fi
          else
            echo "WARN: Cluster $CLUSTER not found in {{.AWS_REGION}}. Scraper skipped."
          fi
        done
        if [ -n "$SPOKE_DEV_ARN" ] || [ -n "$SPOKE_PROD_ARN" ]; then
          CONFIG_UPDATED=$(echo "$CONFIG_EXISTING" | jq \
            --arg sda "$SPOKE_DEV_ARN" \
            --arg sds "$SPOKE_DEV_SUBNETS" \
            --arg sdsg "$SPOKE_DEV_SG" \
            --arg spa "$SPOKE_PROD_ARN" \
            --arg sps "$SPOKE_PROD_SUBNETS" \
            --arg spsg "$SPOKE_PROD_SG" \
            '.metadata = (.metadata | fromjson | . + {spoke_dev_cluster_arn: $sda, spoke_dev_private_subnet_ids: $sds, spoke_dev_security_group_id: $sdsg, spoke_prod_cluster_arn: $spa, spoke_prod_private_subnet_ids: $sps, spoke_prod_security_group_id: $spsg} | tojson)')
          aws secretsmanager put-secret-value \
            --secret-id "$CONFIG_KEY" \
            --secret-string "$CONFIG_UPDATED" \
            --region {{.AWS_REGION}}
          echo "Updated hub config with spoke scraper data"
        fi

        # Update Keycloak SAML client with AMG URL
        printf '{{.C_STEP}}▸ Waiting for Keycloak to be reachable...{{.C_RESET}}\n'
        for i in $(seq 1 30); do
          if curl -sf -o /dev/null "https://{{.KC_DOMAIN}}/keycloak/realms/master/.well-known/openid-configuration" 2>/dev/null; then
            echo "Keycloak is reachable"
            break
          fi
          echo "  [$i/30] Keycloak not reachable yet (DNS/ALB propagating)..."
          sleep 20
        done
        printf '{{.C_STEP}}▸ Updating Keycloak SAML client with AMG URL...{{.C_RESET}}\n'
        # Best-effort, trailing block: relax errexit so a Keycloak/AMG hiccup
        # (missing perms, duplicate SAML clients yielding a multi-line client id ->
        # malformed curl URL, transient API error) only WARNs instead of aborting
        # the entire install. This is the last block in the task, so set +e is safe.
        set +e
        KC_PASS=$(aws secretsmanager get-secret-value --secret-id {{.HUB_CLUSTER_NAME}}/keycloak --region {{.AWS_REGION}} --query 'SecretString' --output text | jq -r '.keycloak_admin_password')
        KC_TOKEN=$(curl -s -X POST "https://{{.KC_DOMAIN}}/keycloak/realms/master/protocol/openid-connect/token" \
          -H "Content-Type: application/x-www-form-urlencoded" \
          -d "grant_type=password&client_id=admin-cli&username=admin&password=$KC_PASS" | jq -r '.access_token')
        if [ -n "$KC_TOKEN" ] && [ "$KC_TOKEN" != "null" ]; then
          KC_CLIENT_ID=$(curl -s "https://{{.KC_DOMAIN}}/keycloak/admin/realms/platform/clients" \
            -H "Authorization: Bearer $KC_TOKEN" | jq -r '.[] | select(.name=="amazon-managed-grafana" and .protocol=="saml") | .id')
          if [ -n "$KC_CLIENT_ID" ]; then
            KC_CLIENT=$(curl -s "https://{{.KC_DOMAIN}}/keycloak/admin/realms/platform/clients/$KC_CLIENT_ID" \
              -H "Authorization: Bearer $KC_TOKEN")
            KC_UPDATED=$(echo "$KC_CLIENT" | jq \
              --arg url "$AMG_ENDPOINT" \
              '.clientId = "https://\($url)/saml/metadata" | .adminUrl = "https://\($url)/login/saml" | .redirectUris = ["https://\($url)/saml/acs"]')
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X PUT "https://{{.KC_DOMAIN}}/keycloak/admin/realms/platform/clients/$KC_CLIENT_ID" \
              -H "Authorization: Bearer $KC_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$KC_UPDATED")
            if [ "$HTTP_CODE" = "204" ]; then
              echo "Keycloak SAML client updated for AMG: $AMG_ENDPOINT"
            else
              echo "WARN: Keycloak SAML client update returned HTTP $HTTP_CODE"
            fi
          else
            echo "WARN: Keycloak SAML client 'amazon-managed-grafana' not found"
          fi
        else
          echo "WARN: Could not get Keycloak admin token. SAML client not updated."
        fi
      - |
        # Nudge Grafana to converge now that grafana_api_key/AMG creds are seeded.
        # The grafana-admin-credentials ExternalSecret -> Secret -> external-grafana
        # instance chain only reconciles once these creds exist; and the
        # grafana-operator caches its "available instances" registry, so
        # GrafanaDashboards created before the instance was Ready keep reporting
        # NoMatchingInstances until the operator re-evaluates. Force the
        # ExternalSecrets to resync and restart the operator so dashboards attach
        # and the grafana-dashboards Argo app reaches Healthy without manual steps.
        # Best-effort: never fail the seed on this.
        for es in grafana-admin-credentials grafana-amp-creds grafana-mysql-creds; do
          kubectl annotate externalsecret "$es" -n grafana-operator force-sync="$(date +%s)" --overwrite 2>/dev/null || true
        done
        kubectl rollout restart deploy/grafana-operator -n grafana-operator 2>/dev/null || true
        echo "Grafana ExternalSecrets resynced and grafana-operator restarted to pick up seeded credentials."

  argocd:capability:
    desc: Create EKS ArgoCD Capability (skips if done)
    status:
      - kubectl -n crossplane-system get job create-argocd-capability -o jsonpath='{.status.succeeded}' 2>/dev/null | grep -q 1
    vars:
      CAPABILITY_ROLE_ARN:
        sh: kubectl -n crossplane-system get roles.iam.aws.upbound.io argocd-capability-role -o jsonpath='{.status.atProvider.arn}' 2>/dev/null || echo ""
    cmds:
      - kubectl -n crossplane-system create configmap argocd-capability-config
          --from-literal=CLUSTER_NAME={{.HUB_CLUSTER_NAME}}
          --from-literal=AWS_REGION={{.AWS_REGION}}
          --from-literal=AWS_ACCOUNT_ID={{.AWS_ACCOUNT_ID}}
          --from-literal=CAPABILITY_NAME={{.CAPABILITY_NAME}}
          --from-literal=CAPABILITY_ROLE_ARN={{.CAPABILITY_ROLE_ARN}}
          --from-literal=IDC_INSTANCE_ARN={{.IDC_INSTANCE_ARN}}
          --from-literal=IDC_REGION={{.IDC_REGION}}
          --from-literal=IDC_ADMIN_GROUP_ID={{.IDC_ADMIN_GROUP_ID}}
          --dry-run=client -o yaml | kubectl apply -f -
      - kubectl delete job create-argocd-capability -n crossplane-system 2>/dev/null || true
      - kubectl apply -f manifests/argocd/create-capability.yaml
      - kubectl -n crossplane-system wait --for=condition=Complete --timeout=2400s job/create-argocd-capability

  argocd:delete-capability:
    desc: Delete EKS ArgoCD Capability via Job
    cmds:
      - kubectl -n crossplane-system create configmap argocd-capability-config
          --from-literal=CLUSTER_NAME={{.HUB_CLUSTER_NAME}}
          --from-literal=AWS_REGION={{.AWS_REGION}}
          --from-literal=CAPABILITY_NAME={{.CAPABILITY_NAME}}
          --dry-run=client -o yaml | kubectl apply -f -
      - kubectl delete job delete-argocd-capability -n crossplane-system 2>/dev/null || true
      - kubectl apply -f manifests/argocd/delete-capability.yaml
      - kubectl -n crossplane-system wait --for=condition=Complete --timeout=2400s job/delete-argocd-capability

  status:
    desc: Check bootstrap status
    cmds:
      - printf '{{.C_INFO}}=== Kind ==={{.C_RESET}}\n' && kind get clusters 2>/dev/null | grep "{{.KIND_CLUSTER_NAME}}" || echo "Not running"
      - printf '{{.C_INFO}}=== Helm ==={{.C_RESET}}\n' && helm list -A 2>/dev/null || echo "None"
      - printf '{{.C_INFO}}=== Providers ==={{.C_RESET}}\n' && kubectl get providers.pkg.crossplane.io 2>/dev/null || echo "None"
      - printf '{{.C_INFO}}=== Managed ==={{.C_RESET}}\n' && kubectl -n crossplane-system get managed 2>/dev/null || echo "None"
      - printf '{{.C_INFO}}=== Apps ==={{.C_RESET}}\n' && kubectl -n argocd get applications 2>/dev/null || echo "None"

  destroy-kind:
    desc: Delete Kind cluster only (hub persists)
    status:
      - "! kind get clusters 2>/dev/null | grep -q '^{{.KIND_CLUSTER_NAME}}$'"
    cmds:
      - kind delete cluster --name {{.KIND_CLUSTER_NAME}}



  idc:configure:
    desc: Configure IDC with Keycloak as external IdP and sync users via SCIM
    status:
      - |
        IDENTITY_STORE_ID=$(aws sso-admin list-instances --region {{.AWS_REGION}} \
          --query "Instances[?InstanceArn=='{{.IDC_INSTANCE_ARN}}'].IdentityStoreId" --output text 2>/dev/null)
        aws identitystore list-users --identity-store-id "$IDENTITY_STORE_ID" --region {{.AWS_REGION}} \
          --filters "AttributePath=UserName,AttributeValue={{.GIT_USERNAME}}" \
          --query "Users[0].UserId" --output text 2>/dev/null | grep -qv "^None\|^$"
    vars:
      IDC_INSTANCE_ID:
        sh: echo "{{.IDC_INSTANCE_ARN}}" | awk -F'/' '{print $NF}' | sed 's/^ssoins-//'
      KC_ADMIN_PASSWORD:
        sh: aws secretsmanager get-secret-value --secret-id {{.HUB_CLUSTER_NAME}}/keycloak --region {{.AWS_REGION}} --query 'SecretString' --output text | jq -r '.keycloak_admin_password'
      KEYCLOAK_DNS:
        sh: |
          if [ "{{.EXPOSURE_MODE}}" = "cloudfront" ] && [ -f {{.ROOT_DIR}}/private/cloudfront-domain ]; then
            cat {{.ROOT_DIR}}/private/cloudfront-domain
          else
            echo "{{.DOMAIN}}"
          fi
    cmds:
      - printf '{{.C_STEP}}▸ Refreshing IDC integration credentials via Lambda...{{.C_RESET}}\n'
      - |
        LAMBDA_ARN=$(aws cloudformation describe-stacks --region {{.AWS_REGION}} \
          --query "Stacks[?contains(StackName,'peeks-ide')].Outputs[?OutputKey=='KeycloakIDCCredentialsLambdaArn'].OutputValue | [0][0]" --output text 2>/dev/null)
        if [ -n "$LAMBDA_ARN" ] && [ "$LAMBDA_ARN" != "None" ]; then
          ROLE_ARN=$(aws cloudformation describe-stacks --region {{.AWS_REGION}} \
            --query "Stacks[?contains(StackName,'peeks-ide')].Outputs[?OutputKey=='SharedRoleArn'].OutputValue | [0][0]" --output text 2>/dev/null)
          if [ -z "$ROLE_ARN" ] || [ "$ROLE_ARN" = "None" ]; then
            ROLE_ARN=$(aws iam list-roles --query "Roles[?contains(RoleName,'SharedRole')].Arn | [0]" --output text)
          fi
          PAYLOAD=$(jq -n --arg role "$ROLE_ARN" --arg prefix "/{{.RESOURCE_PREFIX}}/keycloak-idc-integration-credentials" \
            '{RequestType:"Update",ResourceProperties:{RoleArn:$role,ParameterPrefix:$prefix,SessionDuration:"3600"}}')
          aws lambda invoke --function-name "$LAMBDA_ARN" --payload "$PAYLOAD" --region {{.AWS_REGION}} /tmp/lambda-response.json > /dev/null
          echo "Credentials refreshed via Lambda"
        else
          echo "WARN: Lambda not found. Falling back to instance profile (may trigger Epoxy on personal accounts)."
          TOKEN=$(curl -s -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")
          ROLE=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/iam/security-credentials/)
          CREDS=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/iam/security-credentials/$ROLE)
          CREDENTIALS_JSON=$(echo "$CREDS" | jq '{AccessKeyId: .AccessKeyId, SecretAccessKey: .SecretAccessKey, SessionToken: .Token, Expiration: .Expiration}')
          aws ssm put-parameter \
            --name "/{{.RESOURCE_PREFIX}}/keycloak-idc-integration-credentials" \
            --value "$CREDENTIALS_JSON" \
            --type "SecureString" \
            --overwrite \
            --region {{.AWS_REGION}} > /dev/null
          echo "Credentials stored in SSM (fallback)"
        fi
      - printf '{{.C_STEP}}▸ Installing Playwright dependencies...{{.C_RESET}}\n'
      - pip install playwright boto3 requests --quiet 2>/dev/null
      - python3 -m playwright install chromium --quiet 2>/dev/null || python3 -m playwright install chromium
      - sudo yum install -y atk at-spi2-atk cups-libs libdrm libxkbcommon libXcomposite libXdamage libXrandr mesa-libgbm pango alsa-lib nss nspr libXScrnSaver libXtst gtk3 --quiet 2>/dev/null || true
      - printf '{{.C_STEP}}▸ Running IDC ↔ Keycloak SAML/SCIM configuration...{{.C_RESET}}\n'
      - aws ssm get-parameter --name "/{{.RESOURCE_PREFIX}}/keycloak-idc-integration-credentials" --with-decryption --region {{.AWS_REGION}} --query 'Parameter.Value' --output text > /tmp/keycloak-idc-integration-credentials.json
      - |
        IDC_SUCCESS=false
        for attempt in 1 2 3; do
          printf '{{.C_INFO}}  Attempt %s/3...{{.C_RESET}}\n' "$attempt"
          if python3 {{.ROOT_DIR}}/platform/infra/terraform/scripts/configure_identity_center.py \
              --region {{.AWS_REGION}} \
              --instance-id {{.IDC_INSTANCE_ID}} \
              --keycloak-dns {{.KEYCLOAK_DNS}} \
              --keycloak-admin-password="{{.KC_ADMIN_PASSWORD}}"; then
            IDC_SUCCESS=true
            break
          fi
          [ $attempt -lt 3 ] && sleep 60
        done
        if [ "$IDC_SUCCESS" = true ]; then
          printf '{{.C_OK}}✓ IDC configured with Keycloak federation and SCIM sync.{{.C_RESET}}\n'
        else
          printf '{{.C_ERR}}⚠ IDC configuration failed after 3 attempts. Run manually later:{{.C_RESET}}\n'
          printf '  task kind-crossplane:idc:configure\n'
        fi
      - printf '{{.C_STEP}}▸ Syncing admin group members into IDC admin group for ArgoCD access...{{.C_RESET}}\n'
      - |
        ADMIN_GROUP_ID="{{.IDC_ADMIN_GROUP_ID}}"
        IDENTITY_STORE_ID=$(aws sso-admin list-instances --region {{.IDC_REGION}} --query 'Instances[0].IdentityStoreId' --output text | head -1)
        SCIM_ADMIN_GROUP=$(aws identitystore list-groups --identity-store-id "$IDENTITY_STORE_ID" --region {{.IDC_REGION}} \
          --query "Groups[?DisplayName=='admin'].GroupId | [0]" --output text 2>/dev/null)
        if [ -n "$SCIM_ADMIN_GROUP" ] && [ "$SCIM_ADMIN_GROUP" != "None" ]; then
          EXISTING_MEMBERS=$(aws identitystore list-group-memberships --identity-store-id "$IDENTITY_STORE_ID" \
            --group-id "$ADMIN_GROUP_ID" --region {{.IDC_REGION}} --query 'GroupMemberships[].MemberId.UserId' --output text 2>/dev/null)
          for USER_ID in $(aws identitystore list-group-memberships --identity-store-id "$IDENTITY_STORE_ID" \
            --group-id "$SCIM_ADMIN_GROUP" --region {{.IDC_REGION}} --query 'GroupMemberships[].MemberId.UserId' --output text 2>/dev/null); do
            if ! echo "$EXISTING_MEMBERS" | grep -q "$USER_ID"; then
              aws identitystore create-group-membership --identity-store-id "$IDENTITY_STORE_ID" \
                --group-id "$ADMIN_GROUP_ID" --member-id UserId="$USER_ID" --region {{.IDC_REGION}} 2>/dev/null || true
              echo "Added user $USER_ID to IDC admin group"
            fi
          done
          printf '{{.C_OK}}✓ Admin group members synced for ArgoCD access.{{.C_RESET}}\n'
        else
          printf '{{.C_ERR}}⚠ SCIM admin group not found — users may need manual assignment.{{.C_RESET}}\n'
        fi

  destroy:
    desc: >-
      Full teardown — addons, AWS resources. Kind cluster must be alive.
      Pass CLEANUP_KIND=true to also remove the Kind cluster after cleanup.
    vars:
      CLEANUP_KIND: '{{.CLEANUP_KIND | default "false"}}'
    cmds:
      # Refresh kubeconfig and credentials, restart providers to pick up new creds
      - kind get kubeconfig --name {{.KIND_CLUSTER_NAME}} > {{.KUBECONFIG}}
      - task: credentials:refresh
      - kubectl -n crossplane-system rollout restart deploy -l pkg.crossplane.io/revision 2>/dev/null || true
      - kubectl -n crossplane-system rollout status deploy -l pkg.crossplane.io/revision --timeout=120s 2>/dev/null || true
      # Phase 0: Tear down spoke clusters FIRST, while the hub controllers
      # (KRO/ACK/Crossplane) are still alive to reconcile their deletion. Doing this
      # after hub:destroy-addons would remove those controllers and orphan the spokes.
      - cmd: task spokes:disable-all
        ignore_error: true
      # Phase 1: Clean hub addons (continue on failure so remaining phases still run)
      - cmd: task hub:destroy-addons
        ignore_error: true
      # Phase 2: Delete pod identities and IAM resources (chart-managed)
      - cmd: |
          helm template crossplane-pod-identity {{.GITOPS_ROOT}}/addons/charts/crossplane-pod-identity \
            --set aws.region={{.AWS_REGION}} \
            --set aws.clusterName={{.HUB_CLUSTER_NAME}} \
            --set aws.accountId={{.AWS_ACCOUNT_ID}} \
            --set identities.eso.enabled=true \
            --set identities.lbc.enabled=true \
            --set identities.external-dns.enabled=true \
            | kubectl delete --ignore-not-found --wait=false --timeout=60s -f - 2>/dev/null || true
          kubectl -n crossplane-system wait --for=delete podidentityassociations.eks.aws.upbound.io -l platform.gitops.io/role --timeout=120s 2>/dev/null || true
          kubectl -n crossplane-system wait --for=delete rolepolicyattachments.iam.aws.upbound.io -l platform.gitops.io/role --timeout=120s 2>/dev/null || true
          kubectl -n crossplane-system wait --for=delete policies.iam.aws.upbound.io -l platform.gitops.io/role --timeout=120s 2>/dev/null || true
          kubectl -n crossplane-system wait --for=delete roles.iam.aws.upbound.io -l platform.gitops.io/role --timeout=120s 2>/dev/null || true
        ignore_error: true
      # Phase 3: Delete ArgoCD capability via Job, then its IAM role (needs IAM provider alive)
      # Use `task:` instead of `cmd: task ...` so the call doesn't go through gosh,
      # which mis-parses some yq-driven dynamic vars in credentials:setup.
      - task: argocd:delete-capability
        ignore_error: true
      - cmd: |
          sed "s|CLUSTER_NAME|{{.HUB_CLUSTER_NAME}}|g" claims/argocd-capability-role.yaml | kubectl delete --ignore-not-found --wait=false -f - 2>/dev/null || true
          kubectl -n crossplane-system wait --for=delete roles.iam.aws.upbound.io/argocd-capability-role --timeout=120s 2>/dev/null || true
        ignore_error: true
      # Belt-and-suspenders: if the Job-based delete failed (e.g. parser error,
      # config drift), call the AWS API directly so the cluster delete in Phase 4
      # isn't blocked by `Cluster has capabilities attached`.
      - cmd: |
          for CAP in $(aws eks list-capabilities --cluster-name {{.HUB_CLUSTER_NAME}} --region {{.AWS_REGION}} --query 'capabilities[].capabilityName' --output text 2>/dev/null); do
            echo "Deleting EKS capability $CAP on cluster {{.HUB_CLUSTER_NAME}}..."
            aws eks delete-capability --cluster-name {{.HUB_CLUSTER_NAME}} --capability-name "$CAP" --region {{.AWS_REGION}} --output text 2>/dev/null || true
          done
          # Wait for capabilities to fully drain before proceeding
          for i in $(seq 1 60); do
            REMAINING=$(aws eks list-capabilities --cluster-name {{.HUB_CLUSTER_NAME}} --region {{.AWS_REGION}} --query 'capabilities | length(@)' --output text 2>/dev/null || echo 0)
            [ "$REMAINING" = "0" ] && break
            echo "Waiting for $REMAINING EKS capabilities to delete... ($i/60)"
            sleep 20
          done
        ignore_error: true
      # Phase 4: Delete EKS cluster + VPC (needs providers alive to reconcile deletion)
      - cmd: |
          helm template hub-cluster {{.GITOPS_ROOT}}/abstractions/crossplane/platform-cluster \
            --set clusters.hub.region={{.AWS_REGION}} \
            --set clusters.hub.clusterName={{.HUB_CLUSTER_NAME}} \
            --show-only templates/claim.yaml \
            | kubectl delete --ignore-not-found --wait=false -f - 2>/dev/null || true
          kubectl -n crossplane-system wait --for=delete clusters.eks.aws.upbound.io --all --timeout=1800s 2>/dev/null || true
          kubectl -n crossplane-system wait --for=delete vpc.ec2.aws.upbound.io --all --timeout=600s 2>/dev/null || true
        ignore_error: true
      # The Crossplane CRs above can disappear before AWS reports the cluster
      # gone. If we tear down the providers in Phase 5 while AWS still has the
      # cluster ACTIVE, no further reconciliation can happen and the cluster +
      # VPC are left behind. Wait on the AWS side directly before proceeding.
      - cmd: |
          for i in $(seq 1 60); do
            STATUS=$(aws eks describe-cluster --name {{.HUB_CLUSTER_NAME}} --region {{.AWS_REGION}} --query 'cluster.status' --output text 2>&1)
            if echo "$STATUS" | grep -q "ResourceNotFoundException"; then
              echo "EKS cluster {{.HUB_CLUSTER_NAME}} confirmed deleted on AWS side"
              break
            fi
            echo "Waiting for AWS-side EKS cluster delete (status=$STATUS)... ($i/60)"
            sleep 30
          done
        ignore_error: true
      - kubectl delete -f {{.GITOPS_ROOT}}/abstractions/crossplane/platform-cluster/templates/composition.yaml --ignore-not-found 2>/dev/null || true
      - kubectl delete -f {{.GITOPS_ROOT}}/abstractions/crossplane/platform-cluster/templates/xrd.yaml --ignore-not-found 2>/dev/null || true
      # Phase 5: Delete crossplane-base provider pod identities and providers (safe — no managed resources left)
      - cmd: |
          helm template crossplane-base {{.GITOPS_ROOT}}/addons/charts/crossplane-base \
            --set providerConfig.enabled=false \
            --set aws.region={{.AWS_REGION}} \
            --set aws.clusterName={{.HUB_CLUSTER_NAME}} \
            --set aws.accountId={{.AWS_ACCOUNT_ID}} \
            --set providers.family.version=v2.5.3 \
            --set providers.iam.version=v2.5.3 \
            --set providers.eks.version=v2.5.3 \
            --set providers.ec2.version=v2.5.3 \
            | kubectl delete --ignore-not-found --wait=false -f - 2>/dev/null || true
          kubectl -n crossplane-system wait --for=delete podidentityassociations.eks.aws.upbound.io --all --timeout=120s 2>/dev/null || true
          kubectl -n crossplane-system wait --for=delete roles.iam.aws.upbound.io -l platform.gitops.io/role --timeout=120s 2>/dev/null || true
        ignore_error: true
      # Phase 6: Safety net — clean up any orphaned AWS resources
      - cmd: |
          for ASSOC_ID in $(aws eks list-pod-identity-associations --cluster-name {{.HUB_CLUSTER_NAME}} --region {{.AWS_REGION}} --query 'associations[].associationId' --output text 2>/dev/null); do
            echo "Deleting orphaned pod identity association $ASSOC_ID..."
            aws eks delete-pod-identity-association --cluster-name {{.HUB_CLUSTER_NAME}} --association-id $ASSOC_ID --region {{.AWS_REGION}} --output text 2>/dev/null || true
          done
          for ROLE in {{.HUB_CLUSTER_NAME}}-CrossplaneIAMProviderRole {{.HUB_CLUSTER_NAME}}-CrossplaneEKSProviderRole {{.HUB_CLUSTER_NAME}}-CrossplaneEC2ProviderRole {{.HUB_CLUSTER_NAME}}-ESOPodIdentityRole {{.HUB_CLUSTER_NAME}}-LBCPodIdentityRole {{.HUB_CLUSTER_NAME}}-ExternalDNSPodIdentityRole {{.HUB_CLUSTER_NAME}}-ArgoCDCapabilityRole; do
            for POLICY_ARN in $(aws iam list-attached-role-policies --role-name $ROLE --query 'AttachedPolicies[].PolicyArn' --output text 2>/dev/null); do
              aws iam detach-role-policy --role-name $ROLE --policy-arn $POLICY_ARN 2>/dev/null || true
            done
            aws iam delete-role --role-name $ROLE 2>/dev/null || true
          done
          for POLICY in {{.HUB_CLUSTER_NAME}}-ESOSecretsManagerPolicy {{.HUB_CLUSTER_NAME}}-LBCControllerPolicy {{.HUB_CLUSTER_NAME}}-ExternalDNSRoute53Policy; do
            POLICY_ARN=$(aws iam list-policies --query "Policies[?PolicyName==\`$POLICY\`].Arn" --output text 2>/dev/null)
            [ -n "$POLICY_ARN" ] && aws iam delete-policy --policy-arn "$POLICY_ARN" 2>/dev/null || true
          done
        ignore_error: true
      # Phase 7: Clean up observability resources (AMP scrapers, AMP workspace, AMG workspace).
      # Scrapers hold ENIs in VPCs and must be deleted before VPC cleanup.
      - cmd: |
          # Delete AMP scrapers tagged by our platform
          for SCRAPER_ID in $(aws amp list-scrapers --region {{.AWS_REGION}} --query "scrapers[?starts_with(alias,'{{.RESOURCE_PREFIX}}-')].scraperId" --output text 2>/dev/null); do
            echo "Deleting AMP scraper $SCRAPER_ID"
            aws amp delete-scraper --scraper-id "$SCRAPER_ID" --region {{.AWS_REGION}} 2>/dev/null || true
          done
          # Delete AMP workspace by crossplane-name tag
          for WS_ID in $(aws amp list-workspaces --region {{.AWS_REGION}} --query "workspaces[].workspaceId" --output text 2>/dev/null); do
            TAG_VAL=$(aws amp list-tags-for-resource --resource-arn "arn:aws:aps:{{.AWS_REGION}}:{{.AWS_ACCOUNT_ID}}:workspace/$WS_ID" --region {{.AWS_REGION}} --query "tags.\"crossplane-name\"" --output text 2>/dev/null || echo "")
            if [ "$TAG_VAL" = "{{.RESOURCE_PREFIX}}-amp" ]; then
              echo "Deleting AMP workspace $WS_ID (crossplane-name={{.RESOURCE_PREFIX}}-amp)"
              aws amp delete-workspace --workspace-id "$WS_ID" --region {{.AWS_REGION}} 2>/dev/null || true
            fi
          done
          # Delete AMG workspace by crossplane-name tag
          for WS_ID in $(aws grafana list-workspaces --region {{.AWS_REGION}} --query "workspaces[].id" --output text 2>/dev/null); do
            TAG_VAL=$(aws grafana describe-workspace --workspace-id "$WS_ID" --region {{.AWS_REGION}} --query "workspace.tags.\"crossplane-name\"" --output text 2>/dev/null || echo "")
            if [ "$TAG_VAL" = "{{.RESOURCE_PREFIX}}-amg" ]; then
              echo "Deleting AMG workspace $WS_ID (crossplane-name={{.RESOURCE_PREFIX}}-amg)"
              aws grafana delete-workspace --workspace-id "$WS_ID" --region {{.AWS_REGION}} 2>/dev/null || true
            fi
          done
          # Wait for scrapers to fully delete (they hold ENIs in VPCs)
          for i in $(seq 1 40); do
            REMAINING=$(aws amp list-scrapers --region {{.AWS_REGION}} --query "scrapers[?starts_with(alias,'{{.RESOURCE_PREFIX}}-') && status.statusCode!='DELETION_FAILED'] | length(@)" --output text 2>/dev/null || echo "0")
            [ "$REMAINING" = "0" ] && break
            echo "Waiting for $REMAINING scraper(s) to delete... ($i/40)"
            sleep 15
          done
        ignore_error: true
      # Phase 8: VPC-level orphan cleanup. The Crossplane VPC delete in Phase 4
      # can stop reconciling once the providers are torn down in Phase 5, leaving
      # AWS-side dependencies (ELBs, NAT gateways, VPC endpoints, EIPs, subnets,
      # IGW, route tables, security groups). Tear them down by Crossplane tag so
      # subsequent VPC deletes succeed.
      - cmd: |
          # Find any VPCs tagged by the Crossplane EC2 provider for our clusters
          VPCS=$(aws ec2 describe-vpcs --region {{.AWS_REGION}} \
            --filters "Name=tag:platform.gitops.io/cluster,Values={{.HUB_CLUSTER_NAME}},spoke-dev,spoke-prod" \
            --query 'Vpcs[].VpcId' --output text 2>/dev/null)
          if [ -z "$VPCS" ]; then
            echo "No tagged Crossplane VPCs found — skipping VPC orphan cleanup"
            exit 0
          fi
          for VPC in $VPCS; do
            echo "=== Cleaning up dependencies in $VPC ==="
            # ELBs (created by aws-load-balancer-controller, not directly tagged
            # by us, but pinned to the VPC)
            for LB_ARN in $(aws elbv2 describe-load-balancers --region {{.AWS_REGION}} \
                --query "LoadBalancers[?VpcId=='$VPC'].LoadBalancerArn" --output text 2>/dev/null); do
              echo "Deleting ELB $LB_ARN"
              aws elbv2 delete-load-balancer --load-balancer-arn "$LB_ARN" --region {{.AWS_REGION}} 2>/dev/null || true
            done
            # NAT gateways and their EIPs
            for NAT in $(aws ec2 describe-nat-gateways --region {{.AWS_REGION}} \
                --filter "Name=vpc-id,Values=$VPC" "Name=state,Values=available,pending" \
                --query 'NatGateways[].NatGatewayId' --output text 2>/dev/null); do
              echo "Deleting NAT gateway $NAT"
              aws ec2 delete-nat-gateway --nat-gateway-id "$NAT" --region {{.AWS_REGION}} 2>/dev/null || true
            done
            # VPC endpoints (interface endpoints leave ENIs behind)
            ENDPOINTS=$(aws ec2 describe-vpc-endpoints --region {{.AWS_REGION}} \
              --filters "Name=vpc-id,Values=$VPC" \
              --query 'VpcEndpoints[].VpcEndpointId' --output text 2>/dev/null)
            if [ -n "$ENDPOINTS" ]; then
              echo "Deleting VPC endpoints: $ENDPOINTS"
              aws ec2 delete-vpc-endpoints --vpc-endpoint-ids $ENDPOINTS --region {{.AWS_REGION}} 2>/dev/null || true
            fi
          done
          # Wait for NAT gateways to fully delete (they hold EIPs and ENIs)
          for i in $(seq 1 30); do
            REMAINING=$(aws ec2 describe-nat-gateways --region {{.AWS_REGION}} \
              --filter "Name=state,Values=deleting" \
              --query "NatGateways[?contains('$VPCS', VpcId)] | length(@)" --output text 2>/dev/null || echo 0)
            [ "$REMAINING" = "0" ] && break
            echo "Waiting for $REMAINING NAT gateways to delete... ($i/30)"
            sleep 20
          done
          # Release EIPs tagged by Crossplane for our clusters
          for EIP in $(aws ec2 describe-addresses --region {{.AWS_REGION}} \
              --filters "Name=tag:platform.gitops.io/cluster,Values={{.HUB_CLUSTER_NAME}},spoke-dev,spoke-prod" \
              --query 'Addresses[].AllocationId' --output text 2>/dev/null); do
            echo "Releasing EIP $EIP"
            aws ec2 release-address --allocation-id "$EIP" --region {{.AWS_REGION}} 2>/dev/null || true
          done
          # Now drop subnets, IGW, route tables, security groups, then VPC itself
          for VPC in $VPCS; do
            for IGW in $(aws ec2 describe-internet-gateways --region {{.AWS_REGION}} \
                --filters "Name=attachment.vpc-id,Values=$VPC" \
                --query 'InternetGateways[].InternetGatewayId' --output text 2>/dev/null); do
              echo "Detaching+deleting IGW $IGW"
              aws ec2 detach-internet-gateway --internet-gateway-id "$IGW" --vpc-id "$VPC" --region {{.AWS_REGION}} 2>/dev/null || true
              aws ec2 delete-internet-gateway --internet-gateway-id "$IGW" --region {{.AWS_REGION}} 2>/dev/null || true
            done
            for SUBNET in $(aws ec2 describe-subnets --region {{.AWS_REGION}} \
                --filters "Name=vpc-id,Values=$VPC" --query 'Subnets[].SubnetId' --output text 2>/dev/null); do
              aws ec2 delete-subnet --subnet-id "$SUBNET" --region {{.AWS_REGION}} 2>/dev/null || true
            done
            for RT in $(aws ec2 describe-route-tables --region {{.AWS_REGION}} \
                --filters "Name=vpc-id,Values=$VPC" \
                --query 'RouteTables[?!(Associations[?Main==`true`])].RouteTableId' --output text 2>/dev/null); do
              aws ec2 delete-route-table --route-table-id "$RT" --region {{.AWS_REGION}} 2>/dev/null || true
            done
            for SG in $(aws ec2 describe-security-groups --region {{.AWS_REGION}} \
                --filters "Name=vpc-id,Values=$VPC" \
                --query 'SecurityGroups[?GroupName!=`default`].GroupId' --output text 2>/dev/null); do
              # Revoke rules first (SGs may reference each other)
              ING=$(aws ec2 describe-security-groups --group-ids "$SG" --region {{.AWS_REGION}} --query 'SecurityGroups[0].IpPermissions' --output json 2>/dev/null)
              EGR=$(aws ec2 describe-security-groups --group-ids "$SG" --region {{.AWS_REGION}} --query 'SecurityGroups[0].IpPermissionsEgress' --output json 2>/dev/null)
              [ "$ING" != "[]" ] && aws ec2 revoke-security-group-ingress --group-id "$SG" --ip-permissions "$ING" --region {{.AWS_REGION}} 2>/dev/null || true
              [ "$EGR" != "[]" ] && aws ec2 revoke-security-group-egress --group-id "$SG" --ip-permissions "$EGR" --region {{.AWS_REGION}} 2>/dev/null || true
            done
            for SG in $(aws ec2 describe-security-groups --region {{.AWS_REGION}} \
                --filters "Name=vpc-id,Values=$VPC" \
                --query 'SecurityGroups[?GroupName!=`default`].GroupId' --output text 2>/dev/null); do
              aws ec2 delete-security-group --group-id "$SG" --region {{.AWS_REGION}} 2>/dev/null || true
            done
            echo "Deleting VPC $VPC"
            aws ec2 delete-vpc --vpc-id "$VPC" --region {{.AWS_REGION}} 2>/dev/null || true
          done
          # Secrets Manager — Crossplane cluster claims also push hub/spoke config
          # secrets that survive the AWS resource teardown
          for SECRET in {{.HUB_CLUSTER_NAME}}/config {{.HUB_CLUSTER_NAME}}/keycloak {{.HUB_CLUSTER_NAME}}/keycloak-clients {{.HUB_CLUSTER_NAME}}/secrets spoke-dev/config spoke-prod/config spoke-dev/secrets spoke-prod/secrets; do
            aws secretsmanager delete-secret --secret-id "$SECRET" --force-delete-without-recovery --region {{.AWS_REGION}} --output text 2>/dev/null || true
          done
        ignore_error: true
      # Phase 9: Clean up Kind (pass CLEANUP_KIND=true to remove)
      - cmd: |
          if [ "{{.CLEANUP_KIND}}" = "true" ]; then
            kind delete cluster --name {{.KIND_CLUSTER_NAME}}
          else
            echo "Kind cluster preserved. Run 'task destroy-kind' or re-run with CLEANUP_KIND=true."
          fi

  hub:update:
    desc: Update hub infra via Kind+Crossplane
    vars:
      MNG_SETS:
        sh: |
          if [ "$(yq '.hub.managedNodeGroup.enabled // false' {{.CONFIG_FILE}})" = "true" ]; then
            SETS="--set clusters.hub.managedNodeGroup.enabled=true"
            IDX=0
            for TYPE in $(yq '.hub.managedNodeGroup.instanceTypes // ["m5.large"] | .[]' {{.CONFIG_FILE}}); do
              SETS="$SETS --set clusters.hub.managedNodeGroup.instanceTypes[$IDX]=$TYPE"
              IDX=$((IDX+1))
            done
            SETS="$SETS --set clusters.hub.managedNodeGroup.desiredSize=$(yq '.hub.managedNodeGroup.desiredSize // 2' {{.CONFIG_FILE}})"
            SETS="$SETS --set clusters.hub.managedNodeGroup.minSize=$(yq '.hub.managedNodeGroup.minSize // 1' {{.CONFIG_FILE}})"
            SETS="$SETS --set clusters.hub.managedNodeGroup.maxSize=$(yq '.hub.managedNodeGroup.maxSize // 5' {{.CONFIG_FILE}})"
            SETS="$SETS --set clusters.hub.managedNodeGroup.diskSize=$(yq '.hub.managedNodeGroup.diskSize // 50' {{.CONFIG_FILE}})"
            SETS="$SETS --set clusters.hub.managedNodeGroup.capacityType=$(yq '.hub.managedNodeGroup.capacityType // "ON_DEMAND"' {{.CONFIG_FILE}})"
            echo "$SETS"
          fi
    cmds:
      - task: init
      - task: kind:create
      - task: credentials:setup
      - task: crossplane:helm
      - task: crossplane:providers
      - task: crossplane:provider-config
      - kubectl apply -f {{.GITOPS_ROOT}}/abstractions/crossplane/platform-cluster/templates/ 2>/dev/null || true
      - helm template hub-cluster {{.GITOPS_ROOT}}/abstractions/crossplane/platform-cluster
          --set clusters.hub.region={{.AWS_REGION}}
          --set clusters.hub.clusterName={{.HUB_CLUSTER_NAME}}
          --set clusters.hub.kubernetesVersion={{.HUB_K8S_VERSION}}
          --set clusters.hub.vpcCidr={{.HUB_VPC_CIDR}}
          --set clusters.hub.resourcePrefix={{.RESOURCE_PREFIX}}
          {{.MNG_SETS}}
          | kubectl apply -f -
      - kubectl apply -f claims/
      - kubectl -n crossplane-system wait --for=condition=Ready --timeout=3500s platformclusters.platform.gitops.io/{{.HUB_CLUSTER_NAME}}
      - task: destroy-kind

  spokes:seed-provider-identity:
    desc: >-
      Seed the bootstrap Crossplane provider IAM roles + EKS Pod Identity
      associations for spoke clusters (same account). The iam/eks providers are
      createIdentity:false in the registry, so crossplane-base does NOT create
      their roles; without this seed a spoke's iam/eks providers cannot
      authenticate (chicken-and-egg). Mirrors the hub bootstrap. Idempotent.
      Run after spokes are provisioned (ACTIVE). Cross-account spokes are NOT
      handled here - their roles must be bootstrapped in the target account.
    cmds:
      - cmd: |
          # provider service-account suffix -> IAM role name suffix
          PROVIDERS="iam:CrossplaneIAMProviderRole eks:CrossplaneEKSProviderRole"
          # Discover spokes from fleet members, excluding the hub.
          SPOKES=$(ls "{{.GITOPS_ROOT}}/fleet/members" 2>/dev/null | grep -vx "{{.HUB_CLUSTER_NAME}}" || true)
          if [ -z "$SPOKES" ]; then
            printf '{{.C_INFO}}  No spoke members under fleet/members; nothing to seed.{{.C_RESET}}\n'
            exit 0
          fi
          for SPOKE in $SPOKES; do
            STATUS=$(aws eks describe-cluster --name "$SPOKE" --region {{.AWS_REGION}} --query 'cluster.status' --output text 2>/dev/null || echo "NONE")
            if [ "$STATUS" != "ACTIVE" ]; then
              printf '{{.C_INFO}}  Skipping %s (cluster status: %s){{.C_RESET}}\n' "$SPOKE" "$STATUS"
              continue
            fi
            for ENTRY in $PROVIDERS; do
              SVC="${ENTRY%%:*}"            # iam | eks
              ROLE_NAME="${SPOKE}-${ENTRY##*:}"
              SA="provider-aws-${SVC}"
              ROLE_ARN="arn:aws:iam::{{.AWS_ACCOUNT_ID}}:role/${ROLE_NAME}"
              # 1. IAM role trusting EKS Pod Identity (idempotent)
              if ! aws iam get-role --role-name "$ROLE_NAME" >/dev/null 2>&1; then
                aws iam create-role --role-name "$ROLE_NAME" \
                  --assume-role-policy-document '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":{"Service":"pods.eks.amazonaws.com"},"Action":["sts:AssumeRole","sts:TagSession"]}]}' \
                  --tags Key=managed-by,Value=platform-bootstrap Key=purpose,Value="${SVC}-provider" >/dev/null
                printf '{{.C_OK}}  ✓ %s: created role %s{{.C_RESET}}\n' "$SPOKE" "$ROLE_NAME"
              else
                printf '{{.C_INFO}}  %s: role %s exists{{.C_RESET}}\n' "$SPOKE" "$ROLE_NAME"
              fi
              # 2. AdministratorAccess (attach is idempotent)
              aws iam attach-role-policy --role-name "$ROLE_NAME" \
                --policy-arn arn:aws:iam::aws:policy/AdministratorAccess >/dev/null
              # 3. Pod Identity association on the spoke (idempotent)
              EXISTING=$(aws eks list-pod-identity-associations --cluster-name "$SPOKE" --region {{.AWS_REGION}} \
                --namespace crossplane-system --service-account "$SA" \
                --query 'associations[0].associationId' --output text 2>/dev/null || echo "None")
              if [ "$EXISTING" = "None" ] || [ -z "$EXISTING" ]; then
                aws eks create-pod-identity-association --cluster-name "$SPOKE" --region {{.AWS_REGION}} \
                  --namespace crossplane-system --service-account "$SA" --role-arn "$ROLE_ARN" >/dev/null
                printf '{{.C_OK}}  ✓ %s: pod identity %s -> %s{{.C_RESET}}\n' "$SPOKE" "$SA" "$ROLE_NAME"
              else
                printf '{{.C_INFO}}  %s: pod identity for %s exists{{.C_RESET}}\n' "$SPOKE" "$SA"
              fi
            done
          done
          printf '{{.C_OK}}✓ Spoke provider identity seeding complete.{{.C_RESET}}\n'


  ray:setup:
    desc: "Set up Ray ML infrastructure: S3 bucket, ECR repo, vLLM image, S3 CSI driver, IAM + Pod Identity"
    vars:
      RAY_BUCKET: "{{.RESOURCE_PREFIX}}-ray-models-{{.AWS_ACCOUNT_ID}}"
      RAY_ECR_REPO: "{{.RESOURCE_PREFIX}}-ray-vllm-custom"
      RAY_ROLE_PRESTAGE: "{{.RESOURCE_PREFIX}}-model-prestage-role"
      RAY_ROLE_WORKER: "{{.RESOURCE_PREFIX}}-ray-worker-role"
      DOCKERFILE_PATH: "{{.ROOT_DIR}}/platform/infra/terraform/common/Dockerfile.ray-vllm"
    cmds:
      - echo "▸ Setting up Ray ML infrastructure..."
      # 1. S3 bucket
      - cmd: |
          if aws s3api head-bucket --bucket "{{.RAY_BUCKET}}" --region {{.AWS_REGION}} 2>/dev/null; then
            echo "  ✓ S3 bucket {{.RAY_BUCKET}} exists"
          else
            aws s3api create-bucket --bucket "{{.RAY_BUCKET}}" --region {{.AWS_REGION}} \
              --create-bucket-configuration LocationConstraint={{.AWS_REGION}} --output text >/dev/null
            aws s3api put-public-access-block --bucket "{{.RAY_BUCKET}}" \
              --public-access-block-configuration BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true
            echo "  ✓ S3 bucket {{.RAY_BUCKET}} created"
          fi
      # 2. ECR repo
      - cmd: |
          if aws ecr describe-repositories --repository-names "{{.RAY_ECR_REPO}}" --region {{.AWS_REGION}} >/dev/null 2>&1; then
            echo "  ✓ ECR repo {{.RAY_ECR_REPO}} exists"
          else
            aws ecr create-repository --repository-name "{{.RAY_ECR_REPO}}" --region {{.AWS_REGION}} \
              --image-tag-mutability MUTABLE --output text >/dev/null
            echo "  ✓ ECR repo {{.RAY_ECR_REPO}} created"
          fi
      # 3. Build and push vLLM image (background - non-blocking)
      - cmd: |
          IMAGE_URI="{{.AWS_ACCOUNT_ID}}.dkr.ecr.{{.AWS_REGION}}.amazonaws.com/{{.RAY_ECR_REPO}}:latest"
          if aws ecr describe-images --repository-name "{{.RAY_ECR_REPO}}" --image-ids imageTag=latest --region {{.AWS_REGION}} >/dev/null 2>&1; then
            echo "  ✓ vLLM image already exists"
          else
            echo "  ▸ Building vLLM image in background (5-10 min)..."
            aws ecr get-login-password --region {{.AWS_REGION}} | docker login --username AWS --password-stdin {{.AWS_ACCOUNT_ID}}.dkr.ecr.{{.AWS_REGION}}.amazonaws.com >/dev/null 2>&1
            nohup bash -c "docker build -t '$IMAGE_URI' -f '{{.DOCKERFILE_PATH}}' '$(dirname {{.DOCKERFILE_PATH}})' && docker push '$IMAGE_URI' && echo '[ray] ✓ vLLM image pushed' >> /tmp/ray-build.log" > /tmp/ray-build.log 2>&1 &
            echo "  ✓ Build started (PID $!, log: /tmp/ray-build.log)"
            echo "  Run 'task ray:wait-image' to wait for completion."
          fi
      # 4. S3 CSI driver addon
      - cmd: |
          if aws eks describe-addon --cluster-name {{.HUB_CLUSTER_NAME}} --addon-name aws-mountpoint-s3-csi-driver --region {{.AWS_REGION}} >/dev/null 2>&1; then
            echo "  ✓ S3 CSI driver addon installed"
          else
            aws eks create-addon --cluster-name {{.HUB_CLUSTER_NAME}} --addon-name aws-mountpoint-s3-csi-driver --region {{.AWS_REGION}} --output text >/dev/null
            aws eks wait addon-active --cluster-name {{.HUB_CLUSTER_NAME}} --addon-name aws-mountpoint-s3-csi-driver --region {{.AWS_REGION}} 2>/dev/null || true
            echo "  ✓ S3 CSI driver addon installed"
          fi
      # 5. IAM roles
      - cmd: |
          TRUST='{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":{"Service":"pods.eks.amazonaws.com"},"Action":["sts:AssumeRole","sts:TagSession"]}]}'
          S3_RW='{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Action":["s3:GetObject","s3:PutObject","s3:DeleteObject","s3:ListBucket"],"Resource":["arn:aws:s3:::{{.RAY_BUCKET}}","arn:aws:s3:::{{.RAY_BUCKET}}/*"]}]}'
          S3_RO='{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Action":["s3:GetObject","s3:ListBucket"],"Resource":["arn:aws:s3:::{{.RAY_BUCKET}}","arn:aws:s3:::{{.RAY_BUCKET}}/*"]}]}'
          for ROLE_INFO in "{{.RAY_ROLE_PRESTAGE}}|$S3_RW" "{{.RAY_ROLE_WORKER}}|$S3_RO"; do
            ROLE="${ROLE_INFO%%|*}"; POLICY="${ROLE_INFO#*|}"
            if aws iam get-role --role-name "$ROLE" >/dev/null 2>&1; then
              echo "  ✓ IAM role $ROLE exists"
            else
              aws iam create-role --role-name "$ROLE" --assume-role-policy-document "$TRUST" --output text >/dev/null
              aws iam put-role-policy --role-name "$ROLE" --policy-name s3-access --policy-document "$POLICY"
              echo "  ✓ IAM role $ROLE created"
            fi
          done
      # 6. Pod Identity associations
      - cmd: |
          PRESTAGE_ARN="arn:aws:iam::{{.AWS_ACCOUNT_ID}}:role/{{.RAY_ROLE_PRESTAGE}}"
          WORKER_ARN="arn:aws:iam::{{.AWS_ACCOUNT_ID}}:role/{{.RAY_ROLE_WORKER}}"
          for SA_INFO in "ray-system|model-prestage-sa|$PRESTAGE_ARN" "ray-system|ray-worker-sa|$WORKER_ARN" "kube-system|s3-csi-driver-sa|$WORKER_ARN"; do
            NS="${SA_INFO%%|*}"; REST="${SA_INFO#*|}"; SA="${REST%%|*}"; ARN="${REST#*|}"
            if aws eks list-pod-identity-associations --cluster-name {{.HUB_CLUSTER_NAME}} --namespace "$NS" --service-account "$SA" --region {{.AWS_REGION}} --query 'associations[0].associationId' --output text 2>/dev/null | grep -q "^a-"; then
              echo "  ✓ PIA $SA in $NS exists"
            else
              aws eks create-pod-identity-association --cluster-name {{.HUB_CLUSTER_NAME}} --namespace "$NS" --service-account "$SA" --role-arn "$ARN" --region {{.AWS_REGION}} --output text >/dev/null 2>&1
              echo "  ✓ PIA $SA in $NS created"
            fi
          done
      - echo "✓ Ray ML infrastructure ready (bucket={{.RAY_BUCKET}}, image={{.RAY_ECR_REPO}}:latest)"

  ray:prestage-models:
    desc: "Download ML models to S3 bucket for Ray serving"
    vars:
      RAY_BUCKET: "{{.RESOURCE_PREFIX}}-ray-models-{{.AWS_ACCOUNT_ID}}"
    cmds:
      - cmd: |
          pip3 install -q huggingface_hub 2>/dev/null
          echo "Downloading TinyLlama..."
          python3 -c "from huggingface_hub import snapshot_download; snapshot_download(repo_id='TinyLlama/TinyLlama-1.1B-Chat-v1.0', local_dir='/tmp/tinyllama', local_dir_use_symlinks=False)"
          echo "Uploading to s3://{{.RAY_BUCKET}}/models/tinyllama/..."
          aws s3 sync /tmp/tinyllama/ s3://{{.RAY_BUCKET}}/models/tinyllama/ --region {{.AWS_REGION}} --no-progress
          rm -rf /tmp/tinyllama
          echo "✓ TinyLlama model uploaded"


  ray:wait-image:
    desc: "Wait for the background vLLM image build to complete"
    vars:
      RAY_ECR_REPO: "{{.RESOURCE_PREFIX}}-ray-vllm-custom"
    cmds:
      - cmd: |
          echo "Waiting for vLLM image build..."
          for i in $(seq 1 60); do
            if aws ecr describe-images --repository-name "{{.RAY_ECR_REPO}}" --image-ids imageTag=latest --region {{.AWS_REGION}} >/dev/null 2>&1; then
              echo "✓ vLLM image ready in ECR"
              exit 0
            fi
            if [ -f /tmp/ray-build.log ]; then
              tail -1 /tmp/ray-build.log
            fi
            sleep 10
          done
          echo "✗ Timeout waiting for image (check /tmp/ray-build.log)"
          exit 1

  hub:destroy-addons:
    desc: Remove all addons from the hub cluster (no git changes needed)
    vars:
      ADDONS:
        sh: |
          ENABLED_LABELS=$(for f in {{.GITOPS_ROOT}}/overlays/environments/*/enabled-addons.yaml; do
            [ -f "$f" ] && yq -r '.enabledAddons | to_entries[] | select(.value == true) | "enable_" + .key' "$f"
          done | sort -u)
          REGISTRY=$(yq eval-all '. as $item ireduce ({}; . * $item)' \
            {{.GITOPS_ROOT}}/addons/registry/core.yaml \
            {{.GITOPS_ROOT}}/addons/registry/gitops.yaml \
            {{.GITOPS_ROOT}}/addons/registry/security.yaml \
            {{.GITOPS_ROOT}}/addons/registry/observability.yaml \
            {{.GITOPS_ROOT}}/addons/registry/ml.yaml \
            {{.GITOPS_ROOT}}/addons/registry/platform.yaml)
          echo "$REGISTRY" | yq -r 'to_entries[] | .key + " " + .value.selector.matchExpressions[0].key + " " + (.value.annotationsAppSet."argocd.argoproj.io/sync-wave" // "0")' | while read addon selector wave; do
            if echo "$ENABLED_LABELS" | grep -qx "$selector"; then
              echo "$wave $addon"
            fi
          done | sort -rn | awk '{print $2}'
    cmds:
      - task: hub:kubeconfig
      - printf '{{.C_ERR}}▸ Stopping all regeneration...{{.C_RESET}}\n'
      # 1. Delete bootstrap ApplicationSet (preserveResources) to stop recreating bootstrap App
      - KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl patch applicationset bootstrap -n argocd --type merge -p '{"spec":{"syncPolicy":{"preserveResourcesOnDeletion":true}}}' 2>/dev/null || true
      - sleep 3
      - KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl delete applicationset bootstrap -n argocd --timeout=30s 2>/dev/null || true
      # 2. Delete bootstrap Application (no cascade) to stop syncing bootstrap/ directory
      - KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl patch application bootstrap -n argocd --type merge -p '{"metadata":{"finalizers":[]}}' 2>/dev/null || true
      - KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl delete application bootstrap -n argocd --wait=false 2>/dev/null || true
      # 3. Delete cluster-addons ApplicationSet (preserveResources) to stop generating addon ApplicationSets
      - KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl patch applicationset cluster-addons -n argocd --type merge -p '{"spec":{"syncPolicy":{"preserveResourcesOnDeletion":true}}}' 2>/dev/null || true
      - sleep 3
      - KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl delete applicationset cluster-addons -n argocd --timeout=30s 2>/dev/null || true
      # 4. Delete cluster-addons Application (no cascade)
      - KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl patch application cluster-addons -n argocd --type merge -p '{"metadata":{"finalizers":[]}}' 2>/dev/null || true
      - KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl delete application cluster-addons -n argocd --wait=false 2>/dev/null || true
      # 5. Delete non-Crossplane addon ApplicationSets in reverse sync-wave order
      - cmd: |
          if [ "{{.ITEM}}" = "argocd" ] || [ "{{.ITEM}}" = "crossplane" ] || [ "{{.ITEM}}" = "crossplane-base" ] || [ "{{.ITEM}}" = "crossplane-aws" ]; then
            echo "Skipping {{.ITEM}} (Crossplane stack — deleted after clusters)"
          elif KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl get applicationset {{.ITEM}} -n argocd >/dev/null 2>&1; then
            echo "Deleting {{.ITEM}}..."
            KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl patch applicationset {{.ITEM}} -n argocd --type merge -p '{"spec":{"syncPolicy":{"preserveResourcesOnDeletion":false}}}' 2>/dev/null || true
            sleep 3
            KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl delete applicationset {{.ITEM}} -n argocd --timeout=180s 2>/dev/null || true
            KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl wait --for=delete applications -n argocd -l addonName={{.ITEM}} --timeout=120s 2>/dev/null || true
          else
            echo "Skipping {{.ITEM}} (not found)"
          fi
        ignore_error: true
        for:
          var: ADDONS
      # 6. Delete clusters (spoke + hub claims cleaned up before Crossplane providers are removed)
      - printf '{{.C_ERR}}▸ Deleting clusters...{{.C_RESET}}\n'
      - KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl patch applicationset clusters -n argocd --type merge -p '{"spec":{"syncPolicy":{"preserveResourcesOnDeletion":false}}}' 2>/dev/null || true
      - sleep 3
      - KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl delete applicationset clusters -n argocd --timeout=60s 2>/dev/null || true
      - cmd: |
          KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl wait --for=delete applications -n argocd -l app.kubernetes.io/instance=clusters --timeout=600s 2>/dev/null || \
          (KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl patch application clusters -n argocd --type merge -p '{"metadata":{"finalizers":[]}}' 2>/dev/null && \
           KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl delete application clusters -n argocd --wait=false 2>/dev/null) || true
      # 7. Delete Crossplane stack in reverse wave order (providers still alive for cluster cleanup)
      - cmd: |
          for ADDON in crossplane-aws crossplane-base crossplane; do
            if KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl get applicationset $ADDON -n argocd >/dev/null 2>&1; then
              echo "Deleting $ADDON..."
              KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl patch applicationset $ADDON -n argocd --type merge -p '{"spec":{"syncPolicy":{"preserveResourcesOnDeletion":false}}}' 2>/dev/null || true
              sleep 3
              KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl delete applicationset $ADDON -n argocd --timeout=180s 2>/dev/null || true
              KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl wait --for=delete applications -n argocd -l addonName=$ADDON --timeout=120s 2>/dev/null || true
            fi
          done
        ignore_error: true
      # 8. Delete fleet-secrets
      - printf '{{.C_ERR}}▸ Deleting fleet-secrets...{{.C_RESET}}\n'
      - KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl patch applicationset fleet-secrets -n argocd --type merge -p '{"spec":{"syncPolicy":{"preserveResourcesOnDeletion":false}}}' 2>/dev/null || true
      - sleep 3
      - KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl delete applicationset fleet-secrets -n argocd --timeout=180s 2>/dev/null || true
      # 9. Cleanup remaining applications
      - cmd: |
          for app in $(KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl get applications -n argocd -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' 2>/dev/null); do
            echo "Deleting leftover app $app..."
            KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl delete application $app -n argocd --timeout=300s 2>/dev/null || \
            (echo "Force-deleting stuck app $app (stripping finalizers)..." && \
             KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl patch application $app -n argocd --type merge -p '{"metadata":{"finalizers":[]}}' 2>/dev/null && \
             KUBECONFIG={{.ROOT_DIR}}/private/hub-kubeconfig kubectl delete application $app -n argocd --wait=false 2>/dev/null) || true
          done
        ignore_error: true
      - printf '{{.C_ERR}}▸ Cleaning up AWS resources...{{.C_RESET}}\n'
      - aws secretsmanager delete-secret --secret-id {{.HUB_CLUSTER_NAME}}/config --force-delete-without-recovery --region {{.AWS_REGION}} --output text 2>/dev/null || true
      - aws secretsmanager delete-secret --secret-id {{.HUB_CLUSTER_NAME}}/keycloak --force-delete-without-recovery --region {{.AWS_REGION}} --output text 2>/dev/null || true
      - aws secretsmanager delete-secret --secret-id {{.HUB_CLUSTER_NAME}}/keycloak-clients --force-delete-without-recovery --region {{.AWS_REGION}} --output text 2>/dev/null || true
      - rm -f {{.ROOT_DIR}}/private/hub-kubeconfig
      - printf '{{.C_OK}}✓ Hub addons destroyed.{{.C_RESET}}\n'
