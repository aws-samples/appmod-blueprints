{{- if eq .Values.mode "direct" }}
{{- $clusterName := required "clusterName is required" .Values.clusterName -}}
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: {{ $clusterName }}
  namespace: argocd
  annotations:
    addonsRepoURL: {{ .Values.hub.addonsRepoURL | quote }}
    addonsRepoRevision: {{ .Values.hub.addonsRepoRevision | quote }}
    addonsRepoBasepath: {{ .Values.hub.addonsRepoBasepath | quote }}
    fleetRepoURL: {{ .Values.hub.fleetRepoURL | quote }}
    fleetRepoRevision: {{ .Values.hub.fleetRepoRevision | quote }}
    fleetRepoBasepath: {{ .Values.hub.fleetRepoBasepath | quote }}
    aws_region: {{ .Values.region | quote }}
    aws_account_id: {{ .Values.hub.accountId | quote }}
    aws_cluster_name: {{ $clusterName | quote }}
    ingress_domain_name: {{ .Values.hub.domain | quote }}
    exposure_mode: {{ .Values.hub.exposureMode | default "domain" | quote }}
    resource_prefix: {{ .Values.hub.resourcePrefix | quote }}
    hub_cluster_name: {{ .Values.hub.clusterName | quote }}
  labels:
    argocd.argoproj.io/secret-type: cluster
    {{- $labels := .Values.labels | default dict }}
    # Direct mode only renders for spokes (the hub uses externalSecret mode), so
    # tag every fleet-secret-provisioned spoke with fleet_member=spoke to match
    # kro-provisioned spokes (rg-eks.yaml). Overridable via .Values.labels.fleet_member.
    fleet_member: {{ $labels.fleet_member | default "spoke" | quote }}
    {{- range $key, $val := (omit $labels "fleet_member") }}
    {{ $key }}: {{ $val | quote }}
    {{- end }}
    {{- range $addon, $enabled := .Values.enabledAddons }}
    {{- if $enabled }}
    enable_{{ $addon }}: 'true'
    {{- end }}
    {{- end }}
stringData:
  name: {{ $clusterName }}
  server: arn:aws:eks:{{ .Values.region }}:{{ .Values.hub.accountId }}:cluster/{{ $clusterName }}
  config: '{"awsAuthConfig":{"clusterName":"{{ $clusterName }}"},"tlsClientConfig":{"insecure":false}}'
{{- end }}
