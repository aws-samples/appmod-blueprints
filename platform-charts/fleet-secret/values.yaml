# Mode: "externalSecret" (hub) or "direct" (spokes)
mode: "direct"

# Common fields
clusterName: ""
region: ""
labels: {}

# External Secret mode (hub only)
externalSecret:
  enabled: false
  creationPolicy: Owner
  secretStoreRefKind: ClusterSecretStore
  secretStoreRefName: aws-secrets-manager

# Direct mode fields — populated from hub cluster secret annotations
hub:
  clusterName: ""
  accountId: ""
  addonsRepoURL: ""
  addonsRepoRevision: ""
  addonsRepoBasepath: ""
  fleetRepoURL: ""
  fleetRepoRevision: ""
  fleetRepoBasepath: ""
  domain: ""
  resourcePrefix: ""
  oidcIssuerUrl: ""
  oidcInsecureOrigin: "false"

# Addon enablement map — populated from enabled-addons.yaml via valueFiles
enabledAddons: {}
