apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: openclaw-root
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - git:
        repoURL: https://github.com/aws-samples/appmod-blueprints
        revision: feature/openclaw-platform
        files:
          - path: openclaw-platform/gitops/apps/*.yaml
  template:
    metadata:
      name: '{{ .path.basename }}'
    spec:
      project: default
      source:
        repoURL: https://github.com/aws-samples/appmod-blueprints
        targetRevision: feature/openclaw-platform
        path: '{{ .path.path }}'
      destination:
        server: https://kubernetes.default.svc
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
