apiVersion: v1
kind: Service
metadata:
  name: rust-microservice-<environment>
spec:
  selector:
    app: rust-microservice-<environment>
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: rust-microservice-<environment>-preview
spec:
  selector:
    app: rust-microservice-<environment>
  ports:
    - port: 8080
      targetPort: 8080
