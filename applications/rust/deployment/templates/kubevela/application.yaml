apiVersion: core.oam.dev/v1beta1
kind: Application
metadata:
  annotations:
    app.oam.dev/publishVersion: "<publish_version>"
  name: rust-application
spec:
  components:
    - name: rust-microservice
      type: appmod-service
      dependsOn:
        - rust-service-account-<environment>
      properties:
        image: <image>
        image_name: rust-app
        port: 8080
        targetPort: 8080
        replicas: 2
        appPath: "/rust-app"
        serviceAccount: rust-service-account-<environment>
        env:
          - name: APP_ENV
            value: "DEV"
          - name: TABLE_NAME
            value: rust-app-table-<environment>
          - name: AWS_REGION
            value: "${AWS_REGION}"
        readinessProbe:
          httpGet:
            path: /collection/FRONT_PAGE
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 5
        resources:
          requests:
            cpu: "500m"
            memory: "256Mi"
          limits:
            memory: "512Mi"
      traits:
        - type: path-based-ingress
          properties:
            domain: "*.elb.us-west-2.amazonaws.com"
            rewritePath: true
            http:
              /rust-app: 8080

    - name: rust-service-account-<environment>
      type: dp-service-account
      properties:
        componentNamesForAccess:
          - rust-dynamodb-<environment>
        clusterName: peeks-spoke-dev
        clusterRegion: us-west-2

    - name: rust-dynamodb-<environment>
      type: dynamodb-table
      properties:
        tableName: rust-app-table-<environment>
        partitionKeyName: partition_key
        sortKeyName: sort_key
        region: us-west-2
      traits:
        - type: component-iam-policy
          properties:
            service: dynamodb
