apiVersion: kro.run/v1alpha1
kind: AppmodService
metadata:
  name: progressive-app
  namespace: team-java
spec:
  image: argoproj/rollouts-demo:blue
  image_name: rollout-demo
  replicas: 2
  port: 8080
  targetPort: 8080
  serviceAccount: progressive-service-account
  clusterName: peeks-spoke-dev
  env:
    - name: APP_ENV
      value: "PRODUCTION"
  components:
    dynamodb:
      enabled: false
  ingress:
    enabled: true
    path: /progressive
    rewrite: true
---
apiVersion: v1
kind: Service
metadata:
  name: rollout-demo
  namespace: team-java
spec:
  selector:
    app: rollout-demo
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: rollout-demo-preview
  namespace: team-java
spec:
  selector:
    app: rollout-demo
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
