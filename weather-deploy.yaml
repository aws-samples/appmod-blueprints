---
# Weather MCP Server Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-mcp
  namespace: weather-mcp
  labels:
    app: weather-mcp
    mcp-server: weather
spec:
  replicas: 2
  selector:
    matchLabels:
      app: weather-mcp
  template:
    metadata:
      labels:
        app: weather-mcp
        mcp-server: weather
    spec:
      containers:
      - name: mcp-server
        image: 498530348755.dkr.ecr.us-west-2.amazonaws.com/weather-mcp:v1.0.0
        ports:
        - name: mcp
          containerPort: 8080
          protocol: TCP
        env:
        - name: MCP_SERVER_PORT
          value: "8080"
        - name: LOG_LEVEL
          value: "INFO"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
---
# Weather MCP Server Service
apiVersion: v1
kind: Service
metadata:
  name: weather-mcp
  namespace: weather-mcp
  labels:
    app: weather-mcp
spec:
  selector:
    app: weather-mcp
  ports:
  - port: 80
    targetPort: 8080
    appProtocol: agentgateway.dev/mcp
  type: ClusterIP
---
# AgentgatewayBackend for Weather MCP
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: weather-mcp-backend
  namespace: weather-mcp
  labels:
    app: weather-mcp
spec:
  mcp:
    targets:
      - name: weather-mcp-target
        static:
          host: weather-mcp.weather-mcp.svc.cluster.local
          port: 80
          protocol: StreamableHTTP
---
# HTTPRoute for Weather MCP
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: weather-mcp-route
  namespace: weather-mcp
  labels:
    app: weather-mcp
spec:
  parentRefs:
  - name: agentgateway-proxy
    namespace: agentgateway-system
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /mcp/weather
    backendRefs:
    - group: agentgateway.dev
      kind: AgentgatewayBackend
      name: weather-mcp-backend
