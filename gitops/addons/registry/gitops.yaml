# GitOps tooling addons
# Wave ordering: 3 (rollouts/events) → 4 (kargo/flux) → 7 (argo-workflows, after keycloak)

argo-rollouts:
  namespace: argo-rollouts
  chartName: argo-rollouts
  chartRepository: https://argoproj.github.io/argo-helm
  defaultVersion: '2.40.9'
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '3'
  selector:
    matchExpressions:
      - key: enable_argo_rollouts
        operator: In
        values: ['true']
  valuesObject:
    serviceAccount:
      annotations:
        eks.amazonaws.com/role-arn: 'arn:aws:iam::{{.metadata.annotations.aws_account_id}}:role/{{.metadata.annotations.aws_cluster_name}}-argo-rollouts'

argo-events:
  namespace: argo-events
  chartName: argo-events
  chartRepository: https://argoproj.github.io/argo-helm
  defaultVersion: '2.4.21'
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '3'
  selector:
    matchExpressions:
      - key: enable_argo_events
        operator: In
        values: ['true']
  valuesObject:
    controller:
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 512Mi

argo-workflows:
  namespace: argo
  path: '{{.metadata.annotations.addonsRepoBasepath}}addons/charts/argo-workflows'
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '7'
  selector:
    matchExpressions:
      - key: enable_argo_workflows
        operator: In
        values: ['true']
  valuesObject:
    ingress_domain_name: '{{.metadata.annotations.ingress_domain_name}}'
    gitlab_domain_name: '{{.metadata.annotations.gitlab_domain_name}}'
    exposure_mode: '{{default "domain" .metadata.annotations.exposure_mode}}'
    aws_cluster_name: '{{.metadata.annotations.aws_cluster_name}}'
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jsonPointers:
        - /status
        - /metadata/resourceVersion
        - /metadata/generation
        - /metadata/managedFields
    - group: ''
      kind: Secret
      name: keycloak-oidc
      jsonPointers:
        - /metadata/resourceVersion
        - /metadata/managedFields

kargo:
  namespace: kargo
  chartName: kargo
  chartRepository: ghcr.io/akuity/kargo-charts
  defaultVersion: '1.7.5'
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '4'
  selector:
    matchExpressions:
      - key: enable_kargo
        operator: In
        values: ['true']
  valuesObject:
    api:
      host: '{{.metadata.annotations.ingress_domain_name}}'
      # NOTE: api.ingress (ALB exposure) is intentionally NOT set here so the base
      # stays generic and reusable. The control-plane hub enables it via the
      # per-addon overlay gitops/overlays/environments/control-plane/kargo/values.yaml
      # (cloudfront mode). Other consumers/modes can override differently.
      argocd:
        urls:
          - https://{{.metadata.annotations.ingress_domain_name}}/argocd
      oidc:
        # Kargo SSO via Keycloak (public client 'kargo' is seeded in the platform
        # realm by the keycloak-config job; PKCE flow, no client secret required).
        # NOTE: all four of enabled/issuerURL/clientID are required — the chart only
        # renders the OIDC_* config (and the UI "Log in with SSO" button) when they
        # are set. With issuerURL alone the chart silently falls back to admin-only
        # login (ADMIN_ACCOUNT_ENABLED) and no SSO is offered.
        enabled: true
        issuerURL: https://{{.metadata.annotations.ingress_domain_name}}/keycloak/realms/platform
        clientID: kargo
        cliClientID: kargo
        # Request the 'groups' scope so the groups claim is returned (admin mapping below).
        additionalScopes:
          - groups
        # user1 is in the Keycloak '/admin' group; the realm's 'groups' client scope
        # emits a 'groups' claim, so grant Kargo admin to members of '/admin'.
        admins:
          claims:
            groups:
              - /admin
      secret:
        name: kargo-admin-credentials
    extraObjects:
      - apiVersion: external-secrets.io/v1
        kind: ExternalSecret # For Kargo Admin Credentials
        metadata:
          name: kargo-admin-credentials
          namespace: kargo
          annotations:
            argocd.argoproj.io/sync-wave: '-1'
        spec:
          refreshInterval: '30s'
          secretStoreRef:
            name: aws-secrets-manager
            kind: ClusterSecretStore
          target:
            name: kargo-admin-credentials
            creationPolicy: Owner
            deletionPolicy: Retain
            template:
              engineVersion: v2
              mergePolicy: Replace
              data:
                ADMIN_ACCOUNT_PASSWORD_HASH: '{{ printf "{{ `{{ .KARGO_ADMIN_PASSWORD_HASH }}` }}" }}'
                ADMIN_ACCOUNT_TOKEN_SIGNING_KEY: '{{ printf "{{ `{{ .KARGO_ADMIN_PASSWORD_KEY }}` }}" }}'
          data:
            - secretKey: KARGO_ADMIN_PASSWORD_HASH
              remoteRef:
                key: '{{.metadata.annotations.aws_cluster_name}}/secrets'
                property: user_password_hash
                conversionStrategy: Default
                decodingStrategy: None
                metadataPolicy: None
            - secretKey: KARGO_ADMIN_PASSWORD_KEY
              remoteRef:
                key: '{{.metadata.annotations.aws_cluster_name}}/secrets'
                property: user_password_key
                conversionStrategy: Default
                decodingStrategy: None
                metadataPolicy: None
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jsonPointers:
        - /status
        - /metadata/generation
        - /metadata/managedFields
