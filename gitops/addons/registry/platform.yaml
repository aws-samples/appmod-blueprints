# Platform infrastructure and tooling addons
# Wave ordering: -5 (multi-acct) → -3 (kro) → -2 (kro-manifests) → -1 (bootstrap) → 3-7 (tools)

crossplane:
  namespace: crossplane-system
  chartName: crossplane
  releaseName: crossplane
  chartRepository: https://charts.crossplane.io/stable
  defaultVersion: '1.20.5'
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '2'
  selector:
    matchExpressions:
      - key: enable_crossplane
        operator: In
        values: ['true']
  valuesObject:
    global:
      resourcePrefix: '{{.metadata.annotations.resource_prefix}}'
    aws:
      region: '{{.metadata.annotations.aws_region}}'
      accountId: '{{.metadata.annotations.aws_account_id}}'
    args: []
  additionalResources:
    - type: manifests
      manifestPath: manifests
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /status
        - /metadata/generation
        - /metadata/managedFields

crossplane-pod-identity:
  namespace: crossplane-system
  path: '{{.metadata.annotations.addonsRepoBasepath}}addons/charts/crossplane-pod-identity'
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '3'
  selector:
    matchExpressions:
      - key: enable_crossplane
        operator: In
        values: ['true']
  valuesObject:
    aws:
      region: '{{.metadata.annotations.aws_region}}'
      clusterName: '{{.metadata.annotations.aws_cluster_name}}'
      accountId: '{{.metadata.annotations.aws_account_id}}'
  ignoreDifferences:
    - group: iam.aws.upbound.io
      kind: Role
      jsonPointers:
        - /status
    - group: iam.aws.upbound.io
      kind: Policy
      jsonPointers:
        - /status
    - group: iam.aws.upbound.io
      kind: RolePolicyAttachment
      jsonPointers:
        - /status
    - group: eks.aws.upbound.io
      kind: PodIdentityAssociation
      jsonPointers:
        - /status

backstage:
  namespace: backstage
  path: '{{.metadata.annotations.addonsRepoBasepath}}addons/charts/backstage'
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '4'
  selector:
    matchExpressions:
      - key: enable_backstage
        operator: In
        values: ['true']
  valuesObject:
    ingress_domain_name: '{{.metadata.annotations.ingress_domain_name}}'
    global:
      aws_cluster_name: '{{.metadata.annotations.aws_cluster_name}}'
      resourcePrefix: '{{.metadata.annotations.resource_prefix}}'
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jsonPointers:
        - /status
        - /metadata/resourceVersion
        - /metadata/generation
        - /metadata/managedFields
    - group: ''
      kind: Secret
      jsonPointers:
        - /metadata/resourceVersion
        - /metadata/managedFields
    - group: apps
      kind: Deployment
      jsonPointers:
        - /metadata/managedFields
        - /status
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
      jsonPointers:
        - /rules
        - /metadata/labels
        - /metadata/annotations
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
      jsonPointers:
        - /subjects
        - /roleRef
        - /metadata/labels
        - /metadata/annotations

kro:
  namespace: kro-system
  chartName: kro
  chartNamespace: kro/charts
  chartRepository: registry.k8s.io
  defaultVersion: '0.6.1'
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '-3'
  selector:
    matchExpressions:
      - key: enable_kro
        operator: In
        values: ['true']

kro-manifests:
  namespace: kro
  type: manifest
  path: '{{.metadata.annotations.addonsRepoBasepath}}addons/charts/kro/resource-groups/manifests'
  directory:
    recurse: true
    exclude: '{cicd-pipeline/**,huggingface/**,ray-service/**}'
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '-2'
  selector:
    matchExpressions:
      - key: enable_kro_manifests
        operator: In
        values: ['true']

kro-manifests-hub:
  namespace: kro
  type: manifest
  path: '{{.metadata.annotations.addonsRepoBasepath}}addons/charts/kro/resource-groups/manifests'
  directory:
    recurse: true
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '-2'
  selector:
    matchExpressions:
      - key: enable_kro_manifests_hub
        operator: In
        values: ['true']

multi-acct:
  namespace: kro
  path: '{{.metadata.annotations.addonsRepoBasepath}}addons/charts/multi-acct'
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '-5'
  selector:
    matchExpressions:
      - key: enable_multi_acct
        operator: In
        values: ['true']
  valuesObject:
    global:
      resourcePrefix: '{{.metadata.annotations.resource_prefix}}'

kubevela:
  namespace: vela-system
  path: '{{.metadata.annotations.addonsRepoBasepath}}addons/charts/kubevela'
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '3'
  selector:
    matchExpressions:
      - key: enable_kubevela
        operator: In
        values: ['true']
  valuesObject:
    systemDefinitionNamespace: vela-system
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      jsonPointers:
        - /webhooks/0/clientConfig/caBundle
        - /webhooks/1/clientConfig/caBundle
        - /webhooks/2/clientConfig/caBundle
        - /webhooks/3/clientConfig/caBundle
        - /webhooks/4/clientConfig/caBundle
        - /metadata/generation
        - /metadata/managedFields
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      jsonPointers:
        - /webhooks/0/clientConfig/caBundle
        - /webhooks/1/clientConfig/caBundle
        - /webhooks/2/clientConfig/caBundle
        - /webhooks/3/clientConfig/caBundle
        - /webhooks/4/clientConfig/caBundle
        - /metadata/generation
        - /metadata/managedFields
    - group: '*'
      kind: '*'
      managedFieldsManagers:
        - vela-core
        - cert-manager
        - webhook-cert-manager
        - kube-controller-manager
        - apiserver

devlake:
  namespace: devlake
  path: '{{.metadata.annotations.addonsRepoBasepath}}addons/charts/devlake'
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '7'
  selector:
    matchExpressions:
      - key: enable_devlake
        operator: In
        values: ['true']
  valuesObject:
    clusterName: '{{.metadata.annotations.aws_cluster_name}}'
    clusterRegion: '{{.metadata.annotations.aws_region}}'
    namespace: devlake
  ignoreDifferences:
    - group: argoproj.io
      kind: Workflow
      jsonPointers:
        - /spec
        - /status
        - /metadata/generation
    - group: iam.aws.upbound.io
      kind: Role
      jsonPointers:
        - /status
    - group: iam.aws.upbound.io
      kind: RolePolicyAttachment
      jsonPointers:
        - /status
    - group: eks.aws.upbound.io
      kind: PodIdentityAssociation
      jsonPointers:
        - /status

gitlab:
  namespace: gitlab
  path: '{{.metadata.annotations.addonsRepoBasepath}}addons/charts/gitlab'
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '2'
  selector:
    matchExpressions:
      - key: enable_gitlab
        operator: In
        values: ['true']
  valuesObject:
    domain_name: '{{.metadata.annotations.ingress_domain_name}}'
    keycloak_domain_name: '{{.metadata.annotations.ingress_domain_name}}'
    security_groups: '{{.metadata.annotations.ingress_security_groups}}'
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jsonPointers:
        - /status
        - /metadata/generation
        - /metadata/managedFields
    - group: ''
      kind: Secret
      jsonPointers:
        - /metadata/managedFields

crossplane-aws:
  namespace: crossplane-system
  path: '{{.metadata.annotations.addonsRepoBasepath}}addons/charts/crossplane-aws'
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '4'
  selector:
    matchExpressions:
      - key: enable_crossplane_aws
        operator: In
        values: ['true']
  valuesObject:
    aws:
      region: '{{.metadata.annotations.aws_region}}'
    global:
      clusterName: '{{.metadata.annotations.aws_cluster_name}}'
  ignoreDifferences:
    - group: apiextensions.crossplane.io
      kind: CompositeResourceDefinition
      jsonPointers:
        - /status
        - /metadata/generation
        - /metadata/managedFields
    - group: apiextensions.crossplane.io
      kind: Composition
      jsonPointers:
        - /status
        - /metadata/generation
        - /metadata/managedFields
    - group: pkg.crossplane.io
      kind: Provider
      jsonPointers:
        - /status
        - /metadata/generation
        - /metadata/managedFields

