# Observability and monitoring addons
# Wave ordering: 3 (metrics/otel) → 4 (grafana/observability-aws) → 5 (dashboards/cw)

observability-aws:
  namespace: crossplane-system
  path: "{{.metadata.annotations.addonsRepoBasepath}}addons/charts/observability-aws"
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: "4"
  selector:
    matchExpressions:
      - key: enable_observability_aws
        operator: In
        values: ["true"]
  valuesObject:
    aws:
      region: "{{.metadata.annotations.aws_region}}"
      accountId: "{{.metadata.annotations.aws_account_id}}"
      vpcId: "{{.metadata.annotations.aws_vpc_id}}"
      clusterName: "{{.metadata.annotations.aws_cluster_name}}"
    ingress:
      domainName: "{{.metadata.annotations.ingress_domain_name}}"
    resourcePrefix: "{{.metadata.annotations.resource_prefix}}"
    amg:
      subnetIds: ""
    scraper:
      clusterArn: '{{index .metadata.annotations "aws_cluster_arn"}}'
      clusterSubnetIds: '{{index .metadata.annotations "aws_private_subnet_ids"}}'
      clusterSecurityGroupIds: '{{index .metadata.annotations "aws_cluster_security_group_id"}}'
    spokeScrapers:
      spoke-dev:
        clusterArn: '{{default "" (index .metadata.annotations "spoke_dev_cluster_arn")}}'
        subnetIds: '{{default "" (index .metadata.annotations "spoke_dev_private_subnet_ids")}}'
        securityGroupIds: '{{default "" (index .metadata.annotations "spoke_dev_security_group_id")}}'
      spoke-prod:
        clusterArn: '{{default "" (index .metadata.annotations "spoke_prod_cluster_arn")}}'
        subnetIds: '{{default "" (index .metadata.annotations "spoke_prod_private_subnet_ids")}}'
        securityGroupIds: '{{default "" (index .metadata.annotations "spoke_prod_security_group_id")}}'
  ignoreDifferences:
    - group: amp.aws.upbound.io
      kind: Workspace
      jsonPointers:
        - /status
        - /metadata/generation
        - /metadata/managedFields
        - /spec/forProvider/tags
        - /spec/deletionPolicy
        - /spec/initProvider
        - /spec/managementPolicies
      jqPathExpressions:
        - .metadata.annotations["crossplane.io/external-name"]
    - group: amp.aws.upbound.io
      kind: Scraper
      jsonPointers:
        - /status
        - /metadata/generation
        - /metadata/managedFields
        - /spec/forProvider/tags
        - /spec/forProvider/destination
        - /spec/forProvider/source
        - /spec/deletionPolicy
        - /spec/initProvider
        - /spec/managementPolicies
    - group: grafana.aws.upbound.io
      kind: Workspace
      jsonPointers:
        - /status
        - /metadata/generation
        - /metadata/managedFields
        - /spec/forProvider/tags
        - /spec/deletionPolicy
        - /spec/initProvider
        - /spec/managementPolicies
    - group: grafana.aws.upbound.io
      kind: WorkspaceSamlConfiguration
      jsonPointers:
        - /status
        - /metadata/generation
        - /metadata/managedFields
        - /spec/forProvider/tags
        - /spec/deletionPolicy
        - /spec/initProvider
        - /spec/managementPolicies
    - group: amp.aws.upbound.io
      kind: RuleGroupNamespace
      jsonPointers:
        - /spec/deletionPolicy
        - /spec/initProvider
        - /spec/managementPolicies
    - group: ec2.aws.upbound.io
      kind: SecurityGroup
      jsonPointers:
        - /spec/forProvider/tags
        - /spec/deletionPolicy
        - /spec/initProvider
        - /spec/managementPolicies
    - group: ec2.aws.upbound.io
      kind: SecurityGroupRule
      jsonPointers:
        - /spec/deletionPolicy
        - /spec/initProvider
        - /spec/managementPolicies
    - group: iam.aws.upbound.io
      kind: Role
      jsonPointers:
        - /spec/forProvider/tags
        - /spec/deletionPolicy
        - /spec/initProvider
        - /spec/managementPolicies
    - group: iam.aws.upbound.io
      kind: RolePolicyAttachment
      jsonPointers:
        - /spec/deletionPolicy
        - /spec/initProvider
        - /spec/managementPolicies

grafana:
  namespace: grafana
  path: "{{.metadata.annotations.addonsRepoBasepath}}addons/charts/grafana"
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: "4"
  selector:
    matchExpressions:
      - key: enable_grafana
        operator: In
        values: ["true"]
  valuesObject:
    global:
      clusterName: "{{.metadata.annotations.aws_cluster_name}}"
    ingress_domain_name: "{{.metadata.annotations.ingress_domain_name}}"
    aws:
      region: "{{.metadata.annotations.aws_region}}"
      clusterName: "{{.metadata.annotations.aws_cluster_name}}"
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jsonPointers:
        - /status
        - /metadata/generation
        - /metadata/managedFields
    - group: ""
      kind: Secret
      jsonPointers:
        - /metadata/managedFields
    - group: networking.k8s.io
      kind: Ingress
      jsonPointers:
        - /status
        - /metadata/generation
        - /metadata/managedFields
    - group: apps
      kind: Deployment
      jsonPointers:
        - /status
        - /metadata/generation
        - /metadata/managedFields

grafana-operator:
  namespace: grafana-operator
  chartName: grafana-operator
  releaseName: grafana-operator
  chartRepository: "ghcr.io/grafana/helm-charts"
  defaultVersion: "v5.19.0"
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: "4"
  selector:
    matchExpressions:
      - key: enable_grafana_operator
        operator: In
        values: ["true"]
  valuesObject:
    livenessProbe:
      timeoutSeconds: 5
    readinessProbe:
      timeoutSeconds: 5

grafana-dashboards:
  namespace: grafana-operator
  path: "{{.metadata.annotations.addonsRepoBasepath}}addons/charts/grafana-dashboards"
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: "5"
  selector:
    matchExpressions:
      - key: enable_grafana_dashboards
        operator: In
        values: ["true"]
  valuesObject:
    clusterName: "{{.metadata.annotations.aws_cluster_name}}"
    resourcePrefix: "{{.metadata.annotations.resource_prefix}}"
    namespace: grafana-operator
    grafana_url: '{{index .metadata.annotations "aws_grafana_url" | default (printf "%s/grafana" .metadata.annotations.ingress_domain_name)}}'
    # Devlake is what publishes the {prefix}-devlake/mysql-connection
    # Secrets Manager secret. The grafana-mysql-creds ExternalSecret only
    # reads it when devlake is enabled — otherwise that ExternalSecret
    # would block grafana-dashboards-hub on a non-existent source secret.
    devlake:
      enabled: '{{index .metadata.labels "enable_devlake" | default "false"}}'

kube-state-metrics:
  namespace: kube-prometheus-stack
  chartName: kube-state-metrics
  releaseName: kube-state-metrics
  chartRepository: https://prometheus-community.github.io/helm-charts
  defaultVersion: "5.25.1"
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: "3"
  selector:
    matchExpressions:
      - key: enable_kube_state_metrics
        operator: In
        values: ["true"]

prometheus-node-exporter:
  namespace: kube-prometheus-stack
  chartName: prometheus-node-exporter
  releaseName: prometheus-node-exporter
  chartRepository: https://prometheus-community.github.io/helm-charts
  defaultVersion: "4.39.0"
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: "3"
  selector:
    matchExpressions:
      - key: enable_prometheus_node_exporter
        operator: In
        values: ["true"]

opentelemetry-operator:
  namespace: opentelemetry-operator-system
  chartName: opentelemetry-operator
  releaseName: opentelemetry-operator
  chartRepository: https://open-telemetry.github.io/opentelemetry-helm-charts
  defaultVersion: "0.71.1"
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: "3"
  selector:
    matchExpressions:
      - key: enable_opentelemetry_operator
        operator: In
        values: ["true"]

cw-prometheus:
  namespace: amazon-cloudwatch
  path: "{{.metadata.annotations.addonsRepoBasepath}}addons/charts/cw-prometheus"
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: "5"
  selector:
    matchExpressions:
      - key: enable_cw_prometheus
        operator: In
        values: ["true"]

aws-for-fluentbit:
  namespace: kube-system
  chartName: aws-for-fluent-bit
  chartRepository: https://aws.github.io/eks-charts
  defaultVersion: "0.2.0"
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: "3"
  selector:
    matchExpressions:
      - key: enable_aws_for_fluentbit
        operator: In
        values: ["true"]
  valuesObject:
    image:
      tag: '3.4.2'

cni-metrics-helper:
  namespace: kube-system
  chartName: cni-metrics-helper
  chartRepository: https://aws.github.io/eks-charts
  defaultVersion: "1.19.2"
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: "5"
  selector:
    matchExpressions:
      - key: enable_cni_metrics_helper
        operator: In
        values: ["true"]
  valuesObject:
    env:
      AWS_CLUSTER_ID: "{{.metadata.annotations.aws_cluster_name}}"
      AWS_REGION: "{{.metadata.annotations.aws_region}}"
