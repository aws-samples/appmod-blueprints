# Machine learning and AI addons
# Wave ordering: 5 (all ML/AI tools)

jupyterhub:
  namespace: jupyterhub
  path: '{{.metadata.annotations.addonsRepoBasepath}}addons/charts/jupyterhub'
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '5'
  selector:
    matchExpressions:
      - key: enable_jupyterhub
        operator: In
        values: ['true']
  valuesObject:
    global:
      ingress_domain_name: '{{.metadata.annotations.ingress_domain_name}}'
      exposure_mode: '{{default "domain" .metadata.annotations.exposure_mode}}'
      clusterName: '{{.metadata.annotations.aws_cluster_name}}'
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jsonPointers:
        - /status
        - /metadata/generation
        - /metadata/managedFields
    - group: ''
      kind: Secret
      jsonPointers:
        - /metadata/managedFields
    - group: ''
      kind: Secret
      name: hub
      # z2jh generates these values via Helm 'lookup'; ArgoCD's repo-server
      # cannot lookup, so the rendered values differ from live on every sync.
      jsonPointers:
        - /data
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/template/metadata/annotations/checksum~1secret
        - /spec/template/metadata/annotations/checksum~1config-map
        - /spec/template/metadata/annotations/checksum~1auth-token
        - /spec/template/metadata/annotations/checksum~1proxy-secret

