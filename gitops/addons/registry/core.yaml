# Core infrastructure addons
# Wave ordering: -1 (external-secrets, default-storage-class) → 0 (argocd, metrics-server) → 2 (cert-manager) → 4 (efs-csi, pod-identities) → 5 (lbc, ingress-class-alb, external-dns)
# NOTE: pod-identities runs at wave 4 (after crossplane-base at wave 3, defined
# in platform.yaml) because it creates iam.aws.upbound.io / eks.aws.upbound.io
# resources whose CRDs are registered by the Crossplane providers. A PreSync
# CRD-readiness gate in the crossplane-pod-identity chart additionally blocks
# its Sync phase until those CRDs are Established (cross-Application sync-waves
# are best-effort, so the gate guarantees correctness).

default-storage-class:
  namespace: kube-system
  path: '{{.metadata.annotations.addonsRepoBasepath}}addons/charts/default-storage-class'
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '-1'
  goTemplateOptions:
    - "missingkey=zero"
  selector:
    matchExpressions:
      - key: enable_default_storage_class
        operator: In
        values: ['true']

pod_identities:
  namespace: crossplane-system
  path: '{{.metadata.annotations.addonsRepoBasepath}}addons/charts/crossplane-pod-identity'
  destinationHub: true
  goTemplateOptions:
    - "missingkey=zero"
  annotationsAppSet:
    # Wave 4: after crossplane-base (wave 3) registers the iam/eks CRDs, and
    # before the controllers that consume these identities (lbc/external-dns/
    # keycloak at wave 5). A PreSync CRD-wait hook in the chart further gates
    # the actual apply on CRD availability.
    argocd.argoproj.io/sync-wave: '4'
  selector:
    matchExpressions:
      - key: environment
        operator: Exists
  valuesObject:
    aws:
      region: '{{.metadata.annotations.aws_region}}'
      clusterName: '{{.metadata.annotations.aws_cluster_name}}'
      accountId: '{{.metadata.annotations.aws_account_id}}'
    identities:
      # Pod identity enablement derived from cluster labels.
      # eso identity is intentionally omitted here: the hub (control-plane)
      # reuses the Crossplane provider role for ESO; spoke clusters enable
      # it via env overlay.
      lbc:
        enabled: '{{default "false" (index .metadata.labels "enable_aws_load_balancer_controller")}}'
      external-dns:
        enabled: '{{default "false" (index .metadata.labels "enable_external_dns")}}'
      keycloak:
        enabled: '{{default "false" (index .metadata.labels "enable_keycloak")}}'
  ignoreDifferences:
    - group: iam.aws.upbound.io
      kind: Role
      jsonPointers:
        - /status
    - group: iam.aws.upbound.io
      kind: Policy
      jsonPointers:
        - /status
    - group: iam.aws.upbound.io
      kind: RolePolicyAttachment
      jsonPointers:
        - /status
    - group: eks.aws.upbound.io
      kind: PodIdentityAssociation
      jsonPointers:
        - /status
  syncPolicy:
    automated:
      selfHeal: true
      allowEmpty: true
      prune: false
    retry:
      limit: -1
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 10m
    syncOptions:
      - CreateNamespace=true

argocd:
  namespace: argocd
  chartName: argo-cd
  releaseName: argocd
  chartRepository: https://argoproj.github.io/argo-helm
  defaultVersion: '9.5.12'
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '0'
  selector:
    matchExpressions:
      - key: enable_argocd
        operator: In
        values: ['true']
  valuesObject:
    global:
      domain: '{{.metadata.annotations.ingress_domain_name}}'
      clusterName: '{{.metadata.annotations.aws_cluster_name}}'
    configs:
      cm:
        url: https://{{.metadata.annotations.ingress_domain_name}}/argocd
        oidc.config: |
          name: Keycloak
          issuer: https://{{.metadata.annotations.ingress_domain_name}}/keycloak/realms/platform
          clientID: argocd
          enablePKCEAuthentication: true
          requestedScopes: ["openid", "profile", "email", "groups"]

metrics-server:
  namespace: kube-system
  chartName: metrics-server
  chartRepository: https://kubernetes-sigs.github.io/metrics-server
  defaultVersion: '3.13.0'
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '0'
  selector:
    matchExpressions:
      - key: enable_metrics_server
        operator: In
        values: ['true']

cert-manager:
  namespace: cert-manager
  chartName: cert-manager
  releaseName: cert-manager
  chartRepository: https://charts.jetstack.io
  defaultVersion: 'v1.20.2'
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '2'
  selector:
    matchExpressions:
      - key: enable_cert_manager
        operator: In
        values: ['true']

external-secrets:
  namespace: external-secrets
  chartName: external-secrets
  chartRepository: https://charts.external-secrets.io
  defaultVersion: '2.4.1'
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '-1'
  syncPolicy:
    automated:
      selfHeal: false
      allowEmpty: true
      prune: false
    retry:
      limit: -1
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 10m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  selector:
    matchExpressions:
      - key: enable_external_secrets
        operator: In
        values: ['true']
  valuesObject:
    serviceAccount:
      name: external-secrets-sa
    aws:
      region: '{{.metadata.annotations.aws_region}}'
  additionalResources:
    - path: '{{.metadata.annotations.addonsRepoBasepath}}addons/charts/cluster-secret-store'
      helm:
        releaseName: cluster-secret-store
        valuesObject:
          aws:
            region: '{{.metadata.annotations.aws_region}}'
    - path: '{{.metadata.annotations.addonsRepoBasepath}}addons/charts/pod-identity-restart-hook'
      helm:
        releaseName: eso-credential-check
        valuesObject:
          targets:
            - name: eso
              namespace: external-secrets
              serviceAccount: external-secrets-sa
              deploymentLabel: app.kubernetes.io/name=external-secrets

ingress-class-alb:
  namespace: kube-system
  path: '{{.metadata.annotations.addonsRepoBasepath}}addons/charts/ingress-class-alb'
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '5'
  goTemplateOptions:
    - "missingkey=zero"
  selector:
    matchExpressions:
      - key: enable_ingress_class_alb
        operator: In
        values: ['true']
  valuesObject:
    controllerMode: '{{default "auto" .metadata.annotations.alb_controller_mode}}'
    loadBalancerName: '{{if eq (default "domain" .metadata.annotations.exposure_mode) "cloudfront"}}{{.metadata.annotations.aws_cluster_name}}-platform{{end}}'

aws-load-balancer-controller:
  namespace: kube-system
  chartName: aws-load-balancer-controller
  chartRepository: https://aws.github.io/eks-charts
  defaultVersion: '1.14.1'
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '5'
  selector:
    matchExpressions:
      - key: enable_aws_load_balancer_controller
        operator: In
        values: ['true']
  goTemplateOptions:
    - "missingkey=zero"
  valuesObject:
    clusterName: '{{.metadata.annotations.aws_cluster_name}}'
    vpcId: '{{.metadata.annotations.aws_vpc_id}}'
    region: '{{.metadata.annotations.aws_region}}'
    # Let cert-manager issue and rotate the webhook serving cert + inject the
    # caBundle, instead of the chart's self-signed cert-gen Job. The cert-gen
    # Job regenerates the cert out-of-band, which drifts the webhook caBundle
    # away from the serving cert and breaks Ingress admission with
    # "x509: certificate signed by unknown authority". cert-manager keeps the
    # serving cert and the injected caBundle from the same issuer, so they
    # always rotate together. cert-manager syncs at wave 2 (before LBC at 5).
    enableCertManager: true
    serviceAccount:
      create: true
      name: aws-load-balancer-controller-sa
  # cert-manager now owns the webhook TLS material, so the chart's self-signed
  # cert-gen Job no longer runs and the previous caBundle drift is gone. The
  # ignoreDifferences below are retained as a harmless safety net in case the
  # cert is rotated by cert-manager between Argo refreshes.
  ignoreDifferences:
    - group: ''
      kind: Secret
      name: aws-load-balancer-tls
      namespace: kube-system
      jsonPointers:
        - /data
        # enableCertManager: cert-manager populates this secret and stamps
        # cert-manager.io/* annotations (+ labels) on it, and creates it as a
        # kubernetes.io/tls secret, which otherwise shows as permanent OutOfSync.
        # Ignore that managed metadata/type drift.
        - /type
        - /metadata/annotations
        - /metadata/labels
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      name: aws-load-balancer-webhook
      jqPathExpressions:
        - .webhooks[].clientConfig.caBundle
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: aws-load-balancer-webhook
      jqPathExpressions:
        - .webhooks[].clientConfig.caBundle
  additionalResources:
    - path: '{{.metadata.annotations.addonsRepoBasepath}}addons/charts/pod-identity-restart-hook'
      helm:
        releaseName: lbc-credential-check
        valuesObject:
          targets:
            - name: lbc
              namespace: kube-system
              serviceAccount: aws-load-balancer-controller-sa
              deploymentLabel: app.kubernetes.io/name=aws-load-balancer-controller

image-prepuller:
  namespace: kube-system
  path: '{{.metadata.annotations.addonsRepoBasepath}}addons/charts/image-prepuller'
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '1'
  selector:
    matchExpressions:
      - key: enable_image_prepuller
        operator: In
        values: ['true']
  valuesObject:
    global:
      clusterName: '{{.metadata.annotations.aws_cluster_name}}'

aws-efs-csi-driver:
  namespace: kube-system
  chartName: aws-efs-csi-driver
  chartRepository: https://kubernetes-sigs.github.io/aws-efs-csi-driver
  defaultVersion: '4.1.0'
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '4'
  selector:
    matchExpressions:
      - key: enable_aws_efs_csi_driver
        operator: In
        values: ['true']
  valuesObject:
    controller:
      serviceAccount:
        name: efs-csi-controller-sa
        annotations:
          eks.amazonaws.com/role-arn: '{{default "" (index .metadata.annotations "aws_efs_csi_driver_iam_role_arn")}}'
    node:
      serviceAccount:
        name: efs-csi-node-sa
        annotations:
          eks.amazonaws.com/role-arn: '{{default "" (index .metadata.annotations "aws_efs_csi_driver_iam_role_arn")}}'

external-dns:
  namespace: kube-system
  chartName: external-dns
  chartRepository: https://kubernetes-sigs.github.io/external-dns
  defaultVersion: '1.21.1'
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '5'
  selector:
    matchExpressions:
      - key: enable_external_dns
        operator: In
        values: ['true']
  valuesObject:
    domainFilters:
      - '{{.metadata.annotations.ingress_domain_name}}'
    txtOwnerId: '{{.metadata.annotations.aws_cluster_name}}'
    extraArgs:
      - --aws-zone-match-parent
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 512Mi
    livenessProbe:
      httpGet:
        path: /healthz
        port: http
      initialDelaySeconds: 30
      periodSeconds: 15
      failureThreshold: 5
      timeoutSeconds: 10
    readinessProbe:
      httpGet:
        path: /healthz
        port: http
      initialDelaySeconds: 30
      periodSeconds: 15
      failureThreshold: 5
      timeoutSeconds: 10
    serviceAccount:
      name: external-dns-sa
  additionalResources:
    - path: '{{.metadata.annotations.addonsRepoBasepath}}addons/charts/pod-identity-restart-hook'
      helm:
        releaseName: external-dns-credential-check
        valuesObject:
          targets:
            - name: external-dns
              namespace: kube-system
              serviceAccount: external-dns-sa
              deploymentLabel: app.kubernetes.io/name=external-dns
