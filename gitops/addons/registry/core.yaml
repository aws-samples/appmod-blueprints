# Core infrastructure addons
# Wave ordering: -1 (external-secrets, pod-identities) → 0 (argocd, metrics-server) → 2 (cert-manager) → 4 (efs-csi) → 5 (lbc, ingress-class-alb, external-dns)

pod_identities:
  namespace: crossplane-system
  path: '{{.metadata.annotations.addonsRepoBasepath}}addons/charts/crossplane-pod-identity'
  destinationHub: true
  goTemplateOptions:
    - "missingkey=zero"
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '-1'
  selector:
    matchExpressions:
      - key: environment
        operator: Exists
  valuesObject:
    aws:
      region: '{{.metadata.annotations.aws_region}}'
      clusterName: '{{.metadata.annotations.aws_cluster_name}}'
      accountId: '{{.metadata.annotations.aws_account_id}}'
    identities:
      # Pod identity enablement uses cluster labels by default.
      # The control-plane cluster runs the ESO addon but does NOT need its own pod identity
      # because Crossplane (running on the hub) manages pod identities for spoke clusters.
      # The hub's ESO uses the Crossplane provider's credentials instead.
      eso:
        enabled: '{{`{{ if eq (default "" .metadata.labels.environment) "control-plane" }}false{{ else }}{{ default "" (index .metadata.labels "enable_external_secrets") }}{{ end }}`}}'
      lbc:
        enabled: '{{`{{ default "" (index .metadata.labels "enable_aws_load_balancer_controller") }}`}}'
      external-dns:
        enabled: '{{`{{ default "" (index .metadata.labels "enable_external_dns") }}`}}'
      litellm:
        enabled: '{{`{{ default "" (index .metadata.labels "enable_agent_platform") }}`}}'
  ignoreDifferences:
    - group: iam.aws.upbound.io
      kind: Role
      jsonPointers:
        - /status
    - group: iam.aws.upbound.io
      kind: Policy
      jsonPointers:
        - /status
    - group: iam.aws.upbound.io
      kind: RolePolicyAttachment
      jsonPointers:
        - /status
    - group: eks.aws.upbound.io
      kind: PodIdentityAssociation
      jsonPointers:
        - /status

argocd:
  namespace: argocd
  chartName: argo-cd
  releaseName: argocd
  chartRepository: https://argoproj.github.io/argo-helm
  defaultVersion: '7.9.1'
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '0'
  selector:
    matchExpressions:
      - key: enable_argocd
        operator: In
        values: ['true']
  valuesObject:
    global:
      domain: '{{.metadata.annotations.ingress_domain_name}}'
      clusterName: '{{.metadata.annotations.aws_cluster_name}}'
    configs:
      cm:
        url: https://{{.metadata.annotations.ingress_domain_name}}/argocd
        oidc.config: |
          name: Keycloak
          issuer: https://{{.metadata.annotations.ingress_domain_name}}/keycloak/realms/platform
          clientID: argocd
          enablePKCEAuthentication: true
          requestedScopes: ["openid", "profile", "email", "groups"]

metrics-server:
  namespace: kube-system
  chartName: metrics-server
  chartRepository: https://kubernetes-sigs.github.io/metrics-server
  defaultVersion: '3.12.1'
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '0'
  selector:
    matchExpressions:
      - key: enable_metrics_server
        operator: In
        values: ['true']

cert-manager:
  namespace: cert-manager
  chartName: cert-manager
  releaseName: cert-manager
  chartRepository: https://charts.jetstack.io
  defaultVersion: 'v1.15.2'
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '2'
  selector:
    matchExpressions:
      - key: enable_cert_manager
        operator: In
        values: ['true']

external-secrets:
  namespace: external-secrets
  chartName: external-secrets
  chartRepository: https://charts.external-secrets.io
  defaultVersion: '0.19.2'
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '-1'
  selector:
    matchExpressions:
      - key: enable_external_secrets
        operator: In
        values: ['true']
  valuesObject:
    serviceAccount:
      name: external-secrets-sa
    aws:
      region: '{{.metadata.annotations.aws_region}}'
  additionalResources:
    - path: '{{.metadata.annotations.addonsRepoBasepath}}addons/charts/cluster-secret-store'
      helm:
        releaseName: cluster-secret-store
        valuesObject:
          aws:
            region: '{{.metadata.annotations.aws_region}}'
    - path: '{{.metadata.annotations.addonsRepoBasepath}}addons/charts/pod-identity-restart-hook'
      helm:
        releaseName: eso-credential-check
        valuesObject:
          targets:
            - name: eso
              namespace: external-secrets
              serviceAccount: external-secrets-sa
              deploymentLabel: app.kubernetes.io/name=external-secrets

ingress-class-alb:
  namespace: kube-system
  path: '{{.metadata.annotations.addonsRepoBasepath}}addons/charts/ingress-class-alb'
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '5'
  goTemplateOptions:
    - "missingkey=zero"
  selector:
    matchExpressions:
      - key: enable_ingress_class_alb
        operator: In
        values: ['true']
  valuesObject:
    controllerMode: '{{default "auto" .metadata.annotations.alb_controller_mode}}'

aws-load-balancer-controller:
  namespace: kube-system
  chartName: aws-load-balancer-controller
  chartRepository: https://aws.github.io/eks-charts
  defaultVersion: '1.14.1'
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '5'
  selector:
    matchExpressions:
      - key: enable_aws_load_balancer_controller
        operator: In
        values: ['true']
  goTemplateOptions:
    - "missingkey=zero"
  valuesObject:
    clusterName: '{{.metadata.annotations.aws_cluster_name}}'
    vpcId: '{{.metadata.annotations.aws_vpc_id}}'
    region: '{{.metadata.annotations.aws_region}}'
    serviceAccount:
      create: true
      name: aws-load-balancer-controller-sa
  additionalResources:
    - path: '{{.metadata.annotations.addonsRepoBasepath}}addons/charts/pod-identity-restart-hook'
      helm:
        releaseName: lbc-credential-check
        valuesObject:
          targets:
            - name: lbc
              namespace: kube-system
              serviceAccount: aws-load-balancer-controller-sa
              deploymentLabel: app.kubernetes.io/name=aws-load-balancer-controller

image-prepuller:
  namespace: kube-system
  path: '{{.metadata.annotations.addonsRepoBasepath}}addons/charts/image-prepuller'
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '1'
  selector:
    matchExpressions:
      - key: enable_image_prepuller
        operator: In
        values: ['true']
  valuesObject:
    global:
      clusterName: '{{.metadata.annotations.aws_cluster_name}}'

aws-efs-csi-driver:
  namespace: kube-system
  chartName: aws-efs-csi-driver
  chartRepository: https://kubernetes-sigs.github.io/aws-efs-csi-driver
  defaultVersion: '3.0.7'
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '4'
  selector:
    matchExpressions:
      - key: enable_aws_efs_csi_driver
        operator: In
        values: ['true']
  valuesObject:
    controller:
      serviceAccount:
        name: efs-csi-controller-sa
        annotations:
          eks.amazonaws.com/role-arn: '{{default "" (index .metadata.annotations "aws_efs_csi_driver_iam_role_arn")}}'
    node:
      serviceAccount:
        name: efs-csi-node-sa
        annotations:
          eks.amazonaws.com/role-arn: '{{default "" (index .metadata.annotations "aws_efs_csi_driver_iam_role_arn")}}'

external-dns:
  namespace: kube-system
  chartName: external-dns
  chartRepository: https://kubernetes-sigs.github.io/external-dns
  defaultVersion: '1.14.5'
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '5'
  selector:
    matchExpressions:
      - key: enable_external_dns
        operator: In
        values: ['true']
  valuesObject:
    domainFilters:
      - '{{.metadata.annotations.ingress_domain_name}}'
    txtOwnerId: '{{.metadata.annotations.aws_cluster_name}}'
    extraArgs:
      - --aws-zone-match-parent
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 512Mi
    livenessProbe:
      httpGet:
        path: /healthz
        port: http
      initialDelaySeconds: 30
      periodSeconds: 15
      failureThreshold: 5
      timeoutSeconds: 10
    readinessProbe:
      httpGet:
        path: /healthz
        port: http
      initialDelaySeconds: 30
      periodSeconds: 15
      failureThreshold: 5
      timeoutSeconds: 10
    serviceAccount:
      name: external-dns-sa
    livenessProbe:
      httpGet:
        path: /healthz
        port: http
      initialDelaySeconds: 60
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 5
    readinessProbe:
      httpGet:
        path: /healthz
        port: http
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 5
  additionalResources:
    - path: '{{.metadata.annotations.addonsRepoBasepath}}addons/charts/pod-identity-restart-hook'
      helm:
        releaseName: external-dns-credential-check
        valuesObject:
          targets:
            - name: external-dns
              namespace: kube-system
              serviceAccount: external-dns-sa
              deploymentLabel: app.kubernetes.io/name=external-dns
