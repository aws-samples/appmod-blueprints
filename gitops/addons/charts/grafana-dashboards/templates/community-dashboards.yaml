---
# Kubernetes Cluster Overview (ID: 7249, rev 1) - simple, no recording rules
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: community-k8s-cluster-overview
  namespace: {{ .Values.namespace | default "grafana-operator" }}
spec:
  folder: "Community Dashboards"
  instanceSelector:
    matchLabels:
      dashboards: "external-grafana"
  grafanaCom:
    id: 7249
    revision: 1
  datasources:
    - inputName: "DS_PROMETHEUS"
      datasourceName: "Prometheus"
