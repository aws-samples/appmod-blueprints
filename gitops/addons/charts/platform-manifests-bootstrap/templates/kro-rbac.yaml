{{- if .Values.kroRbac | default true }}
# Grant KRO Capability permissions to manage ACK resources
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kro-ack-resources
rules:
  - apiGroups: ["ec2.services.k8s.aws", "eks.services.k8s.aws", "iam.services.k8s.aws", "elbv2.services.k8s.aws"]
    resources: ["*"]
    verbs: ["*"]
  - apiGroups: [""]
    resources: ["secrets", "namespaces", "serviceaccounts"]
    verbs: ["*"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kro-ack-resources-binding
subjects:
  - kind: User
    name: "capabilities.eks.amazonaws.com"
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: kro-ack-resources
  apiGroup: rbac.authorization.k8s.io
{{- end }}
