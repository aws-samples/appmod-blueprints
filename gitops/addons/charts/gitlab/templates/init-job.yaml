---
# RBAC resources for GitLab initialization
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: gitlab
  name: gitlab-init-role
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gitlab-init-rolebinding
  namespace: gitlab
subjects:
- kind: ServiceAccount
  name: default
  namespace: gitlab
roleRef:
  kind: Role
  name: gitlab-init-role
  apiGroup: rbac.authorization.k8s.io
---
# ConfigMap for initialization script
apiVersion: v1
kind: ConfigMap
metadata:
  name: gitlab-init-script
  namespace: gitlab
data:
  init-gitlab.sh: |
    #!/bin/bash
    set -e

    # Wait for GitLab to be ready
    echo "Waiting for GitLab to be ready..."
    until curl -s --head --fail http://gitlab.gitlab.svc.cluster.local/-/readiness; do
      echo "GitLab not ready yet, waiting..."
      sleep 10
    done

    # Set variables
    export GITLAB_URL=http://gitlab.gitlab.svc.cluster.local
    export GITLAB_POD_NAME=$(kubectl get pods -n gitlab -l app=gitlab -o jsonpath='{.items[0].metadata.name}')
    export ROOT_GITLAB_TOKEN=root-${GITLAB_ROOT_PASSWORD}
    export IDE_PASSWORD=${GITLAB_ROOT_PASSWORD}
    export GIT_USERNAME="{{ .Values.git_username | default "user1" }}"
    export WORKING_REPO="{{ .Values.working_repo | default "fleet-config" }}"

    # Ensure root API token exists with the current value (idempotent / self-healing).
    # Recreated every run so a rotated password (token value) stays in sync.
    echo "Ensuring root API token..."
    kubectl exec -i $GITLAB_POD_NAME -n gitlab -- gitlab-rails runner "
      u = User.find_by_username('root')
      u.personal_access_tokens.where(name: 'initial root token').delete_all
      token = u.personal_access_tokens.create(
        name: 'initial root token',
        scopes: [
          'api',
          'read_user',
          'read_repository',
          'write_repository',
          'sudo',
          'admin_mode'
        ],
        expires_at: 365.days.from_now
      )
      token.set_token('${ROOT_GITLAB_TOKEN}')
      token.save!
    "

    # Update GitLab settings
    echo "Updating GitLab settings..."
    kubectl exec -it $GITLAB_POD_NAME -n gitlab -- gitlab-rails runner '::Gitlab::CurrentSettings.update!(signup_enabled: false)'

    # Check if user already exists
    echo "Checking if user $GIT_USERNAME already exists..."
    USER_EXISTS=$(curl -s "$GITLAB_URL/api/v4/users?search=$GIT_USERNAME" -H "PRIVATE-TOKEN: $ROOT_GITLAB_TOKEN" | jq -r 'if type=="array" then length else 0 end')

    if [[ "$USER_EXISTS" == "0" ]]; then
      echo "Creating $GIT_USERNAME..."
      curl -sS -X 'POST' "$GITLAB_URL/api/v4/users" \
        -H "PRIVATE-TOKEN: $ROOT_GITLAB_TOKEN" \
        -H 'accept: application/json' \
        -H 'Content-Type: application/json' \
        -d "{
        \"name\": \"$GIT_USERNAME\",
        \"username\": \"$GIT_USERNAME\",
        \"email\": \"$GIT_USERNAME@example.com\",
        \"password\": \"$IDE_PASSWORD\"
      }" && echo -e "\n"
    else
      echo "User $GIT_USERNAME already exists, skipping creation."
    fi

    # Ensure $GIT_USERNAME password and API token match the current value
    # (idempotent / self-healing: keeps an existing user in sync after a password rotation).
    # Password is passed via env to be safe with special characters.
    echo "Ensuring $GIT_USERNAME password and API token..."
    kubectl exec -i $GITLAB_POD_NAME -n gitlab -- env NEWPW="$IDE_PASSWORD" gitlab-rails runner "
      u = User.find_by_username('$GIT_USERNAME')
      if u
        u.password = ENV['NEWPW']
        u.password_confirmation = ENV['NEWPW']
        u.password_automatically_set = false
        u.save!
        u.personal_access_tokens.where(name: 'initial $GIT_USERNAME token').delete_all
        token = u.personal_access_tokens.create(
          name: 'initial $GIT_USERNAME token',
          scopes: ['api', 'read_user', 'read_repository', 'write_repository'],
          expires_at: 365.days.from_now
        )
        token.set_token(ENV['NEWPW'])
        token.save!
        puts 'ensured password + token for $GIT_USERNAME'
      end
    "

    # --- Create fleet-config overlay repo (owned by $GIT_USERNAME) ---
    # Resolve the target user's id so repos are created in THEIR namespace.
    # Using root's PAT against /projects/ would create them under root/, which
    # breaks the $GIT_USERNAME/$WORKING_REPO clone/push later in this script.
    USER1_ID=$(curl -s "$GITLAB_URL/api/v4/users?username=$GIT_USERNAME" -H "PRIVATE-TOKEN: $ROOT_GITLAB_TOKEN" | jq -r 'if type=="array" then (.[0].id // "") else "" end')
    echo "Target user $GIT_USERNAME id: $USER1_ID"

    echo "Checking if repository $GIT_USERNAME/$WORKING_REPO already exists..."
    REPO_EXISTS=$(curl -s "$GITLAB_URL/api/v4/projects?search=$WORKING_REPO" -H "PRIVATE-TOKEN: $ROOT_GITLAB_TOKEN" | jq -r 'if type=="array" then ([.[] | select(.path_with_namespace == "'$GIT_USERNAME'/'$WORKING_REPO'")] | length) else 0 end')

    if [[ "$REPO_EXISTS" == "0" ]]; then
      echo "Creating $GIT_USERNAME/$WORKING_REPO overlay repository..."
      curl -sS -X 'POST' "$GITLAB_URL/api/v4/projects/user/$USER1_ID" \
        -H "PRIVATE-TOKEN: $ROOT_GITLAB_TOKEN" \
        -H 'accept: application/json' \
        -H 'Content-Type: application/json' \
        -d "{\"name\": \"$WORKING_REPO\", \"initialize_with_readme\": true}" && echo -e "\n"

      # Seed the overlay repo with initial structure
      PROJECT_ID=$(curl -s "$GITLAB_URL/api/v4/projects?search=$WORKING_REPO" -H "PRIVATE-TOKEN: $ROOT_GITLAB_TOKEN" | jq -r 'if type=="array" then ([.[] | select(.path_with_namespace == "'$GIT_USERNAME'/'$WORKING_REPO'")][0].id // "") else "" end')

      # Create directory structure via commits API
      echo "Seeding $WORKING_REPO with overlay structure..."
      curl -sS -X 'POST' "$GITLAB_URL/api/v4/projects/$PROJECT_ID/repository/commits" \
        -H "PRIVATE-TOKEN: $ROOT_GITLAB_TOKEN" \
        -H 'Content-Type: application/json' \
        -d '{
          "branch": "main",
          "commit_message": "feat: initial overlay structure",
          "actions": [
            {"action": "update", "file_path": "README.md", "content": "# fleet-config\n\nThis README is seeded from the platform source (platform/fleet-config/README.md in aws-samples/appmod-blueprints) during platform bootstrap. Edit it there, not here.\n"},
            {"action": "create", "file_path": "overlays/environments/control-plane/.gitkeep", "content": ""},
            {"action": "create", "file_path": "overlays/environments/dev/.gitkeep", "content": ""},
            {"action": "create", "file_path": "overlays/environments/prod/.gitkeep", "content": ""},
            {"action": "create", "file_path": "overlays/clusters/.gitkeep", "content": ""},
            {"action": "create", "file_path": "configs/.gitkeep", "content": ""}
          ]
        }'
    else
      echo "Repository $WORKING_REPO already exists, skipping creation."
    fi

    # Unprotect main branch on fleet-config
    PROJECT_ID=$(curl -s "$GITLAB_URL/api/v4/projects?search=$WORKING_REPO" -H "PRIVATE-TOKEN: $ROOT_GITLAB_TOKEN" | jq -r 'if type=="array" then ([.[] | select(.path_with_namespace == "'$GIT_USERNAME'/'$WORKING_REPO'")][0].id // "") else "" end')
    curl -sS -X 'DELETE' "$GITLAB_URL/api/v4/projects/$PROJECT_ID/protected_branches/main" \
      -H "PRIVATE-TOKEN: $ROOT_GITLAB_TOKEN" || echo "Main branch was not protected or already unprotected"

    # --- Push Backstage templates into fleet-config (same path as GitHub source) ---
    SOURCE_REPO_URL="{{ .Values.source_repo_url | default "https://github.com/aws-samples/appmod-blueprints" }}"
    SOURCE_REPO_REVISION="{{ .Values.source_repo_revision | default "main" }}"
    if [ ! -d "/tmp/fleet-config/platform/backstage/templates" ]; then
      echo "Cloning Backstage templates from $SOURCE_REPO_URL ($SOURCE_REPO_REVISION)..."
      rm -rf /tmp/source-repo /tmp/fleet-clone
      git clone --depth 1 --branch "$SOURCE_REPO_REVISION" "$SOURCE_REPO_URL" /tmp/source-repo 2>/dev/null || git clone "$SOURCE_REPO_URL" /tmp/source-repo
      if [ -d "/tmp/source-repo/platform/backstage/templates" ]; then
        git clone "http://$GIT_USERNAME:$IDE_PASSWORD@gitlab.gitlab.svc.cluster.local/$GIT_USERNAME/$WORKING_REPO.git" /tmp/fleet-clone
        mkdir -p /tmp/fleet-clone/platform/backstage
        cp -r /tmp/source-repo/platform/backstage/templates /tmp/fleet-clone/platform/backstage/
        # Seed the overlay README from the platform source (single source of truth).
        [ -f /tmp/source-repo/platform/fleet-config/README.md ] && \
          cp /tmp/source-repo/platform/fleet-config/README.md /tmp/fleet-clone/README.md
        cd /tmp/fleet-clone
        git config user.email "gitlab-init@workshop.local"
        git config user.name "gitlab-init"
        git add platform/backstage/templates README.md
        git commit -m "feat: seed README + Backstage templates from platform source" 2>/dev/null && \
          git push origin main && echo "README + Backstage templates pushed to $WORKING_REPO" || echo "Already up to date"
        cd -
      else
        echo "WARN: platform/backstage/templates not found in source repo"
      fi
    fi

    # --- Create application repos ---
    {{- range .Values.application_repos | default (list "app-java" "app-rust") }}
    APP_REPO="{{ . }}"
    echo "Checking if application repo $GIT_USERNAME/$APP_REPO already exists..."
    APP_REPO_EXISTS=$(curl -s "$GITLAB_URL/api/v4/projects?search=$APP_REPO" -H "PRIVATE-TOKEN: $ROOT_GITLAB_TOKEN" | jq -r 'if type=="array" then ([.[] | select(.path_with_namespace == "'$GIT_USERNAME'/'$APP_REPO'")] | length) else 0 end')

    if [[ "$APP_REPO_EXISTS" == "0" ]]; then
      echo "Creating application repo $GIT_USERNAME/$APP_REPO..."
      curl -sS -X 'POST' "$GITLAB_URL/api/v4/projects/user/$USER1_ID" \
        -H "PRIVATE-TOKEN: $ROOT_GITLAB_TOKEN" \
        -H 'accept: application/json' \
        -H 'Content-Type: application/json' \
        -d "{\"name\": \"$APP_REPO\", \"initialize_with_readme\": true}" && echo -e "\n"

      # Unprotect main branch
      APP_PROJECT_ID=$(curl -s "$GITLAB_URL/api/v4/projects?search=$APP_REPO" -H "PRIVATE-TOKEN: $ROOT_GITLAB_TOKEN" | jq -r 'if type=="array" then ([.[] | select(.path_with_namespace == "'$GIT_USERNAME'/'$APP_REPO'")][0].id // "") else "" end')
      curl -sS -X 'DELETE' "$GITLAB_URL/api/v4/projects/$APP_PROJECT_ID/protected_branches/main" \
        -H "PRIVATE-TOKEN: $ROOT_GITLAB_TOKEN" || true
    else
      echo "Application repo $APP_REPO already exists, skipping."
    fi
    {{- end }}

    echo "GitLab initialization completed successfully."
---
# Initialization Job
apiVersion: batch/v1
kind: Job
metadata:
  name: gitlab-init
  namespace: gitlab
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      name: gitlab-init
    spec:
      serviceAccountName: default
      restartPolicy: OnFailure
      nodeSelector:
        karpenter.sh/nodepool: system
      tolerations:
      - key: "CriticalAddonsOnly"
        operator: "Exists"
        effect: "NoSchedule"
      containers:
      - name: gitlab-init
        image: alpine/k8s:1.32.5
        command:
        - /bin/bash
        - -c
        - /scripts/init-gitlab.sh
        env:
        - name: GITLAB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: gitlab-root-credentials
              key: GITLAB_ROOT_PASSWORD
        volumeMounts:
        - name: init-script
          mountPath: /scripts
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
      volumes:
      - name: init-script
        configMap:
          name: gitlab-init-script
          defaultMode: 0755
