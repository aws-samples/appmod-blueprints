apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-root-credentials
  namespace: {{ .Values.namespace | default "gitlab" }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: gitlab-root-credentials
    creationPolicy: Owner
  data:
    # GitLab root password is the workshop user_password (same as IDE_PASSWORD / USER1_PASSWORD).
    # Sourced from Secrets Manager hub/secrets instead of a hardcoded value in git.
    - secretKey: GITLAB_ROOT_PASSWORD
      remoteRef:
        key: hub/secrets
        property: user_password
