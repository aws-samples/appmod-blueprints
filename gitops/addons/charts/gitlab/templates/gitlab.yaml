apiVersion: v1
kind: Namespace
metadata:
  name: gitlab
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitlab-data
  namespace: gitlab
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp3
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitlab
  namespace: gitlab
spec:
  selector:
    matchLabels:
      app: gitlab
  strategy:
    type: Recreate
  replicas: 1
  template:
    metadata:
      labels:
        app: gitlab
    spec:
      nodeSelector:
        karpenter.sh/nodepool: system
      tolerations:
      - key: "CriticalAddonsOnly"
        operator: "Exists"
        effect: "NoSchedule"
      volumes:
      - name: gitlab-data
        persistentVolumeClaim:
          claimName: gitlab-data
      - name: gitlab-config
        secret:
          secretName: gitlab-config
      containers:
      - name: gitlab
        image: gitlab/gitlab-ce:latest
        ports:
        - containerPort: 80
          name: http
{{- if ne (default "domain" .Values.exposure_mode) "cloudfront" }}
        - containerPort: 22
          name: ssh
{{- end }}
        env:
        - name: GITLAB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: gitlab-root-credentials
              key: GITLAB_ROOT_PASSWORD
        - name: GITLAB_OMNIBUS_CONFIG
          value: |
            external_url 'https://{{ .Values.domain_name }}'
            gitlab_rails['gitlab_shell_ssh_port'] = 22
            gitlab_rails['gitlab_shell_git_timeout'] = 800
{{- if eq (default "domain" .Values.exposure_mode) "cloudfront" }}
            gitlab_rails['enabled_git_access_protocol'] = 'http'
{{- else }}
            gitlab_rails['enabled_git_access_protocol'] = 'ssh'
{{- end }}

            # Disable Let's Encrypt
            letsencrypt['enable'] = false

            # Disable HTTPS
            nginx['ssl_certificate'] = nil
            nginx['ssl_certificate_key'] = nil
            nginx['redirect_http_to_https'] = false
            nginx['listen_https'] = false
            nginx['listen_port'] = 80

            # Disable Prometheus monitoring
            prometheus_monitoring['enable'] = false

            # Disable CI/CD features
            # gitlab_ci['enable'] = false
            # gitlab_rails['gitlab_default_projects_features_builds'] = false

            # Disable container registry
            registry['enable'] = false
            registry_nginx['enable'] = false

            # Disable pages
            pages_enabled = false
            gitlab_pages['enable'] = false

            # Disable monitoring features
            alertmanager['enable'] = false
            node_exporter['enable'] = false
            redis_exporter['enable'] = false
            postgres_exporter['enable'] = false

            # Disable Kubernetes integration
            # gitlab_kas['enable'] = false

            # Disable SMTP if not needed
            gitlab_rails['smtp_enable'] = false

            # Disable Sidekiq metrics
            sidekiq['metrics_enabled'] = false

            # Puma
            # puma['worker_processes'] = 0
            # puma['per_worker_max_memory_mb'] = 1024

            # Reduce Redis resources
            redis['tcp_timeout'] = 60
            redis['tcp_keepalive'] = 300

            # # Optional: Disable features at project level
            # gitlab_rails['gitlab_default_projects_features'] = {
            #   'issues' => true,
            #   'merge_requests' => true,
            #   'wiki' => false,
            #   'snippets' => false,
            #   'builds' => true,
            #   'container_registry' => false
            # }

            # Reduce Sidekiq concurrency
            sidekiq['concurrency'] = 5
            gitlab_rails['monitoring_whitelist'] = ['0.0.0.0/0']
            gitlab_rails['signup_enabled'] = false
            gitlab_rails['initial_root_password'] = ENV['GITLAB_ROOT_PASSWORD']

            # OmniAuth Keycloak OIDC configuration (PKCE, no client secret)
            gitlab_rails['omniauth_enabled'] = true
            gitlab_rails['omniauth_allow_single_sign_on'] = ['openid_connect']
            gitlab_rails['omniauth_block_auto_created_users'] = false
            gitlab_rails['omniauth_auto_link_user'] = ['openid_connect']
            gitlab_rails['omniauth_providers'] = [
              {
                name: "openid_connect",
                label: "Platform IDP",
                args: {
                  name: "openid_connect",
                  scope: ["openid", "profile", "email"],
                  response_type: "code",
                  issuer: "https://{{ .Values.keycloak_domain_name }}/keycloak/realms/platform",
                  client_auth_method: "query",
                  discovery: true,
                  uid_field: "preferred_username",
                  pkce: true,
                  client_options: {
                    identifier: "gitlab",
                    secret: "",
                    redirect_uri: "https://{{ .Values.domain_name }}/users/auth/openid_connect/callback"
                  }
                }
              }
            ]
        resources:
          requests:
            memory: "8Gi"
            cpu: "6"
          limits:
            memory: "16Gi"
        securityContext:
          privileged: false
          runAsUser: 0
        livenessProbe:
          httpGet:
            path: /-/liveness
            port: 80
          initialDelaySeconds: 180
          timeoutSeconds: 15
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /-/readiness
            port: 80
          initialDelaySeconds: 180
          timeoutSeconds: 15
          periodSeconds: 30
        volumeMounts:
        - name: gitlab-data
          mountPath: /etc/gitlab
          subPath: config
        - name: gitlab-data
          mountPath: /var/log/gitlab
          subPath: logs
        - name: gitlab-data
          mountPath: /var/opt/gitlab
          subPath: data
---
apiVersion: v1
kind: Service
metadata:
  name: gitlab
  namespace: gitlab
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
    service.beta.kubernetes.io/aws-load-balancer-name: "{{ .Values.global.aws_cluster_name }}-gitlab"
{{- if .Values.security_groups }}
    service.beta.kubernetes.io/aws-load-balancer-security-groups: "{{ .Values.security_groups }}"
{{- end }}
    service.beta.kubernetes.io/aws-load-balancer-manage-backend-security-group-rules: "true"
spec:
  type: LoadBalancer
  ports:
  - name: http
    port: 80
    targetPort: 80
{{- if ne (default "domain" .Values.exposure_mode) "cloudfront" }}
  - name: ssh
    port: 22
    targetPort: 22
{{- end }}
  selector:
    app: gitlab
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: gitlab-pdb
  namespace: gitlab
spec:
  maxUnavailable: 0
  selector:
    matchLabels:
      app: gitlab
