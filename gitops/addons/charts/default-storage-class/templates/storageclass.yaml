apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: {{ .Values.name | default "gp3" }}
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: {{ .Values.provisioner | default "ebs.csi.eks.amazonaws.com" }}
volumeBindingMode: {{ .Values.volumeBindingMode | default "WaitForFirstConsumer" }}
reclaimPolicy: {{ .Values.reclaimPolicy | default "Delete" }}
allowVolumeExpansion: {{ .Values.allowVolumeExpansion | default true }}
parameters:
  type: {{ .Values.type | default "gp3" }}
  encrypted: {{ .Values.encrypted | default "true" | quote }}
