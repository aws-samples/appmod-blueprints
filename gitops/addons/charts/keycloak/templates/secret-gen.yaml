# Password generators for initial keycloak secrets
# These generate random passwords into a K8s Secret.
# PushSecret pushes them to Secrets Manager only if the key doesn't exist yet.
# ExternalSecret (in this file) pulls from Secrets Manager as source of truth.
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: keycloak-admin-password
  namespace: keycloak
spec:
  length: 24
  digits: 5
  symbols: 3
  symbolCharacters: "!@#$%"
  noUpper: false
  allowRepeat: true
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: keycloak-db-password
  namespace: keycloak
spec:
  length: 24
  digits: 5
  symbols: 3
  symbolCharacters: "!@#$%"
  noUpper: false
  allowRepeat: true
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: keycloak-user-password
  namespace: keycloak
spec:
  length: 16
  digits: 4
  symbols: 2
  symbolCharacters: "!@#$"
  noUpper: false
  allowRepeat: true
---
# ExternalSecret that generates passwords from Password generators into a K8s Secret
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-generated-passwords
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: "0"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: keycloak-admin-password
      rewrite:
        - transform:
            template: "keycloak_admin_password"
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: keycloak-db-password
      rewrite:
        - transform:
            template: "keycloak_postgres_password"
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: keycloak-user-password
      rewrite:
        - transform:
            template: "user_password"
  target:
    name: keycloak-generated-passwords
    creationPolicy: Owner
---
# PushSecret: push generated passwords to Secrets Manager (only if not already present)
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: keycloak-seed-passwords
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  updatePolicy: IfNotExists
  deletionPolicy: None
  refreshInterval: "0"
  secretStoreRefs:
    - name: aws-secrets-manager
      kind: ClusterSecretStore
  selector:
    secret:
      name: keycloak-generated-passwords
  data:
    - conversionStrategy: None
      match:
        secretKey: "keycloak_admin_password"
        remoteRef:
          remoteKey: {{ .Values.aws.cluster_name }}/secrets
          property: "keycloak_admin_password"
    - conversionStrategy: None
      match:
        secretKey: "keycloak_postgres_password"
        remoteRef:
          remoteKey: {{ .Values.aws.cluster_name }}/secrets
          property: "keycloak_postgres_password"
    - conversionStrategy: None
      match:
        secretKey: "user_password"
        remoteRef:
          remoteKey: {{ .Values.aws.cluster_name }}/secrets
          property: "user_password"
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: argocd-store
  namespace: keycloak
spec:
  provider:
    kubernetes:
      remoteNamespace: argocd
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        serviceAccount:
          name: keycloak-config
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-config
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  refreshInterval: "30s"
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: keycloak-config
    creationPolicy: Owner
    deletionPolicy: Retain   
    template:
      engineVersion: v2
      mergePolicy: Replace
      data:
        KC_BOOTSTRAP_ADMIN_PASSWORD: "{{ `{{.KEYCLOAK_ADMIN_PASSWORD}}` }}"
        KC_DB_USERNAME: keycloak
        KC_DB_PASSWORD: "{{ `{{.KEYCLOAK_DB_PASSWORD}}` }}"
        POSTGRES_DB: keycloak
        POSTGRES_USER: keycloak
        POSTGRES_PASSWORD: "{{ `{{.KEYCLOAK_DB_PASSWORD}}` }}"
        USER_PASSWORD: "{{ `{{.KEYCLOAK_USER_PASSWORD}}` }}"
  data:
    - secretKey: KEYCLOAK_USER_PASSWORD
      remoteRef:
        key: {{ .Values.aws.cluster_name }}/secrets
        property: user_password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: KEYCLOAK_ADMIN_PASSWORD
      remoteRef:
        key: {{ .Values.aws.cluster_name }}/secrets
        property: keycloak_admin_password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: KEYCLOAK_DB_PASSWORD
      remoteRef:
        key: {{ .Values.aws.cluster_name }}/secrets
        property: keycloak_postgres_password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-store
  namespace: keycloak
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: keycloak
  name: eso-store
rules:
  - apiGroups: [""]
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - authorization.k8s.io
    resources:
      - selfsubjectrulesreviews
    verbs:
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: eso-store
  namespace: keycloak
subjects:
  - kind: ServiceAccount
    name: eso-store
    namespace: keycloak
roleRef:
  kind: Role
  name: eso-store
  apiGroup: rbac.authorization.k8s.io
