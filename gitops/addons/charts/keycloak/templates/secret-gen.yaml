# Keycloak secrets — pulled from Secrets Manager (seeded by cluster provider during bootstrap)
#
# The cluster provider must create <cluster>/keycloak in Secrets Manager with keys:
#   keycloak_admin_password, keycloak_postgres_password, user_password
#
# See cluster-providers/README.md for the provider contract.
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: argocd-store
  namespace: keycloak
spec:
  provider:
    kubernetes:
      remoteNamespace: argocd
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        serviceAccount:
          name: keycloak-config
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-config
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  refreshInterval: "30s"
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: keycloak-config
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Replace
      data:
        KC_BOOTSTRAP_ADMIN_PASSWORD: "{{ `{{.KEYCLOAK_ADMIN_PASSWORD}}` }}"
        KC_DB_USERNAME: keycloak
        KC_DB_PASSWORD: "{{ `{{.KEYCLOAK_DB_PASSWORD}}` }}"
        POSTGRES_DB: keycloak
        POSTGRES_USER: keycloak
        POSTGRES_PASSWORD: "{{ `{{.KEYCLOAK_DB_PASSWORD}}` }}"
        USER_PASSWORD: "{{ `{{.KEYCLOAK_USER_PASSWORD}}` }}"
  data:
    - secretKey: KEYCLOAK_USER_PASSWORD
      remoteRef:
        key: {{ .Values.aws.cluster_name }}/keycloak
        property: user_password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: KEYCLOAK_ADMIN_PASSWORD
      remoteRef:
        key: {{ .Values.aws.cluster_name }}/keycloak
        property: keycloak_admin_password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: KEYCLOAK_DB_PASSWORD
      remoteRef:
        key: {{ .Values.aws.cluster_name }}/keycloak
        property: keycloak_postgres_password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-store
  namespace: keycloak
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: keycloak
  name: eso-store
rules:
  - apiGroups: [""]
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - authorization.k8s.io
    resources:
      - selfsubjectrulesreviews
    verbs:
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: eso-store
  namespace: keycloak
subjects:
  - kind: ServiceAccount
    name: eso-store
    namespace: keycloak
roleRef:
  kind: Role
  name: eso-store
  apiGroup: rbac.authorization.k8s.io
