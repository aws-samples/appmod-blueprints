{{- if .Values.amp.enabled }}
apiVersion: amp.aws.upbound.io/v1beta1
kind: RuleGroupNamespace
metadata:
  name: {{ .Values.resourcePrefix }}-recording-rules
  annotations:
    crossplane.io/external-name: accelerator-v2-recording-rules
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "2"
spec:
  forProvider:
    region: {{ .Values.aws.region }}
    workspaceIdRef:
      name: {{ .Values.resourcePrefix }}-amp
    data: |
      groups:
        - name: accelerator-v2-recording-rules
          rules:
            - record: node:node_cpu_utilisation:avg1m
              expr: avg by (node) (rate(node_cpu_seconds_total{mode!="idle"}[1m]))
            - record: node:node_memory_utilisation:ratio
              expr: 1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)
            - record: namespace:container_cpu_usage_seconds_total:sum_rate
              expr: sum by (namespace) (rate(container_cpu_usage_seconds_total{container!=""}[5m]))
            - record: namespace:container_memory_working_set_bytes:sum
              expr: sum by (namespace) (container_memory_working_set_bytes{container!=""})
        - name: kubernetes-mixin-rules
          rules:
            - record: cluster:node_cpu:ratio_rate5m
              expr: sum(rate(node_cpu_seconds_total{mode!="idle",mode!="iowait",mode!="steal"}[5m])) by (cluster) / count(sum(node_cpu_seconds_total) by (cluster, instance, cpu))
            - record: ":node_memory_MemAvailable_bytes:sum"
              expr: sum(node_memory_MemAvailable_bytes{job="node-exporter"}) by (cluster)
            - record: namespace_cpu:kube_pod_container_resource_requests:sum
              expr: sum by (namespace, cluster) (sum by (namespace, pod, cluster) (max by (namespace, pod, container, cluster) (kube_pod_container_resource_requests{resource="cpu",job="kube-state-metrics"}) * on(namespace, pod, cluster) group_left() max by (namespace, pod, cluster) (kube_pod_status_phase{phase=~"Pending|Running"} == 1)))
            - record: namespace_cpu:kube_pod_container_resource_limits:sum
              expr: sum by (namespace, cluster) (sum by (namespace, pod, cluster) (max by (namespace, pod, container, cluster) (kube_pod_container_resource_limits{resource="cpu",job="kube-state-metrics"}) * on(namespace, pod, cluster) group_left() max by (namespace, pod, cluster) (kube_pod_status_phase{phase=~"Pending|Running"} == 1)))
            - record: namespace_memory:kube_pod_container_resource_requests:sum
              expr: sum by (namespace, cluster) (sum by (namespace, pod, cluster) (max by (namespace, pod, container, cluster) (kube_pod_container_resource_requests{resource="memory",job="kube-state-metrics"}) * on(namespace, pod, cluster) group_left() max by (namespace, pod, cluster) (kube_pod_status_phase{phase=~"Pending|Running"} == 1)))
            - record: namespace_memory:kube_pod_container_resource_limits:sum
              expr: sum by (namespace, cluster) (sum by (namespace, pod, cluster) (max by (namespace, pod, container, cluster) (kube_pod_container_resource_limits{resource="memory",job="kube-state-metrics"}) * on(namespace, pod, cluster) group_left() max by (namespace, pod, cluster) (kube_pod_status_phase{phase=~"Pending|Running"} == 1)))
            - record: namespace_workload_pod:kube_pod_owner:relabel
              expr: max by (cluster, namespace, workload, pod) (label_replace(label_replace(kube_pod_owner{job="kube-state-metrics"}, "workload", "$1", "owner_name", "(.*)"), "workload_type", "$1", "owner_kind", "(.*)"))
            - record: node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate
              expr: sum by (cluster, namespace, pod, container) (irate(container_cpu_usage_seconds_total{image!=""}[5m])) * on (namespace, pod) group_left(node) topk by(namespace, pod) (1, max by(namespace, pod, node) (kube_pod_info{node!=""}))
  providerConfigRef:
    name: default
{{- end }}
