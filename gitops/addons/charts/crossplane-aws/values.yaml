# AWS configuration for IRSA integration
aws:
  irsaRoleArn: ""
  region: "us-west-2"

global:
  clusterName: ""

namespace: crossplane-system

compositions:
  enabled: true

# Provider configuration
providers:
  aws:
    enabled: true
    familyVersion: "v2.5.3"
    s3Version: "v2.5.3"
    dynamodbVersion: "v2.5.3"
    apigatewayv2Version: "v2.5.3"
    eksVersion: "v2.5.3"
    ec2Version: "v2.5.3"
    iamVersion: "v2.5.3"
    lambdaVersion: "v2.5.3"
    rdsVersion: "v2.5.3"
    runtimeConfigRef: "aws-irsa-drc"
    # Default resources for all providers
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi

compositions:
  enabled: true

namespace: crossplane-system
