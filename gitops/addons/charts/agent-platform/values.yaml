# Agent Platform configuration
# These values are injected from the cluster secret annotations via the registry valuesObject

agentPlatform:
  repoURL: "https://github.com/aws-samples/sample-agent-platform-on-eks.git"
  revision: "main"
  basepath: "gitops/addons/"
  environment: "dev"

# Cluster identity (injected from cluster secret annotations)
cluster:
  name: ""
  server: ""
  region: ""
  accountId: ""
  clusterName: ""

# AgentGateway KeyCloak integration
agentGateway:
  keycloakIssuerUrl: ""
