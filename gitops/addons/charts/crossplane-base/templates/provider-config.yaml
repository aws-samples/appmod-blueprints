{{- if .Values.providerConfig.enabled }}
apiVersion: aws.upbound.io/v1beta1
kind: ProviderConfig
metadata:
  name: {{ .Values.providerConfig.name | default "default" }}
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "2"
spec:
  credentials:
    source: PodIdentity
{{- end }}
{{- range $name, $provider := .Values.providers }}
{{- if and $provider.version $provider.serviceAccount }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $provider.serviceAccount }}
  namespace: {{ $.Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "-1"
---
apiVersion: pkg.crossplane.io/v1beta1
kind: DeploymentRuntimeConfig
metadata:
  name: {{ $name }}-drc
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "-1"
spec:
  deploymentTemplate:
    spec:
      selector: {}
      template:
        spec:
          serviceAccountName: {{ $provider.serviceAccount }}
          containers:
          - name: package-runtime
            # Tune reconcile concurrency to avoid IAM/EKS API throttling during the initial
            # bootstrap burst. IAM is a global, low-limit, token-bucket-rate-limited service;
            # the provider default --max-reconcile-rate=100 fires far too many concurrent
            # CreateRole/AttachRolePolicy calls, causing throttled/timed-out Create calls that
            # Crossplane records as a stuck 'crossplane.io/external-create-pending' annotation
            # (it then refuses to retry, to avoid duplicate creation). Lowering the rate spreads
            # the writes out. Override per-provider via providers.<name>.maxReconcileRate.
            args:
              - --max-reconcile-rate={{ $provider.maxReconcileRate | default ($.Values.providerDefaults).maxReconcileRate | default 6 }}
            resources:
              requests:
                cpu: {{ if $.Values.providerResources }}{{ $.Values.providerResources.cpuRequest | default "250m" }}{{ else }}250m{{ end }}
                memory: {{ if $.Values.providerResources }}{{ $.Values.providerResources.memoryRequest | default "1Gi" }}{{ else }}1Gi{{ end }}
              limits:
                memory: 2Gi
{{- end }}
{{- end }}
