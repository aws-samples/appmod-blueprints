{{- range $name, $identity := .Values.identities }}
{{- if and $identity.policy (not (eq (toString $identity.enabled) "false")) }}
---
apiVersion: iam.aws.upbound.io/v1beta1
kind: RolePolicyAttachment
metadata:
  name: {{ $.Values.aws.clusterName }}-{{ $name }}-pod-identity-attachment
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "-2"
spec:
  forProvider:
    policyArnRef:
      name: {{ $.Values.aws.clusterName }}-{{ $name }}-pod-identity-policy
    roleRef:
      name: {{ $.Values.aws.clusterName }}-{{ $name }}-pod-identity-role
  providerConfigRef:
    name: default
{{- end }}
{{- end }}
