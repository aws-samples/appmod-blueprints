{{- range $name, $identity := .Values.identities }}
{{- if and $identity.policy (not (eq (toString $identity.enabled) "false")) }}
---
apiVersion: iam.aws.upbound.io/v1beta1
kind: RolePolicyAttachment
metadata:
  name: {{ $.Values.aws.clusterName }}-{{ $name }}-pod-identity-attachment
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "-2"
spec:
  # Orphan the underlying attachment on prune. Avoids breaking Terraform-managed
  # PodIdentityAssociations that share the same Role/Policy.
  deletionPolicy: Orphan
  forProvider:
    policyArnRef:
      name: {{ $.Values.aws.clusterName }}-{{ $name }}-pod-identity-policy
    roleRef:
      name: {{ $.Values.aws.clusterName }}-{{ $name }}-pod-identity-role
  providerConfigRef:
    name: default
{{- end }}
{{- end }}
{{- /* Attach AWS-managed policy ARNs (e.g. AdministratorAccess) for identities
       that need broad permissions, such as the bootstrap Crossplane providers. */}}
{{- range $name, $identity := .Values.identities }}
{{- if not (eq (toString $identity.enabled) "false") }}
{{- range $i, $arn := ($identity.managedPolicyArns | default list) }}
---
apiVersion: iam.aws.upbound.io/v1beta1
kind: RolePolicyAttachment
metadata:
  name: {{ $.Values.aws.clusterName }}-{{ $name }}-managed-attachment-{{ $i }}
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "-2"
spec:
  deletionPolicy: Orphan
  forProvider:
    policyArn: {{ $arn | quote }}
    roleRef:
      name: {{ $.Values.aws.clusterName }}-{{ $name }}-pod-identity-role
  providerConfigRef:
    name: default
{{- end }}
{{- end }}
{{- end }}
