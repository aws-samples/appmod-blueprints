{{- range $name, $identity := .Values.identities }}
{{- if $identity.policy }}
---
apiVersion: iam.aws.upbound.io/v1beta1
kind: RolePolicyAttachment
metadata:
  name: {{ $name }}-pod-identity-attachment
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  forProvider:
    policyArnRef:
      name: {{ $name }}-pod-identity-policy
    roleRef:
      name: {{ $name }}-pod-identity-role
  providerConfigRef:
    name: default
{{- end }}
{{- end }}
