{{- range $name, $identity := .Values.identities }}
{{- if not (eq (toString $identity.enabled) "false") }}
---
apiVersion: iam.aws.upbound.io/v1beta1
kind: Role
metadata:
  name: {{ $.Values.aws.clusterName }}-{{ $name }}-pod-identity-role
  annotations:
    crossplane.io/external-name: {{ $.Values.aws.clusterName }}-{{ $identity.roleName }}
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "-3"
  labels:
    platform.gitops.io/role: {{ $.Values.aws.clusterName }}-{{ $name }}-pod-identity
spec:
  # Orphan, do not delete, the underlying IAM Role on prune. The role may be
  # shared with Terraform-managed PodIdentityAssociations on the same cluster
  # and pruning here must never break ESO/LBC/etc.
  deletionPolicy: Orphan
  forProvider:
    assumeRolePolicy: |
      {
        "Version": "2012-10-17",
        "Statement": [
          {
            "Effect": "Allow",
            "Principal": {
              "Service": "pods.eks.amazonaws.com"
            },
            "Action": [
              "sts:AssumeRole",
              "sts:TagSession"
            ]
          }
        ]
      }
    {{- if $identity.tags }}
    tags:
      {{- toYaml $identity.tags | nindent 6 }}
    {{- end }}
  providerConfigRef:
    name: default
{{- end }}
{{- end }}
