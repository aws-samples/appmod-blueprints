# Crossplane IAM Role for ExternalDNS Pod Identity
# Grants pods.eks.amazonaws.com the ability to assume this role
apiVersion: iam.aws.upbound.io/v1beta1
kind: Role
metadata:
  name: external-dns-pod-identity-role
  annotations:
    crossplane.io/external-name: ExternalDNSPodIdentityRole
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  labels:
    platform.gitops.io/role: external-dns-pod-identity
spec:
  forProvider:
    assumeRolePolicy: |
      {
        "Version": "2012-10-17",
        "Statement": [
          {
            "Effect": "Allow",
            "Principal": {
              "Service": "pods.eks.amazonaws.com"
            },
            "Action": [
              "sts:AssumeRole",
              "sts:TagSession"
            ]
          }
        ]
      }
    tags:
      managed-by: crossplane
      purpose: external-dns-pod-identity
