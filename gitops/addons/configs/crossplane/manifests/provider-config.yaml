# ProviderConfig for hub cluster — uses IRSA
# Applied by ArgoCD as part of the crossplane addon's additionalResources
apiVersion: aws.upbound.io/v1beta1
kind: ProviderConfig
metadata:
  name: default
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  credentials:
    source: PodIdentity
