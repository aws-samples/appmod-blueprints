# Platform manifests default configuration
# Override per-environment in overlays/environments/<env>/platform-manifests/values.yaml

gpu:
  enabled: false  # Enable GPU Karpenter nodepools — set true per environment

customNodepools:
  enabled: false  # Enable custom Karpenter nodepools — set true per environment

# Hugging Face models to download and store in S3
huggingfaceModels:
  - name: gpt2-neuron
    modelId: "gpt2"
    namespace: "ray-system"

  - name: mistral-7b-neuron
    modelId: "mistralai/Mistral-7B-v0.1"
    namespace: "ray-system"

  - name: tinyllama
    modelId: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
    namespace: "ray-system"
