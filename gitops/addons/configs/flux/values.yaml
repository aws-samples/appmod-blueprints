# Flux configuration defaults
# Override in overlays/environments/<env>/flux/values.yaml

git_username: ""  # Git username for credentials secret

# Repository URLs — override per environment
gitRepository:
  url: ""         # Platform GitOps repo URL (defaults to addonsRepoURL via valuesObject)

workloadsRepository:
  url: ""         # Workloads repo URL — set in environment overlay

# Resource limits for Flux controllers
flux2:
  sourceController:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 256Mi

  helmController:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 256Mi

  notificationController:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 128Mi

  imageAutomationController:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 128Mi
