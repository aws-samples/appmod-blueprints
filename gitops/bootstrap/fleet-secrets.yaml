apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: fleet-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    # Deletion-safety posture (TWO-WAY DOOR — flip to change behavior):
    #   * spec.syncPolicy.applicationsSync: create-update -> the appset NEVER deletes
    #     Applications, so a transient empty/failed generation cannot remove a spoke's
    #     fleet-secret App and de-register the cluster.
    #   * the Application template carries NO resources-finalizer -> deleting an App
    #     never cascade-deletes the live ArgoCD cluster registration Secret.
    # To restore appset-managed (destructive) deletion, set applicationsSync: sync
    # AND re-add the resources-finalizer to the template.
    platform.gitops.io/deletion-safety: protected
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  syncPolicy:
    preserveResourcesOnDeletion: true
    # create-update: controller may create/update Applications but NEVER delete them
    # — the primary guard against an empty/failed generation tearing down a live
    # spoke's registration Secret. TWO-WAY DOOR: set to `sync` to restore
    # delete-on-degenerate behavior.
    applicationsSync: create-update
  generators:
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  fleet_member: control-plane
          - git:
              # Read fleet member files from the overlay (fleet-config) where
              # `task spokes:enable-crossplane` declares Crossplane/Terraform spokes.
              # KRO spokes do NOT get a member file (their cluster Secret is created by
              # the EksclusterWithVpc RGD). Falls back to the base fleet repo when no
              # overlay is wired. Mirrors the overlay/base fallback used elsewhere.
              repoURL: '{{ or (index .metadata.annotations "overlay_repo_url") .metadata.annotations.fleetRepoURL }}'
              revision: '{{ or (index .metadata.annotations "overlay_repo_revision") .metadata.annotations.fleetRepoRevision }}'
              files:
                - path: '{{ or (index .metadata.annotations "overlay_repo_basepath") .metadata.annotations.fleetRepoBasepath }}fleet/members/*/values.yaml'
  template:
    metadata:
      name: 'fleet-secret-{{ .clusterName }}'
      # resources-finalizer intentionally OMITTED (deletion safety): without it,
      # deleting this Application orphans (preserves) the live cluster registration
      # Secret instead of cascade-deleting it (which de-registers the spoke and makes
      # its addon apps disappear). TWO-WAY DOOR: re-add
      #   finalizers: [resources-finalizer.argocd.argoproj.io]
      # to make App deletion cascade-delete the registration Secret again.
    spec:
      project: default
      sources:
        - repoURL: '{{ .metadata.annotations.fleetRepoURL }}'
          targetRevision: '{{ .metadata.annotations.fleetRepoRevision }}'
          ref: values
        - repoURL: '{{ or (index .metadata.annotations "overlay_repo_url") .metadata.annotations.fleetRepoURL }}'
          targetRevision: '{{ or (index .metadata.annotations "overlay_repo_revision") .metadata.annotations.fleetRepoRevision }}'
          ref: overlay
        - repoURL: '{{ .metadata.annotations.addonsRepoURL }}'
          targetRevision: '{{ .metadata.annotations.addonsRepoRevision }}'
          path: 'platform-charts/fleet-secret'
          helm:
            releaseName: 'fleet-secret-{{ .clusterName }}'
            ignoreMissingValueFiles: true
            valuesObject:
              # Default region for spokes that don't set their own.
              # Hub's region (from cluster secret annotation) — keeps spokes
              # in the hub's region unless the spoke values file overrides.
              region: '{{ .metadata.annotations.aws_region }}'
              hub:
                clusterName: '{{ .name }}'
                accountId: '{{ .metadata.annotations.aws_account_id }}'
                addonsRepoURL: '{{ .metadata.annotations.addonsRepoURL }}'
                addonsRepoRevision: '{{ .metadata.annotations.addonsRepoRevision }}'
                addonsRepoBasepath: '{{ .metadata.annotations.addonsRepoBasepath }}'
                fleetRepoURL: '{{ .metadata.annotations.fleetRepoURL }}'
                fleetRepoRevision: '{{ .metadata.annotations.fleetRepoRevision }}'
                fleetRepoBasepath: '{{ .metadata.annotations.fleetRepoBasepath }}'
                domain: '{{ .metadata.annotations.ingress_domain_name }}'
                resourcePrefix: '{{ .metadata.annotations.resource_prefix }}'
            valueFiles:
              - '$overlay/{{ or (index .metadata.annotations "overlay_repo_basepath") .metadata.annotations.fleetRepoBasepath }}fleet/members/{{ .clusterName }}/values.yaml'
              - '$values/{{ .metadata.annotations.fleetRepoBasepath }}overlays/tenants/{{ .labels.tenant }}/enabled-addons.yaml'
              - '$values/{{ .metadata.annotations.fleetRepoBasepath }}overlays/environments/{{ .labels.environment }}/enabled-addons.yaml'
              - '$values/{{ .metadata.annotations.fleetRepoBasepath }}overlays/clusters/{{ .clusterName }}/addon-overrides.yaml'
              - '$overlay/{{ or (index .metadata.annotations "overlay_repo_basepath") .metadata.annotations.fleetRepoBasepath }}overlays/tenants/{{ .labels.tenant }}/enabled-addons.yaml'
              - '$overlay/{{ or (index .metadata.annotations "overlay_repo_basepath") .metadata.annotations.fleetRepoBasepath }}overlays/environments/{{ .labels.environment }}/enabled-addons.yaml'
              - '$overlay/{{ or (index .metadata.annotations "overlay_repo_basepath") .metadata.annotations.fleetRepoBasepath }}overlays/clusters/{{ .clusterName }}/addon-overrides.yaml'
      destination:
        name: '{{ .name }}'
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
      # The aws_vpc_id annotation on the spoke cluster Secret is owned by the
      # platform-cluster Crossplane Composition (sourced from XR status.vpcId).
      # Ignore drift on that single field so selfHeal does not strip it.
      ignoreDifferences:
        - group: ''
          kind: Secret
          jqPathExpressions:
            - '.metadata.annotations.aws_vpc_id'
