apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: fleet-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  syncPolicy:
    preserveResourcesOnDeletion: true
  generators:
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  fleet_member: control-plane
          - git:
              repoURL: '{{ .metadata.annotations.fleetRepoURL }}'
              revision: '{{ .metadata.annotations.fleetRepoRevision }}'
              files:
                - path: '{{ .metadata.annotations.fleetRepoBasepath }}fleet/members/*/values.yaml'
  template:
    metadata:
      name: 'fleet-secret-{{ .externalSecret.clusterName }}'
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      sources:
        - repoURL: '{{ .metadata.annotations.fleetRepoURL }}'
          targetRevision: '{{ .metadata.annotations.fleetRepoRevision }}'
          ref: values
        - repoURL: '{{ .metadata.annotations.fleetRepoURL }}'
          targetRevision: '{{ .metadata.annotations.fleetRepoRevision }}'
          path: '{{ .metadata.annotations.fleetRepoBasepath }}charts/fleet-secret'
          helm:
            releaseName: 'fleet-secret-{{ .externalSecret.clusterName }}'
            ignoreMissingValueFiles: true
            valueFiles:
              - '$values/{{ .metadata.annotations.fleetRepoBasepath }}fleet/members/{{ .externalSecret.clusterName }}/values.yaml'
              - '$values/{{ .metadata.annotations.fleetRepoBasepath }}overlays/environments/{{ .externalSecret.labels.environment }}/enabled-addons.yaml'
              - '$values/{{ .metadata.annotations.fleetRepoBasepath }}overlays/clusters/{{ .externalSecret.clusterName }}/addon-overrides.yaml'
      destination:
        name: '{{ .name }}'
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
