apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: clusters
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  syncPolicy:
    preserveResourcesOnDeletion: true
  generators:
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  fleet_member: control-plane
          - git:
              repoURL: '{{ .metadata.annotations.fleetRepoURL }}'
              revision: '{{ .metadata.annotations.fleetRepoRevision }}'
              files:
                - path: '{{ .metadata.annotations.fleetRepoBasepath }}fleet/kro-values/tenants/*/kro-clusters/values.yaml'
  template:
    metadata:
      name: 'clusters-{{ index (splitList "/" .path.path) 4 }}'
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      sources:
        - repoURL: '{{ .metadata.annotations.fleetRepoURL }}'
          targetRevision: '{{ .metadata.annotations.fleetRepoRevision }}'
          ref: values
        - repoURL: '{{ .metadata.annotations.fleetRepoURL }}'
          path: '{{ .metadata.annotations.fleetRepoBasepath }}abstractions/resource-groups/platform-cluster'
          targetRevision: '{{ .metadata.annotations.fleetRepoRevision }}'
          helm:
            releaseName: 'clusters-{{ index (splitList "/" .path.path) 4 }}'
            ignoreMissingValueFiles: true
            valuesObject:
              xrd:
                enabled: false
              global:
                argoCDRoleArn: 'arn:aws:iam::{{ .metadata.annotations.aws_account_id }}:role/{{ .metadata.annotations.aws_cluster_name }}-ArgoCDCapabilityRole'
            valueFiles:
              - '$values/{{ .metadata.annotations.fleetRepoBasepath }}fleet/kro-values/default/kro-clusters/values.yaml'
              - '$values/{{ .path.path }}/values.yaml'
      destination:
        namespace: argocd
        name: '{{ .name }}'
      syncPolicy:
        automated:
          selfHeal: false
          allowEmpty: true
          prune: true
        retry:
          limit: -1
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 10m
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
