apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: clusters-kro
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  syncPolicy:
    preserveResourcesOnDeletion: true
  generators:
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  fleet_member: control-plane
          - git:
              repoURL: '{{ .metadata.annotations.fleetRepoURL }}'
              revision: '{{ .metadata.annotations.fleetRepoRevision }}'
              files:
                - path: '{{ .metadata.annotations.fleetRepoBasepath }}fleet/spoke-values/tenants/*/kro-clusters/clusters/*.json'
  template:
    metadata:
      name: 'clusters-kro-{{ .clusterName }}'
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      sources:
        - repoURL: '{{ .metadata.annotations.fleetRepoURL }}'
          targetRevision: '{{ .metadata.annotations.fleetRepoRevision }}'
          ref: values
        - repoURL: '{{ or (index .metadata.annotations "overlay_repo_url") .metadata.annotations.fleetRepoURL }}'
          targetRevision: '{{ or (index .metadata.annotations "overlay_repo_revision") .metadata.annotations.fleetRepoRevision }}'
          ref: overlay
        - repoURL: '{{ .metadata.annotations.addonsRepoURL }}'
          path: '{{ .metadata.annotations.addonsRepoBasepath }}abstractions/kro/kro-clusters'
          targetRevision: '{{ .metadata.annotations.addonsRepoRevision }}'
          helm:
            releaseName: 'clusters-kro-{{ .clusterName }}'
            ignoreMissingValueFiles: true
            valuesObject:
              global:
                argoCdHubRoleArn: 'arn:aws:iam::{{ .metadata.annotations.aws_account_id }}:role/{{ .metadata.annotations.aws_cluster_name }}-ArgoCDCapabilityRole'
                argoCdCapabilityRoleArn: 'arn:aws:iam::{{ .metadata.annotations.aws_account_id }}:role/{{ .metadata.annotations.aws_cluster_name }}-ArgoCDCapabilityRole'
                defaultRegion: '{{ .metadata.annotations.aws_region }}'
                targetCluster: '{{ .clusterName }}'
            valueFiles:
              - '$values/{{ .metadata.annotations.fleetRepoBasepath }}fleet/spoke-values/tenants/{{ index (splitList "/" .path.path) 4 }}/kro-clusters/values.yaml'
              - '$overlay/{{ or (index .metadata.annotations "overlay_repo_basepath") .metadata.annotations.fleetRepoBasepath }}fleet/spoke-values/tenants/{{ index (splitList "/" .path.path) 4 }}/kro-clusters/values.yaml'
      destination:
        namespace: '{{ .clusterName }}'
        name: '{{ .name }}'
      syncPolicy:
        automated:
          selfHeal: false
          # allowEmpty:false (ArgoCD default) prevents a transient empty render
          # (e.g. overlay values momentarily unreachable / overlay_repo_url annotation
          # missing -> falls back to base values where clusters:{}) from pruning the
          # EksclusterWithVpc and cascade-deleting a live EKS cluster.
          allowEmpty: false
          prune: true
        retry:
          limit: -1
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 10m
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
