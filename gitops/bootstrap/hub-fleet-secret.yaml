apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: hub-fleet-secret
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  syncPolicy:
    preserveResourcesOnDeletion: true
  generators:
    - clusters:
        selector:
          matchLabels:
            fleet_member: control-plane
  template:
    metadata:
      name: 'fleet-secret-{{ .metadata.annotations.aws_cluster_name }}'
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      sources:
        - repoURL: '{{ .metadata.annotations.fleetRepoURL }}'
          targetRevision: '{{ .metadata.annotations.fleetRepoRevision }}'
          ref: values
        - repoURL: '{{ .metadata.annotations.fleetRepoURL }}'
          targetRevision: '{{ .metadata.annotations.fleetRepoRevision }}'
          path: 'platform-charts/fleet-secret'
          helm:
            releaseName: 'fleet-secret-{{ .metadata.annotations.aws_cluster_name }}'
            ignoreMissingValueFiles: true
            valuesObject:
              mode: externalSecret
              clusterName: '{{ .metadata.annotations.aws_cluster_name }}'
              externalSecret:
                enabled: true
                creationPolicy: Merge
            valueFiles:
              - '$values/{{ .metadata.annotations.fleetRepoBasepath }}fleet/hub/values.yaml'
              - '$values/{{ .metadata.annotations.fleetRepoBasepath }}overlays/environments/control-plane/enabled-addons.yaml'
              - '$values/{{ .metadata.annotations.fleetRepoBasepath }}overlays/clusters/{{ .metadata.annotations.aws_cluster_name }}/addon-overrides.yaml'
      destination:
        name: '{{ .name }}'
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
