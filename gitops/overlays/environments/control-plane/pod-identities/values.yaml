# Control-plane environments do not run their own ESO pod identity.
# ESO on the hub uses the Crossplane provider role for Secrets Manager access;
# Crossplane on the hub provisions ESO pod identities for spoke clusters.
identities:
  eso:
    enabled: false
  lbc:
    enabled: true
  external-dns:
    enabled: true
  otel-collector:
    enabled: true
  keycloak-client-provisioner:
    enabled: true
    roleName: KeycloakClientProvisionerRole
    namespace: keycloak
    serviceAccount: keycloak-client-provisioner
    tags:
      managed-by: crossplane
      purpose: keycloak-client-provisioner
    policy:
      name: KeycloakClientProvisionerPolicy
      document: |
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Effect": "Allow",
              "Action": [
                "secretsmanager:CreateSecret",
                "secretsmanager:PutSecretValue",
                "secretsmanager:DescribeSecret"
              ],
              "Resource": "arn:aws:secretsmanager:*:*:secret:*/oidc/*"
            }
          ]
        }
