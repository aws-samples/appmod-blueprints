# Platform Bootstrap Configuration
# Edit this file with your environment-specific values before running 'task install'

# Cluster provider — which approach to use for hub cluster provisioning
# Options: kind-crossplane, byoc
clusterProvider: "kind-crossplane"

# Git repository hosting the gitops platform code
repo:
  url: "https://github.com/aws-samples/appmod-blueprints.git"
  revision: "agents-platform"
  basepath: "gitops/"

# ArgoCD version to install on Kind
argocd:
  version: "7.9.1"

# Hub cluster configuration
hub:
  clusterName: "hub"
  kubernetesVersion: "1.32"

# AWS configuration
aws:
  region: "us-west-2"
  accountId: "259732043995"
  profile: "default"

# Domain and networking
domain: "idp.advaitt.people.aws.dev"
resourcePrefix: "peeks"
ingressName: "hub-ingress"
ingressSecurityGroups: "REPLACE_ME"

# AWS Identity Center (required for EKS ArgoCD Capability)
identityCenter:
  instanceArn: "arn:aws:sso:::instance/ssoins-722378534335b2a8"
  region: "us-east-1"
  adminGroupId: "24b88418-b001-70df-98f1-3bbb5ff5c292"

# EKS ArgoCD Capability
argocdCapability:
  name: "argocd"
  # roleArn is auto-created by Crossplane (claims/argocd-capability-role.yaml)
  # Only set this if you have a pre-existing role you want to use instead
  # roleArn: "arn:aws:iam::REPLACE_ME:role/ArgoCDCapabilityRole"
