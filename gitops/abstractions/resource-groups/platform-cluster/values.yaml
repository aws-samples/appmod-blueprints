# Default values — no clusters provisioned by default.
# Override per-environment via fleet/kro-values/default/kro-clusters/values.yaml
# or per-tenant via fleet/kro-values/tenants/<tenant>/kro-clusters/values.yaml

global:
  argoCDRoleArn: ""
  # Default AWS region for clusters that don't set their own.
  # Injected by the bootstrap ApplicationSet from the hub cluster's
  # aws_region annotation. Per-cluster `region` in
  # fleet/kro-values/.../kro-clusters/values.yaml takes precedence.
  defaultRegion: ""

xrd:
  enabled: true

clusters: {}
