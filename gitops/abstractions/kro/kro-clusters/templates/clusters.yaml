{{- range $name, $cluster := .Values.clusters }}
{{- if or (not $.Values.global.targetCluster) (eq $name $.Values.global.targetCluster) }}
---
apiVersion: kro.run/v1alpha1
kind: EksclusterWithVpc
metadata:
  name: {{ $name }}
  namespace: {{ $name }}
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "1"
spec:
  name: {{ $name }}
  tenant: {{ $cluster.tenant | default "tenant1" | quote }}
  environment: {{ $cluster.environment | default "staging" | quote }}
  region: {{ $cluster.region | default "us-west-2" | quote }}
  k8sVersion: {{ $cluster.k8sVersion | default "1.34" | quote }}
  accountId: {{ $cluster.accountId | quote }}
  managementAccountId: {{ $cluster.managementAccountId | quote }}
  argoCdHubRoleArn: {{ $.Values.global.argoCdHubRoleArn | default "" | quote }}
  argoCdCapabilityRoleArn: {{ $.Values.global.argoCdCapabilityRoleArn | default $.Values.global.argoCdHubRoleArn | default "" | quote }}
  adminRoleName: {{ $cluster.adminRoleName | default "Admin" | quote }}
  fleetSecretManagerSecretNameSuffix: {{ $cluster.fleetSecretManagerSecretNameSuffix | default "argocd-secret" | quote }}
  domainName: {{ $cluster.domainName | default "" | quote }}
  workloads: {{ $cluster.workloads | default "false" | quote }}
  {{- if $cluster.subHostedZone | quote }}
  subHostedZone:
    {{- toYaml $cluster.subHostedZone | nindent 4 }}
  {{- end }}
  {{- if $cluster.cidr }}
  cidr:
    {{- toYaml $cluster.cidr | nindent 4 }}
  {{- else }}
  cidr: {}
  {{- end }}
  gitops:
    {{- $g := $cluster.gitops | default dict }}
    {{- $global := $.Values.global | default dict }}
    # Inherit the deploy branch from the control-plane (passed via global) so
    # kro-provisioned clusters track the same Git revision as the rest of the
    # fleet, instead of falling back to the RGD's "main" default. A per-cluster
    # JSON gitops.* value still wins; final fallback is "main".
    addonsRepoRevision: {{ $g.addonsRepoRevision | default $global.addonsRepoRevision | default "main" | quote }}
    fleetRepoRevision: {{ $g.fleetRepoRevision | default $global.fleetRepoRevision | default "main" | quote }}
    {{- range $k, $v := (omit $g "addonsRepoRevision" "fleetRepoRevision") }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
  {{- if $cluster.addons }}
  addons:
    {{- toYaml $cluster.addons | nindent 4 }}
  {{- else }}
  addons: {}
  {{- end }}
{{- end }}
{{- end }}