# Hub cluster claim — creates VPC + EKS Auto Mode in a single claim
apiVersion: platform.gitops.io/v1alpha1
kind: PlatformCluster
metadata:
  name: hub
  namespace: crossplane-system
  annotations:
    # crossplane.io/external-name ensures Crossplane adopts existing AWS resources
    # by name rather than creating duplicates (used by task hub:update)
    crossplane.io/external-name: hub
spec:
  region: us-west-2
  clusterName: hub
  vpcCidr: "10.0.0.0/16"
  kubernetesVersion: "1.32"
  autoMode: true
  writeConnectionSecretToRef:
    name: hub-kubeconfig
