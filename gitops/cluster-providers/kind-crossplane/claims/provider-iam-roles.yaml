apiVersion: iam.aws.upbound.io/v1beta1
kind: Role
metadata:
  name: iam-provider-role
  namespace: crossplane-system
  annotations:
    crossplane.io/external-name: CrossplaneIAMProviderRole
  labels:
    platform.gitops.io/role: iam-provider
spec:
  forProvider:
    assumeRolePolicy: |
      {
        "Version": "2012-10-17",
        "Statement": [{
          "Effect": "Allow",
          "Principal": {"Service": "pods.eks.amazonaws.com"},
          "Action": ["sts:AssumeRole", "sts:TagSession"]
        }]
      }
    tags:
      managed-by: crossplane
      purpose: iam-provider
  providerConfigRef:
    name: default
---
apiVersion: iam.aws.upbound.io/v1beta1
kind: RolePolicyAttachment
metadata:
  name: iam-provider-admin-attachment
  namespace: crossplane-system
spec:
  forProvider:
    policyArn: "arn:aws:iam::aws:policy/AdministratorAccess"
    roleRef:
      name: iam-provider-role
  providerConfigRef:
    name: default
---
