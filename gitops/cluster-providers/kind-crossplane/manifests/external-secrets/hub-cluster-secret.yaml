apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hub-cluster
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: hub-kubeconfig
    kind: ClusterSecretStore
  target:
    name: hub
    template:
      engineVersion: v2
      type: Opaque
      metadata:
        labels:
          argocd.argoproj.io/secret-type: cluster
          cluster-role: hub
          environment: control-plane
          fleet_member: control-plane
      data:
        name: hub
        # EKS ArgoCD Capability requires cluster ARN as server, not API endpoint
        server: "{{ .clusterArn }}"
        config: '{"tlsClientConfig":{"insecure":false}}'
  data:
    - secretKey: clusterArn
      remoteRef:
        key: hub-kubeconfig
        property: clusterArn
    - secretKey: serverUrl
      remoteRef:
        key: hub-kubeconfig
        property: endpoint
