{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "fleet-secret.fullname" . }}
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  secretStoreRef:
    kind: {{ .Values.externalSecret.secretStoreRefKind }}
    name: {{ .Values.externalSecret.secretStoreRefName }}
  refreshInterval: "1m"
  target:
    name: {{ include "fleet-secret.fullname" . }}
    creationPolicy: Owner
    template:
      engineVersion: v2
      templateFrom:
      - target: Annotations
        literal: "{{`{{ .metadata }}`}}"
      {{- if .Values.externalSecret.annotations }}
      - target: Annotations
        literal: |-
          {{- .Values.externalSecret.annotations | toYaml | nindent 10 }}
      {{- end }}
      {{- if .Values.externalSecret.labels }}
      - target: Labels
        literal: |-
          {{- .Values.externalSecret.labels | toYaml | nindent 10 }}
      {{- end }}
      - target: Labels
        literal: "{{`{{ .addons }}`}}"
      {{- if .Values.enabledAddons }}
      {{- range $addon, $enabled := .Values.enabledAddons }}
      {{- if $enabled }}
      - target: Labels
        literal: |-
          enable_{{ $addon }}: 'true'
      {{- end }}
      {{- end }}
      {{- end }}
      - target: Labels
        literal: "argocd.argoproj.io/secret-type: cluster"
      data:
        config: "{{`{{ .config }}`}}"
        name: {{ .Values.externalSecret.clusterName }}
        {{- if .Values.externalSecret.clusterArn }}
        server: {{ .Values.externalSecret.clusterArn | quote }}
        {{- else }}
        server: "{{`{{ .server }}`}}"
        {{- end }}
  dataFrom:
    - extract:
        key: {{ .Values.externalSecret.clusterName }}/config
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
{{- end }}
