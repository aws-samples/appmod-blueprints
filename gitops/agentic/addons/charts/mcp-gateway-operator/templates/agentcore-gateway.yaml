{{- if .Values.agentcoreGateway.create }}
---
apiVersion: iam.aws.upbound.io/v1beta1
kind: Role
metadata:
  name: {{ include "mcp-gateway-operator.fullname" . }}-gateway
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  forProvider:
    assumeRolePolicy: |
      {
        "Version": "2012-10-17",
        "Statement": [
          {
            "Effect": "Allow",
            "Principal": {
              "Service": "bedrock-agentcore.amazonaws.com"
            },
            "Action": "sts:AssumeRole"
          }
        ]
      }
  providerConfigRef:
    name: provider-aws-config
---
apiVersion: bedrockagentcore.aws.upbound.io/v1beta1
kind: Gateway
metadata:
  name: {{ include "mcp-gateway-operator.fullname" . }}
  annotations:
    argocd.argoproj.io/sync-wave: "-4"
spec:
  forProvider:
    name: {{ .Values.agentcoreGateway.name | default (include "mcp-gateway-operator.fullname" .) }}
    description: {{ .Values.agentcoreGateway.description | default "AgentCore MCP Gateway" | quote }}
    region: {{ .Values.aws.region }}
    protocolType: MCP
    {{- with .Values.agentcoreGateway.protocolConfiguration }}
    protocolConfiguration:
      mcp:
        {{- toYaml . | nindent 8 }}
    {{- end }}
    roleArnRef:
      name: {{ include "mcp-gateway-operator.fullname" . }}-gateway
    {{- if .Values.agentcoreGateway.authorizer.enabled }}
    authorizerType: CUSTOM_JWT
    authorizerConfiguration:
      customJwtAuthorizer:
        discoveryUrl: {{ .Values.agentcoreGateway.authorizer.discoveryUrl | quote }}
        allowedClients:
          {{- toYaml .Values.agentcoreGateway.authorizer.allowedClients | nindent 10 }}
        allowedAudience:
          {{- toYaml .Values.agentcoreGateway.authorizer.allowedAudience | nindent 10 }}
    {{- else }}
    authorizerType: NONE
    {{- end }}
  providerConfigRef:
    name: provider-aws-config
{{- end }}
