{{- if .Values.oauth2Provider.create }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "mcp-gateway-operator.fullname" . }}-keycloak-oidc
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: keycloak
    kind: ClusterSecretStore
  target:
    name: {{ include "mcp-gateway-operator.fullname" . }}-keycloak-oidc
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: client-id
      remoteRef:
        key: keycloak-clients
        property: AGENTCORE_CLIENT_ID
    - secretKey: client-secret
      remoteRef:
        key: keycloak-clients
        property: AGENTCORE_CLIENT_SECRET
{{- end }}
