# Example: Agent with AgentCore memory provisioned via CloudFormation
#
# Flow:
#   1. agentcore-memory provisions a CloudFormation Stack that creates the Memory
#      resource, and emits a ComponentPolicy claim for IAM permissions
#   2. dp-service-account creates IAM Role + ServiceAccount + PodIdentityAssociation,
#      then emits PolicyAttachment claims to wire the permissions
#   3. agent references the ServiceAccount and gets AWS credentials via pod identity
#
# After deployment, get the memoryId from the CloudFormation stack outputs:
#   kubectl get stack agentcore-memory -o jsonpath='{.status.atProvider.outputs}'
#
apiVersion: core.oam.dev/v1beta1
kind: Application
metadata:
  name: my-agent-app
  namespace: agents
spec:
  components:
    - name: agentcore-memory
      type: agentcore-memory
      properties:
        region: us-west-2
        description: "Memory for my-agent"
        eventExpiryDuration: 30

    - name: my-agent-sa
      type: dp-service-account
      properties:
        componentNamesForAccess:
          - agentcore-memory
        clusterName: peeks-spoke-dev
        clusterRegion: us-west-2

    - name: my-agent
      type: agent
      dependsOn:
        - my-agent-sa
        - agentcore-memory
      properties:
        name: my-agent
        namespace: agents
        description: "Assistant agent with persistent memory"
        systemMessage: "You are a helpful assistant."
        serviceAccount: my-agent-sa
        memory:
          provider: agentcore
          config:
            memoryId: "<from stack output>"
            region: us-west-2
        mcpServers:
          - name: filesystem
