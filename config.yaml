# Platform Bootstrap Configuration
# DO NOT edit this file directly — copy to config.local.yaml and customize there.
# yaml-language-server: $schema=config.schema.json

# Cluster provider — which approach to use for hub cluster provisioning
# Options: kind-crossplane, byoc
clusterProvider: "kind-crossplane"

# Git repository hosting the gitops platform code
repo:
  url: "https://github.com/<your-org>/<your-repo>.git"
  revision: "main"
  basepath: "gitops/"

# Hub cluster configuration
hub:
  clusterName: "<unique-cluster-name>"       # Must be DNS-compatible, unique per account+region
  kubernetesVersion: "1.35"
  vpcCidr: "10.0.0.0/16"
  # Optional: managed node group alongside Auto Mode
  # managedNodeGroup:
  #   enabled: true
  #   instanceTypes: ["m5.large"]
  #   desiredSize: 2
  #   minSize: 1
  #   maxSize: 5
  #   diskSize: 50
  #   capacityType: "ON_DEMAND"

# AWS configuration
aws:
  region: "<aws-region>"                     # e.g. us-west-2
  accountId: "<12-digit-account-id>"         # e.g. 123456789012
  profile: "default"                         # AWS CLI profile (local dev only)

# Domain and networking
domain: "<your-domain>"                      # e.g. idp.example.com — must be unique per stack
resourcePrefix: "<prefix>"                   # Used for KRO tenant-facing resources only
ingressName: ""                              # Defaults to {clusterName}-ingress if empty
ingressSecurityGroups: ""

# AWS Identity Center (required for EKS ArgoCD Capability)
identityCenter:
  instanceArn: "<identity-center-instance-arn>"
  region: "<identity-center-region>"         # Often us-east-1
  adminGroupId: "<admin-group-id>"

# EKS ArgoCD Capability
argocdCapability:
  name: "argocd"
