# ClusterSecretStore for AWS Secrets Manager
# Deployed as part of external-secrets addon's additionalResources (plain manifest)
# Also created by the cluster provider during bootstrap — addon overwrites it
# NOTE: Update the region below to match your aws.region in config.yaml
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-west-2
      secretsManager:
        forceDeleteWithoutRecovery: true
